// Custom Hook para Firestore
const useFirestore = (collectionName) => {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  
  useEffect(() => {
    setLoading(true);
    const unsubscribe = col(collectionName).onSnapshot(
      snapshot => {
        setData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        setLoading(false);
      },
      err => {
        console.error(`Erro ao carregar ${collectionName}:`, err);
        setError(err);
        setLoading(false);
      }
    );
    return unsubscribe;
  }, [collectionName]);
  
  return { data, loading, error };
};

// Hash simples para senhas (em produção use bcrypt)
const hashPassword = async (password) => {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
};

function Icon({name,size=18,className=''}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      const d=window.lucide.icons[name];
      if(d){
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        const[,at,ch]=d;
        Object.entries({...at,width:size,height:size,class:`lucide-${name} ${className}`,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}).forEach(([k,v])=>svg.setAttribute(k,v));
        ch.forEach(([t,a])=>{ const el=document.createElementNS('http://www.w3.org/2000/svg',t); Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v)); svg.appendChild(el); });
        ref.current.innerHTML=''; ref.current.appendChild(svg);
      }
    }
  },[name,size,className]);
  return <span ref={ref} className="inline-flex shrink-0 items-center justify-center" role="img" aria-label={name}/>;
}

const NetworkStatus = () => {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(()=>{
    const handleChange = () => setOnline(navigator.onLine);
    window.addEventListener('online', handleChange);
    window.addEventListener('offline', handleChange);
    return () => {
      window.removeEventListener('online', handleChange);
      window.removeEventListener('offline', handleChange);

// ── Dashboard ──────────────────────────────────────────────────────────────
function DashboardView({requests}){
  const stats=useMemo(()=>{
    if(!requests?.length)return null;
    const byOS={};
    requests.forEach(r=>{ const k=String(r.os||'').trim(); if(k){if(!byOS[k])byOS[k]=[];byOS[k].push(r);} });
    const multi=Object.entries(byOS).filter(([,a])=>a.length>1);
    const totalAdd=multi.reduce((a,[,arr])=>a+(arr.length-1),0);
    const intervalos=[];
    const detalhe=[];
    multi.forEach(([os,arr])=>{
      const sorted=[...arr].sort((a,b)=>a.timestamp-b.timestamp);
      sorted.slice(1).forEach(p=>{
        const dias=Math.round((p.timestamp-sorted[0].timestamp)/(864e5));
        intervalos.push(dias);
        detalhe.push({os,dias,sol:p.responsavel,dt0:sorted[0].timestamp,dt1:p.timestamp});
      });
    });
    const mediaAdd=intervalos.length?(intervalos.reduce((a,b)=>a+b,0)/intervalos.length).toFixed(1):0;
    const maxAdd=intervalos.length?Math.max(...intervalos):0;
    let totalIt=0,pend=0,cotac=0,conc=0,doado=0;
    requests.forEach(r=>(r.items||[]).forEach(it=>{totalIt++;if(it.status==='Concluído')conc++;else if(it.status==='Doado')doado++;else if(it.status==='Em Cotação')cotac++;else pend++;}));
    const porSol={};
    requests.forEach(r=>{porSol[r.responsavel]=(porSol[r.responsavel]||0)+1;});
    const rankSol=Object.entries(porSol).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const diasSem=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const porDia=[0,0,0,0,0,0,0];
    requests.forEach(r=>porDia[new Date(r.timestamp).getDay()]++);
    const pedDia=diasSem.map((l,i)=>({l,v:porDia[i]}));
    const agora=Date.now();
    const semanas=Array.from({length:8},(_,i)=>{
      const ini=agora-(8-i)*7*864e5,fim=agora-(7-i)*7*864e5;
      const cnt=requests.filter(r=>r.timestamp>=ini&&r.timestamp<fim).length;
      const d=new Date(ini);
      return {l:`${d.getDate()}/${d.getMonth()+1}`,v:cnt};
    });
    const porMod={};
    requests.forEach(r=>{const m=r.vehicleData?.modelo||'N/D';porMod[m]=(porMod[m]||0)+1;});
    const rankMod=Object.entries(porMod).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const osRep=Object.entries(byOS).filter(([,v])=>v.length>1).sort((a,b)=>b[1].length-a[1].length).slice(0,5);
    const taxa=totalIt>0?Math.round(conc/totalIt*100):0;
    // Unidade stats
    const porUnidade={};
    requests.forEach(r=>{const u=r.unidade||'Unidade 1';porUnidade[u]=(porUnidade[u]||0)+1;});
    return {total:requests.length,osU:Object.keys(byOS).length,totalAdd,mediaAdd:parseFloat(mediaAdd),maxAdd,detalhe:detalhe.sort((a,b)=>b.dt1-a.dt1).slice(0,8),totalIt,pend,cotac,conc,doado,rankSol,pedDia,semanas,rankMod,osRep,taxa,porUnidade};
  },[requests]);

  if(!stats) return (
    <div className="flex flex-col items-center justify-center py-24 text-center fade-in">
      <div className="w-16 h-16 bg-neutral-100 rounded-2xl flex items-center justify-center mb-4"><Icon name="bar-chart-2" size={28} className="text-neutral-300"/></div>
      <p className="text-[10px] font-black uppercase text-neutral-300 tracking-widest">Nenhum dado disponível</p>
    </div>
  );

  const maxSol=stats.rankSol[0]?.[1]||1, maxMod=stats.rankMod[0]?.[1]||1;
  return (
    <div className="space-y-5 fade-in pb-10">
      <div className="flex items-end justify-between">
        <div>
          <h2 className="font-display text-5xl font-black uppercase text-black tracking-tight leading-none">Analytics VRZ</h2>
          <p className="text-[9px] font-bold text-neutral-400 uppercase tracking-widest mt-1">Inteligência Operacional · Tempo real</p>
        </div>
        <div className="flex items-center gap-2 bg-black text-white px-4 py-2 rounded-xl">
          <span className="w-2 h-2 rounded-full bg-red-500 pulse-dot"/><span className="text-[9px] font-black uppercase tracking-widest">Live</span>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        {[
          {label:'Total de Pedidos',v:stats.total,sub:`${stats.osU} OS únicas`,icon:'clipboard-list',bg:'bg-black'},
          {label:'Inclusões Adicionais',v:stats.totalAdd,sub:'mesma OS, novo pedido',icon:'plus-circle',bg:'bg-red-600'},
          {label:'Média p/ Inclusão',v:stats.mediaAdd>0?stats.mediaAdd+'d':'—',sub:`máx ${stats.maxAdd}d`,icon:'clock',bg:'bg-orange-500'},
          {label:'Taxa de Conclusão',v:stats.taxa+'%',sub:`${stats.conc} de ${stats.totalIt} itens`,icon:'check-circle',bg:'bg-emerald-600'},
          {label:'Peças Doadas',v:stats.doado,sub:'transferidas entre OS',icon:'git-merge',bg:'bg-purple-600'},
        ].map((k,i)=>(
          <div key={i} className={`${k.bg} rounded-2xl p-4 text-white`}>

            <p className="text-[7px] font-bold opacity-40 mt-0.5">{k.sub}</p>

      {/* Distribuição por Unidade */}
      <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
        <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Pedidos por Unidade</p>
        <div className="flex gap-4">
          {UNIDADES.map(u=>(
            <div key={u} className="flex-1">
              <div className="flex justify-between mb-1"><span className="text-[9px] font-black uppercase">{u}</span><span className="text-[9px] font-black text-red-600">{stats.porUnidade[u]||0}</span></div>
              <div className="h-2 bg-neutral-100 rounded-full overflow-hidden">
                <div className="h-full bg-red-600 rounded-full transition-all duration-700" style={{width:`${((stats.porUnidade[u]||0)/stats.total*100)}%`}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Pipeline de Itens</p>
          <div className="flex items-center gap-4">
            <Donut size={110} slices={[{v:stats.pend,c:'#f97316'},{v:stats.cotac,c:'#2563eb'},{v:stats.conc,c:'#000'},{v:stats.doado,c:'#9333ea'}]}/>
            <div className="space-y-2 flex-1">
              {[{l:'Pendentes',v:stats.pend,c:'bg-orange-500'},{l:'Em Cotação',v:stats.cotac,c:'bg-blue-600'},{l:'Concluídos',v:stats.conc,c:'bg-black'},{l:'Doados',v:stats.doado,c:'bg-purple-600'}].map((s,i)=>(
                <div key={i}>
                  <div className="flex justify-between mb-1"><div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${s.c}`}/><span className="text-[8px] font-bold uppercase text-neutral-500">{s.l}</span></div><span className="text-[9px] font-black">{s.v}</span></div>
                  <div className="h-1 bg-neutral-100 rounded-full overflow-hidden"><div className={`h-full ${s.c} rounded-full transition-all duration-700`} style={{width:stats.totalIt>0?`${s.v/stats.totalIt*100}%`:'0%'}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-0.5">Pedidos por Semana</p>
          <p className="text-[7px] text-neutral-300 font-bold mb-3">Últimas 8 semanas</p>
          <MiniBar data={stats.semanas} color="#ef4444"/>
        </div>
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-0.5">Distribuição Semanal</p>
          <p className="text-[7px] text-neutral-300 font-bold mb-3">Qual dia mais solicita</p>
          <MiniBar data={stats.pedDia} color="#2563eb"/>
        </div>
      </div>

      {/* Rankings */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Top Solicitantes</p>
          <div className="space-y-3">{stats.rankSol.map(([nome,qtd],i)=>(
            <div key={i} className="flex items-center gap-3">
              <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[8px] font-black shrink-0 ${i===0?'bg-red-600 text-white':i===1?'bg-neutral-800 text-white':'bg-neutral-100 text-neutral-500'}`}>{i+1}</div>

// ── Donut Chart ────────────────────────────────────────────────────────────
function Donut({slices,size=110}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const ctx=ref.current.getContext('2d');
    const total=slices.reduce((a,s)=>a+s.v,0);
    ctx.clearRect(0,0,size,size);
    const cx=size/2,cy=size/2,r=size/2-6;
    if(!total){ ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fillStyle='#f1f5f9';ctx.fill(); }
    else {
      let start=-Math.PI/2;
      slices.forEach(s=>{
        const ang=(s.v/total)*2*Math.PI;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+ang);ctx.closePath();
        ctx.fillStyle=s.c;ctx.fill();start+=ang;
      });
    }
    ctx.beginPath();ctx.arc(cx,cy,r*.58,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  },[slices,size]);
  return <canvas ref={ref} width={size} height={size} role="img" aria-label="Gráfico de distribuição"/>;
}

// ── Mini Bar ───────────────────────────────────────────────────────────────
function MiniBar({data,color='#ef4444'}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    const ctx=ref.current.getContext('2d');
    const w=ref.current.width,h=ref.current.height;
    ctx.clearRect(0,0,w,h);
    const max=Math.max(...data.map(d=>d.v),1);
    const bw=w/data.length;
    data.forEach((d,i)=>{
      const bh=(d.v/max)*(h-22);
      ctx.fillStyle=i===data.length-1?color:color+'99';
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(i*bw+2,h-bh-20,bw-4,bh,3);
      else ctx.rect(i*bw+2,h-bh-20,bw-4,bh);
      ctx.fill();
      ctx.fillStyle='#94a3b8';ctx.font='bold 8px Inter';ctx.textAlign='center';
      ctx.fillText(d.l,i*bw+bw/2,h-4);
      if(d.v>0){ctx.fillStyle='#475569';ctx.font='bold 9px Inter';ctx.fillText(d.v,i*bw+bw/2,h-bh-24);}
    });
  },[data,color]);
  return <canvas ref={ref} width={280} height={110} className="w-full" role="img" aria-label="Gráfico de barras"/>;
}
