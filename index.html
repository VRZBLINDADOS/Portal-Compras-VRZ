          <div><label style={{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Senha</label>
            <div style={{position:'relative'}}><input type={showP?'text':'password'} value={np} onChange={e=>setNp(e.target.value)} className="input" placeholder="Senha" style={{fontSize:12,paddingRight:36}}/><button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',fontSize:12}}>{showP?'👁':'👁‍🗨'}</button></div></div>
          <div><label style={{fontSize:8,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Categoria</label>
            <select value={nr} onChange={e=>setNr(e.target.value)} className="input" style={{fontSize:12,appearance:'auto'}}><option value="solicitante">Solicitante</option><option value="leitor">Leitor</option><option value="admin">Admin</option></select></div>
        </div>
        <button onClick={()=>{if(!nu||!np)return alert('Preencha todos os campos.');onAdd(nu,np,nr);setNu('');setNp('');setNr('solicitante');}} className="btn-primary" style={{width:'100%'}}>+ Criar Conta</button>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <table className="vtable w-full">
          <thead><tr><th>Usuário</th><th>Categoria</th><th>Status</th><th style={{textAlign:'right'}}>Ação</th></tr></thead>
          <tbody>
            {users.map((u,i)=>(
              <tr key={i}>
                <td style={{fontWeight:700,textTransform:'uppercase',fontSize:12}}>{u.user}</td>
                <td><select value={u.role||'solicitante'} onChange={e=>onRole(u,e.target.value)} className="badge" style={{cursor:'pointer',border:'none',outline:'none',background:u.role==='admin'?'var(--red)':u.role==='leitor'?'var(--muted)':'#1A4EC2',color:'#fff'}}><option value="admin">Admin</option><option value="solicitante">Solicitante</option><option value="leitor">Leitor</option></select></td>
                <td><button onClick={()=>onToggle(u)} style={{fontSize:9,fontWeight:800,textTransform:'uppercase',padding:'3px 10px',borderRadius:999,cursor:'pointer',border:'1px solid',background:u.active!==false?'#EDFAF3':'#FFF0F0',color:u.active!==false?'#0A6B34':'var(--red)',borderColor:u.active!==false?'#AAE6C5':'#FFBDBD'}}>{u.active!==false?'Ativo':'Desativado'}</button></td>
                <td style={{textAlign:'right'}}><button onClick={()=>onDelete(u.id||u.user,u)} style={{display:'inline-flex',alignItems:'center',gap:5,padding:'5px 12px',background:'var(--red)',color:'#fff',border:'none',borderRadius:7,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}><Icon name="trash-2" size={12}/> Excluir</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── Storage View ──────────────────────────────────────────────────────────
function StorageView({requests}){
  const LIM=1000;
  const[sel,setSel]=useState({});const[exportando,setExportando]=useState(false);const[excluindo,setExcluindo]=useState(false);const[confirmar,setConfirmar]=useState(false);
  const[prog,setProg]=useState({atual:0,total:0,msg:''});
  const concluidos=useMemo(()=>requests.filter(r=>r.items?.length>0&&r.items.every(it=>it.status==='Concluído'||it.status==='Doado')).sort((a,b)=>a.timestamp-b.timestamp),[requests]);
  const total=requests.length,totalConc=concluidos.length,ativos=total-totalConc;
  const pctPed=Math.min(total/LIM*100,100);const bytesU=estimarBytes(requests);const pctSt=Math.min(bytesU/1073741824*100,100);
  const restam=Math.max(LIM-total,0);const corB=pctPed>=85?'var(--red)':pctPed>=60?'#F59E0B':'#059669';
  const alerta=pctPed>=85?'⚠ Próximo do limite!':pctPed>=60?'Uso moderado':'Uso saudável';
  const todosSel=concluidos.length>0&&concluidos.every(r=>sel[r.id]);
  const qtdSel=Object.values(sel).filter(Boolean).length;
  const idsSel=Object.entries(sel).filter(([,v])=>v).map(([id])=>id);
  const pedSel=concluidos.filter(r=>idsSel.includes(r.id));
  const toggleTodos=()=>{if(todosSel)setSel({});else{const n={};concluidos.forEach(r=>{n[r.id]=true;});setSel(n);}};
  const exportCSV=()=>{
    if(!pedSel.length)return;
    const rows=[['Data','OS','Unidade','Modelo','Fabricante','Chassi','Solicitante','Peça','Qtd','Status','Fornecedor','Valor','Entrega Real'].join(';')];
    pedSel.forEach(r=>(r.items||[]).forEach(it=>rows.push([r.timestamp?new Date(r.timestamp).toLocaleDateString('pt-BR'):'',r.os,r.unidade||'Unidade 1',r.vehicleData?.modelo||'',r.vehicleData?.fabricante||'',r.vehicleData?.chassi||'',r.responsavel||'',it.description||'',it.quantity||1,it.statusOriginal||it.status||'',it.supplier||'',it.price?Number(it.price).toLocaleString('pt-BR',{minimumFractionDigits:2}):'',it.actualDeliveryDate||''].join(';'))));
    const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`VRZ_Concluidos_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;a.click();
  };
  const exportPDF=async()=>{
    if(!pedSel.length)return;setExportando(true);
    try{
      const{jsPDF}=window.jspdf;const doc=new jsPDF();const hoje=new Date().toLocaleDateString('pt-BR');
      doc.setFillColor(13,13,13);doc.rect(0,0,210,38,'F');doc.setTextColor(255,255,255);doc.setFontSize(16);doc.setFont('helvetica','bold');
      doc.text('VRZ COMPRAS — ARQUIVO DE CONCLUÍDOS',10,16);doc.setFontSize(8);doc.setFont('helvetica','normal');doc.text(`Gerado: ${hoje}  |  Pedidos: ${pedSel.length}`,10,28);
      doc.setTextColor(0,0,0);let y=50;
      pedSel.forEach(req=>{
        if(y>250){doc.addPage();y=15;}
        doc.setFillColor(245,242,240);doc.rect(8,y-4,194,13,'F');
        doc.setFont('helvetica','bold');doc.setFontSize(9);doc.text(`OS #${req.os} (${req.unidade||'Unidade 1'}) — ${req.vehicleData?.modelo||''}`,12,y+3);
        doc.setFont('helvetica','normal');doc.setFontSize(7);doc.text(`Solicitante: ${req.responsavel||'—'}  |  ${req.timestamp?new Date(req.timestamp).toLocaleDateString('pt-BR'):''}`,12,y+9);y+=16;
        (req.items||[]).forEach((it,ii)=>{
          if(y>265){doc.addPage();y=15;}
          doc.setFont('helvetica','bold');doc.setFontSize(8);doc.setTextColor(0,0,0);doc.text(`${ii+1}. ${it.description||''}`,14,y);
          doc.setFont('helvetica','normal');doc.setFontSize(7);doc.setTextColor(80,80,80);
          const det=`Qtd:${it.quantity||1}  Fornecedor:${it.supplier||'—'}  Valor:${it.price?'R$'+Number(it.price).toLocaleString('pt-BR',{minimumFractionDigits:2}):'—'}  Entrega:${it.actualDeliveryDate||'—'}`;
          const ls=doc.splitTextToSize(det,180);doc.text(ls,16,y+5);doc.setTextColor(0,0,0);y+=5+ls.length*4+2;
        });
        y+=4;doc.setDrawColor(220,220,220);doc.line(8,y-2,202,y-2);
      });
      doc.save(`VRZ_Concluidos_${hoje.replace(/\//g,'-')}.pdf`);
    }catch(e){alert('Erro PDF: '+e.message);}
    setExportando(false);
  };
  const executarExclusao=async()=>{
    setConfirmar(false);setExcluindo(true);const tot=idsSel.length;setProg({atual:0,total:tot,msg:'Iniciando...'});let ok=0;
    for(const id of idsSel){try{await col('requests').doc(id).delete();ok++;setProg({atual:ok,total:tot,msg:`Excluindo ${ok}/${tot}...`});}catch(e){console.error(e);}if(ok%5===0)await new Promise(r=>setTimeout(r,100));}
    setProg({atual:tot,total:tot,msg:'Concluído!'});setSel({});await new Promise(r=>setTimeout(r,1200));setExcluindo(false);setProg({atual:0,total:0,msg:''});
  };
  return(
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20,paddingBottom:40}}>
      {confirmar&&(
        <div style={{position:'fixed',inset:0,zIndex:600,background:'rgba(0,0,0,.9)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',maxWidth:400,width:'100%'}}>
            <div style={{background:'var(--red)',padding:'24px 20px',textAlign:'center',color:'#fff'}}><div style={{width:52,height:52,background:'rgba(255,255,255,.2)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Icon name="trash-2" size={26}/></div><h3 style={{margin:0,fontSize:18,fontWeight:800}}>Confirmar Exclusão</h3><p style={{margin:0,fontSize:9,opacity:.8,textTransform:'uppercase',letterSpacing:'.08em',marginTop:4}}>Ação irreversível</p></div>
            <div style={{padding:20,display:'flex',flexDirection:'column',gap:14}}>
              <div style={{background:'var(--red-light)',border:'1px solid #FFBDBD',borderRadius:12,padding:16,textAlign:'center'}}><p style={{fontSize:36,fontWeight:800,color:'var(--red)',margin:0}}>{qtdSel}</p><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--red)',margin:0}}>pedidos serão excluídos</p></div>
              <p style={{fontSize:10,color:'var(--muted)',textAlign:'center'}}>Certifique-se de ter exportado antes.</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}><button onClick={()=>setConfirmar(false)} className="btn-ghost">Cancelar</button><button onClick={executarExclusao} className="btn-primary">Excluir definitivamente</button></div>
            </div>
          </div>
        </div>
      )}
      {excluindo&&(
        <div style={{position:'fixed',inset:0,zIndex:600,background:'rgba(0,0,0,.95)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,padding:36,textAlign:'center',maxWidth:320,width:'100%',display:'flex',flexDirection:'column',gap:16}}>
            <div style={{width:52,height:52,background:'var(--red-light)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}><Icon name="loader" size={26} className="spin"/></div>
            <h3 style={{fontSize:18,fontWeight:800,margin:0}}>Excluindo...</h3>
            <div className="progress-track"><div className="progress-fill" style={{width:prog.total>0?`${prog.atual/prog.total*100}%`:'0%',background:'var(--red)'}}/></div>
            <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>{prog.msg}</p>
          </div>
        </div>
      )}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        <div style={{background:'var(--ink)',borderRadius:16,padding:24,color:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
            <div style={{width:40,height:40,background:'#7C3AED',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="database" size={18}/></div>
            <div><p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.35)',margin:0}}>Pedidos no Firebase</p><p style={{fontSize:9,color:'rgba(255,255,255,.2)',margin:0}}>Limite ~{LIM.toLocaleString()}</p></div>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:44,fontWeight:800,lineHeight:1}}>{total.toLocaleString()}</span>
            <span style={{fontSize:10,color:'rgba(255,255,255,.4)',fontWeight:600}}>de ~{LIM.toLocaleString()}</span>
          </div>
          <div className="progress-track" style={{background:'rgba(255,255,255,.08)',marginBottom:6}}><div className="progress-fill" style={{width:`${pctPed}%`,background:corB}}/></div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:16}}><span style={{fontSize:8,fontWeight:800,textTransform:'uppercase',color:corB}}>{alerta}</span><span style={{fontSize:9,fontWeight:700,color:'rgba(255,255,255,.35)'}}>{pctPed.toFixed(1)}%</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,borderTop:'1px solid rgba(255,255,255,.08)',paddingTop:14}}>
            {[{l:'Ativos',v:ativos,c:'#2563EB'},{l:'Concluídos',v:totalConc,c:'#059669'},{l:'Restam',v:restam,c:'#7C3AED'}].map((m,i)=>(
              <div key={i} style={{textAlign:'center',background:'rgba(255,255,255,.05)',borderRadius:10,padding:'10px 8px'}}>
                <p style={{fontSize:26,fontWeight:800,lineHeight:1,margin:0,color:m.c}}>{m.v}</p>
                <p style={{fontSize:7,fontWeight:800,textTransform:'uppercase',color:'rgba(255,255,255,.3)',margin:'4px 0 0'}}>{m.l}</p>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{padding:20}}>
          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:16}}>
            <div style={{width:40,height:40,background:'var(--ink)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="hard-drive" size={18} style={{color:'#fff'}}/></div>
            <div><p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',margin:0}}>Storage Estimado</p><p style={{fontSize:9,color:'var(--muted)',margin:0}}>Foto ~800KB · Sem foto ~30KB</p></div>
          </div>
          <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:8}}><span style={{fontSize:36,fontWeight:800,lineHeight:1}}>{fmtBytes(bytesU)}</span><span style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>de 1 GB</span></div>
          <div className="progress-track" style={{marginBottom:6}}><div className="progress-fill" style={{width:`${pctSt}%`,background:pctSt>=85?'var(--red)':pctSt>=60?'#F59E0B':'#7C3AED'}}/></div>
          <p style={{fontSize:9,color:'var(--muted)',fontWeight:600,marginBottom:14}}>{pctSt.toFixed(1)}% usado</p>
          <div style={{background:'#FFFBE6',border:'1px solid #FFE680',borderRadius:10,padding:12}}><p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',color:'#856A00',margin:'0 0 4px'}}>💡 Dica</p><p style={{fontSize:9,color:'#856A00',fontWeight:600,lineHeight:1.5,margin:0}}>Arquive e exclua concluídos regularmente.</p></div>
        </div>
      </div>
      <div className="card" style={{overflow:'hidden'}}>
        <div style={{padding:'14px 16px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
          <div><p style={{fontSize:12,fontWeight:800,textTransform:'uppercase',margin:0}}>Arquivar Pedidos Concluídos</p><p style={{fontSize:9,color:'var(--muted)',fontWeight:600,margin:0,marginTop:2}}>Exporte e exclua para liberar capacidade</p></div>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {[{label:'Excel',icon:'file-spreadsheet',cb:exportCSV,bg:'#059669',disabled:!qtdSel},{label:'PDF',icon:'file-down',cb:exportPDF,bg:'#2563EB',disabled:!qtdSel||exportando,sp:exportando},{label:'Excluir',icon:'trash-2',cb:()=>qtdSel&&setConfirmar(true),bg:'var(--red)',disabled:!qtdSel||excluindo}].map((b,i)=>(
              <button key={i} onClick={b.cb} disabled={b.disabled} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:b.disabled?'var(--smoke)':b.bg,color:b.disabled?'var(--muted)':'#fff',border:'none',borderRadius:8,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:b.disabled?'not-allowed':'pointer'}}>
                {b.sp?<Icon name="loader" size={13} className="spin"/>:<Icon name={b.icon} size={13}/>} {b.label} ({qtdSel})
              </button>
            ))}
          </div>
        </div>
        {concluidos.length===0?(
          <div style={{padding:'48px 20px',textAlign:'center'}}><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Nenhum pedido totalmente concluído</p></div>
        ):(
          <>
            <div style={{overflowX:'auto'}}>
              <table className="vtable w-full" style={{minWidth:750}}>
                <thead><tr><th style={{width:40}}><input type="checkbox" checked={todosSel} onChange={toggleTodos} style={{width:15,height:15,accentColor:'var(--red)',cursor:'pointer'}}/></th>{['OS','Unidade','Veículo','Solicitante','Data','Itens','Valor'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                <tbody>
                  {concluidos.map(r=>{
                    const vT=(r.items||[]).reduce((a,it)=>a+parseFloat(it.price||0),0);
                    return(<tr key={r.id} onClick={()=>setSel(p=>({...p,[r.id]:!p[r.id]}))} style={{cursor:'pointer',background:sel[r.id]?'var(--red-light)':'transparent'}}>
                      <td onClick={e=>e.stopPropagation()}><input type="checkbox" checked={!!sel[r.id]} onChange={()=>setSel(p=>({...p,[r.id]:!p[r.id]}))} style={{width:15,height:15,accentColor:'var(--red)',cursor:'pointer'}}/></td>
                      <td style={{fontWeight:800,fontSize:13}}>#{r.os}</td><td><span className="pill" style={{fontSize:8}}>{r.unidade||'Unidade 1'}</span></td>
                      <td><p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',margin:0}}>{r.vehicleData?.modelo||'—'}</p><p className="mono" style={{fontSize:8,color:'var(--muted)',margin:0}}>{r.vehicleData?.chassi||''}</p></td>
                      <td style={{fontSize:10,fontWeight:600,textTransform:'uppercase',color:'var(--muted)'}}>{r.responsavel||'—'}</td>
                      <td style={{fontSize:10,color:'var(--muted)'}}>{r.timestamp?new Date(r.timestamp).toLocaleDateString('pt-BR'):'—'}</td>
                      <td style={{textAlign:'center'}}><span className="badge" style={{background:'var(--ink)',color:'#fff'}}>{r.items?.length||0}</span></td>
                      <td style={{fontSize:10,fontWeight:800,color:'#059669'}}>{vT>0?fmtBRL(vT):'—'}</td>
                    </tr>);
                  })}
                </tbody>
              </table>
            </div>
            <div style={{padding:'10px 16px',background:'var(--ink)',display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:10}}>
              <div style={{display:'flex',alignItems:'center',gap:16}}><p style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.4)',margin:0}}>{qtdSel} de {concluidos.length} selecionados</p>{qtdSel>0&&<p style={{fontSize:8,fontWeight:700,color:'#059669',margin:0}}>Libera ~{fmtBytes(estimarBytes(pedSel))}</p>}</div>
              <div style={{display:'flex',gap:8}}><button onClick={()=>setSel({})} style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.4)',background:'none',border:'none',cursor:'pointer',padding:'5px 10px',borderRadius:7}}>Limpar</button><button onClick={toggleTodos} style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.6)',background:'rgba(255,255,255,.06)',border:'none',cursor:'pointer',padding:'5px 12px',borderRadius:7}}>{todosSel?'Desmarcar todos':'Selecionar todos'}</button></div>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────────────
function LoginView({onLogin,usersList}){
  const[u,setU]=useState('');const[p,setP]=useState('');const[showP,setShowP]=useState(false);const[err,setErr]=useState('');
  const submit=e=>{
    e.preventDefault();
    const found=usersList.find(x=>x.user.toLowerCase()===u.trim().toLowerCase()&&x.pass===p.trim());
    if(found){if(found.active===false){setErr('Conta desativada. Contate o Admin.');}else{onLogin(found);}}
    else{setErr('Usuário ou senha incorretos.');}
  };
  return(
    <div className="login-bg" style={{height:'100vh',width:'100%',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
      <div style={{background:'#fff',width:'100%',maxWidth:380,borderRadius:24,overflow:'hidden',boxShadow:'0 40px 80px rgba(0,0,0,.4)',borderBottom:'6px solid var(--red)'}} className="fade-in">
        <div style={{background:'var(--ink)',padding:'40px 32px',textAlign:'center',color:'#fff'}}>
          <div style={{width:56,height:56,background:'var(--red)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',boxShadow:'0 8px 24px rgba(220,31,31,.4)'}}><Icon name="shopping-cart" size={28}/></div>
          <h1 style={{fontSize:36,fontWeight:800,margin:0,letterSpacing:'-.02em',color:'#fff'}}>VRZ Compras</h1>
          <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',letterSpacing:'.18em',color:'rgba(255,255,255,.3)',margin:'8px 0 0'}}>Acesso Restrito ao Sistema</p>
        </div>
        <form onSubmit={submit} style={{padding:32,display:'flex',flexDirection:'column',gap:20}}>
          {err&&(<div className="shake" style={{background:'var(--red-light)',border:'1px solid #FFBDBD',borderRadius:10,padding:'10px 14px',display:'flex',alignItems:'center',gap:8}}><Icon name="alert-circle" size={14}/><span style={{fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--red)'}}>{err}</span></div>)}
          <div style={{display:'flex',flexDirection:'column',gap:14}}>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.14em',color:'var(--muted)',display:'block',marginBottom:6}}>Usuário</label>
              <div style={{position:'relative'}}><div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><Icon name="user" size={15}/></div><input type="text" value={u} onChange={e=>setU(e.target.value)} className="input" style={{paddingLeft:38}} placeholder="USUÁRIO" required/></div>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.14em',color:'var(--muted)',display:'block',marginBottom:6}}>Senha</label>
              <div style={{position:'relative'}}><div style={{position:'absolute',left:12,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><Icon name="lock" size={15}/></div><input type={showP?'text':'password'} value={p} onChange={e=>setP(e.target.value)} className="input" style={{paddingLeft:38,paddingRight:40,letterSpacing:showP?'normal':'.2em'}} placeholder="••••••••" required/><button type="button" onClick={()=>setShowP(!showP)} style={{position:'absolute',right:12,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--muted)',padding:2}}>{showP?<Icon name="eye-off" size={15}/>:<Icon name="eye" size={15}/>}</button></div>
            </div>
          </div>
          <button type="submit" className="btn-primary" style={{width:'100%',padding:15,fontSize:11,letterSpacing:'.1em'}}>Entrar no Portal</button>
        </form>
      </div>
    </div>
  );
}

// ── App Principal ─────────────────────────────────────────────────────────
function App(){
  const[user,setUser]=useState(null);
  const[loggedIn,setLoggedIn]=useState(null);
  // MELHORIA 4: sempre abre em 'request'
  const[view,setView]=useState('request');
  const[subView,setSubView]=useState('pending');
  const[importData,setImportData]=useState([]);const[showImport,setShowImport]=useState(false);const[editing,setEditing]=useState(null);

  const{data:requests,loading:reqLoad}=useFirestore('requests');
  const{data:vehicles,loading:vehLoad}=useFirestore('vehicles');
  const{data:usersData,loading:usrLoad}=useFirestore('users');
  const[users,setUsers]=useState([]);
  const[initDone,setInitDone]=useState(false);

  // Sincroniza: usa APENAS dados do Firestore após seed inicial
  useEffect(()=>{
    if(usrLoad)return; // espera carregar
    if(!initDone){
      // Seed: cria no Firestore os usuários init que ainda não existem
      INIT_USERS.forEach(async iu=>{
        const exists=usersData.find(d=>d.user.toLowerCase()===iu.user.toLowerCase());
        if(!exists){
          try{await col('users').add(iu);}catch(e){console.warn('seed user:',e);}
        }
      });
      setInitDone(true);
    }
    // users é SEMPRE o que vem do Firestore — nada mais
    setUsers(usersData);
  },[usersData,usrLoad]);
  useEffect(()=>{const u=auth.onAuthStateChanged(u=>{if(u)setUser(u);else auth.signInAnonymously();});return u;},[]);

  const isAdmin=loggedIn?.role==='admin';const isSol=loggedIn?.role==='solicitante'||isAdmin;
  const addUser=async(u,p,role='solicitante')=>{try{await col('users').add({user:u,pass:p,active:true,role});}catch{alert('Erro.');}};
  const deleteUser=async(id,userObj)=>{
    if(!window.confirm('Remover usuário?'))return;
    const docId=userObj?.id||id;
    if(!docId||docId===userObj?.user){
      // Ainda não tem id do Firestore (improvável após seed) — remove só local
      setUsers(p=>p.filter(u=>u.id!==id&&u.user!==id));
      return;
    }
    try{
      await col('users').doc(docId).delete();
      // Firestore onSnapshot vai atualizar automaticamente
    }catch(e){
      console.error('deleteUser:',e);
      alert('Erro ao excluir: '+e.message);
    }
  };
  const toggleUser=async u=>{
    const s=!(u.active!==false);
    if(!u.id){setUsers(p=>p.map(x=>x.user===u.user?{...x,active:s}:x));return;}
    try{await col('users').doc(u.id).update({active:s});}
    catch(e){console.error(e);alert('Erro ao alterar status.');}
  };
  const changeRole=async(u,role)=>{
    if(!u.id){setUsers(p=>p.map(x=>x.user===u.user?{...x,role}:x));return;}
    try{await col('users').doc(u.id).update({role});}
    catch(e){console.error(e);alert('Erro ao alterar categoria.');}
  };

  // Permissões de rota por role
  const defaultViewForRole=(role)=>{
    if(role==='leitor')return 'status';
    return 'request'; // solicitante e admin
  };
  const login=u=>{
    const found=users.find(x=>x.user.toLowerCase()===u.user.toLowerCase()&&x.pass===u.pass);
    if(found){setLoggedIn(found);setView(defaultViewForRole(found.role));}
  };
  const logout=()=>{setLoggedIn(null);setView('request');};

  const handlePaste=e=>{
    const text=e.clipboardData.getData('text');const lines=text.split(/\r?\n/).filter(l=>l.trim());if(!lines.length)return;
    const headers=lines[0].split(/[,\t]/).map(h=>h.trim().toUpperCase());
    const fi=t=>headers.findIndex(h=>t.some(x=>h.includes(x)));
    const[iO,iM,iF,iC,iCh,iE,iL]=[fi(['OS']),fi(['MODELO']),fi(['FABRICANTE','MARCA']),fi(['COR']),fi(['CHASSI']),fi(['ETAPA']),fi(['LOCALIZA'])];
    const rows=(iO!==-1?lines.slice(1):lines).map(l=>{const v=l.split(/[,\t]/);const g=(i,fb)=>(i!==-1?v[i]:v[fb])?.trim()||'';return{os:g(iO,0),modelo:g(iM,1),fabricante:g(iF,2),cor:g(iC,3),chassi:g(iCh,4),etapa:g(iE,5),localizacao:g(iL,6)};}).filter(r=>r.os);
    setImportData(rows);
  };
  const commitImport=async()=>{
    if(!importData.length)return;const batch=db.batch();
    importData.forEach(v=>batch.set(col('vehicles').doc(v.os),v));
    await batch.commit();alert('Sucesso! '+importData.length+' veículos importados.');setImportData([]);setShowImport(false);
  };

  // MELHORIA 5: updateItem agora reconhece 'Comprado'
  // Regras: Valor+Loja+Prazo → Em Cotação; botão Comprado → Comprado; Data Real → Concluído
  const updateItem=async(reqId,idx,fields)=>{
    const req=requests.find(r=>r.id===reqId);if(!req)return;
    const newItems=[...req.items];const item={...newItems[idx],...fields};
    // Só muda status automaticamente se não foi definido explicitamente pelo campo 'status'
    if(!fields.status){
      if(item.actualDeliveryDate)item.status='Concluído';
      else if(item.boughtAt)item.status='Comprado';
      else if(item.price&&item.supplier&&item.deliveryDate)item.status='Em Cotação';
    }
    newItems[idx]=item;
    let gs='Concluído';
    if(newItems.some(it=>it.status==='Pendente'))gs='Pendente';
    else if(newItems.some(it=>it.status==='Em Cotação'))gs='Em Cotação';
    else if(newItems.some(it=>it.status==='Comprado'))gs='Comprado';
    else if(newItems.some(it=>it.status==='Doado'))gs='Doado';
    setEditing(p=>p?.id===reqId?{...p,items:newItems}:p);
    try{await col('requests').doc(reqId).update({items:newItems,status:gs});}catch{console.error('Erro ao atualizar item.');}
  };

  if(!loggedIn)return <LoginView onLogin={login} usersList={users}/>;

  // MELHORIA 5: tabCounts inclui 'comprado'
  const tabCounts={
    pending:requests.filter(r=>r.items?.some(it=>it.status==='Pendente')).length,
    quoting:requests.filter(r=>r.items?.some(it=>it.status==='Em Cotação')).length,
    bought:requests.filter(r=>r.items?.some(it=>it.status==='Comprado')).length,  // NOVO
    completed:requests.filter(r=>r.items?.every(it=>it.status==='Concluído'||it.status==='Doado')).length,
    donated:requests.filter(r=>r.items?.some(it=>it.status==='Doado')).length,
  };

  const navItems=[
    isSol&&{key:'request',icon:'plus-circle',label:'Nova Peça'},
    {key:'status',icon:'search',label:'Histórico'},
    isAdmin&&{key:'donor',icon:'git-merge',label:'Doações'},
    isAdmin&&{key:'admin',icon:'settings',label:'Gestão'},
    isAdmin&&{key:'dashboard',icon:'bar-chart-2',label:'Análises'},
  ].filter(Boolean);

  const loading=reqLoad||vehLoad||usrLoad;

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'row',background:'#FAFAF9',overflow:'hidden'}}>
      <NetworkStatus/>

      {/* Desktop Sidebar */}
      <nav style={{display:'none',width:220,background:'#0D0D0D',padding:'20px 14px',flexDirection:'column',gap:4,flexShrink:0}} id="desktop-nav">
        <style>{`@media(min-width:768px){#desktop-nav{display:flex!important}}`}</style>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'6px 6px 20px',borderBottom:'1px solid rgba(255,255,255,.08)',marginBottom:8}}>
          <div style={{width:36,height:36,background:'var(--red)',borderRadius:10,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 4px 12px rgba(220,31,31,.3)'}}><Icon name="shopping-cart" size={18}/></div>
          <div><p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.14em',color:'rgba(255,255,255,.3)',margin:0,lineHeight:1}}>Portal Compras</p><h1 style={{fontSize:20,fontWeight:800,margin:0,lineHeight:1.1,color:'#fff',letterSpacing:'-.01em'}}>VRZ</h1></div>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:2}}>
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>setView(n.key)} className={`nav-item ${view===n.key?'active':''}`}>
              <div className="nav-icon"><Icon name={n.icon} size={15}/></div>{n.label}
            </button>
          ))}
        </div>
        <div style={{background:'rgba(255,255,255,.06)',borderRadius:12,padding:12,border:'1px solid rgba(255,255,255,.1)'}}>
          <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>Logado como</p>
          <p style={{fontSize:11,fontWeight:800,textTransform:'uppercase',color:'var(--red)',margin:'0 0 6px',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loggedIn.user}</p>
          <div style={{marginBottom:10}}><RoleBadge role={loggedIn.role}/></div>
          <button onClick={logout} style={{width:'100%',padding:7,background:'rgba(255,255,255,.08)',border:'1px solid rgba(255,255,255,.12)',borderRadius:8,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer',color:'rgba(255,255,255,.5)',transition:'all .15s',fontFamily:'Plus Jakarta Sans,sans-serif'}} onMouseEnter={e=>{e.currentTarget.style.background='var(--red)';e.currentTarget.style.color='#fff';e.currentTarget.style.borderColor='var(--red)';}} onMouseLeave={e=>{e.currentTarget.style.background='rgba(255,255,255,.08)';e.currentTarget.style.color='rgba(255,255,255,.5)';e.currentTarget.style.borderColor='rgba(255,255,255,.12)';}}>Sair</button>
        </div>
        <div style={{textAlign:'center',paddingTop:6}}>
          <span style={{fontSize:8,fontWeight:700,color:user?'var(--red)':'rgba(255,255,255,.25)',display:'flex',alignItems:'center',justifyContent:'center',gap:5}}>
            <span className="pulse-beacon" style={{width:6,height:6,borderRadius:'50%',background:user?'var(--red)':'var(--muted)',display:'inline-block'}}/>{user?'ONLINE':'RECONECTANDO...'}
          </span>
        </div>
      </nav>

      {/* Mobile Header */}
      <div id="mobile-header"><style>{`@media(min-width:768px){#mobile-header{display:none!important}}`}</style>
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:100,background:'#fff',borderBottom:'1px solid var(--border)',padding:'10px 16px',display:'flex',alignItems:'center',justifyContent:'space-between',boxShadow:'0 2px 16px rgba(0,0,0,.06)'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{width:32,height:32,background:'var(--red)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="shopping-cart" size={15}/></div>
            <h1 style={{fontSize:20,fontWeight:800,margin:0,letterSpacing:'-.01em'}}>VRZ</h1>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <div style={{textAlign:'right'}}><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--red)',margin:0,maxWidth:100,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{loggedIn.user}</p><RoleBadge role={loggedIn.role}/></div>
            <button onClick={logout} style={{width:34,height:34,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:9,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer'}}><Icon name="log-out" size={15}/></button>
          </div>
        </div>
      </div>

      {/* Main */}
      <main style={{flex:1,overflowY:'auto',minWidth:0}} className="scroll-y">
        <div style={{padding:16,paddingTop:0}} id="main-pad">
          <style>{`@media(min-width:768px){#main-pad{padding:28px!important}}@media(max-width:767px){#main-pad{padding-top:64px!important;padding-bottom:80px!important}}`}</style>
          <div style={{maxWidth:1100,margin:'0 auto'}}>
            {loading?<Skeleton/>:(
              <>
                {view==='dashboard'&&isAdmin&&<DashboardView requests={requests}/>}
                {view==='request'&&isSol&&<RequestForm user={user} loggedInUser={loggedIn} vehiclesDB={vehicles} requests={requests}/>}
                {view==='status'&&<StatusView requests={requests} isAdmin={isAdmin}/>}
                {view==='donor'&&isAdmin&&<DonorSystem requests={requests} vehicles={vehicles} loggedInUser={loggedIn}/>}
                {view==='admin'&&isAdmin&&(
                  <div className="fade-up" style={{paddingBottom:40}}>
                    <div style={{marginBottom:16}}>
                      <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Administração</p>
                      <h2 style={{fontSize:32,fontWeight:800,margin:'0 0 16px',letterSpacing:'-.02em'}}>Gestão de Compras</h2>
                    </div>
                    <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
                      <button onClick={()=>setShowImport(true)} style={{display:'flex',alignItems:'center',gap:8,padding:'10px 18px',background:'var(--ink)',color:'#fff',border:'none',borderRadius:10,fontSize:10,fontWeight:800,textTransform:'uppercase',cursor:'pointer',letterSpacing:'.08em',borderBottom:'3px solid var(--red)'}}>
                        <Icon name="file-up" size={14}/> Importar Planilha
                      </button>
                    </div>
                    {/* Tab bar — MELHORIA 5: inclui "Comprado" */}
                    <div style={{display:'flex',gap:4,background:'var(--smoke)',padding:4,borderRadius:12,border:'1px solid var(--border)',overflowX:'auto',marginBottom:20}}>
                      {[
                        {key:'pending',label:`Pendentes (${tabCounts.pending})`,color:'#C45E00'},
                        {key:'quoting',label:`Em Cotação (${tabCounts.quoting})`,color:'#1A4EC2'},
                        {key:'bought',label:`Comprado (${tabCounts.bought})`,color:'#6B21A8'},  // NOVO
                        {key:'completed',label:`Concluídos (${tabCounts.completed})`,color:'#0A6B34'},
                        {key:'donated',label:`Doados (${tabCounts.donated})`,color:'#A81515'},
                        {key:'vehicles',label:`Veículos (${vehicles.length})`,color:'var(--ink)'},
                        {key:'users',label:'Usuários',color:'var(--red)'},
                        {key:'storage',label:'Capacidade',color:'#7C3AED'},
                      ].map(t=>(
                        <button key={t.key} onClick={()=>setSubView(t.key)} style={{padding:'8px 14px',borderRadius:9,fontSize:9,fontWeight:800,textTransform:'uppercase',whiteSpace:'nowrap',border:'none',cursor:'pointer',letterSpacing:'.06em',transition:'all .15s',background:subView===t.key?'#fff':'transparent',color:subView===t.key?t.color:'var(--muted)',boxShadow:subView===t.key?'0 2px 8px rgba(0,0,0,.08)':'none',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                          {t.label}
                        </button>
                      ))}
                    </div>

                    {subView==='users'&&<UserManagement users={users} onAdd={addUser} onDelete={deleteUser} onToggle={toggleUser} onRole={changeRole}/>}
                    {subView==='storage'&&<StorageView requests={requests}/>}
                    {subView==='vehicles'&&(
                      <div className="card" style={{overflow:'hidden'}}>
                        <div style={{overflowX:'auto',maxHeight:'60vh'}} className="scroll-y">
                          <table className="vtable w-full" style={{minWidth:900}}>
                            <thead style={{position:'sticky',top:0}}><tr>{['OS','Modelo','Fabricante','Cor','Chassi','Etapa','Localização'].map(h=><th key={h}>{h}</th>)}</tr></thead>
                            <tbody>
                              {vehicles.length===0?<tr><td colSpan="7" style={{padding:40,textAlign:'center',fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)'}}>Nenhum veículo cadastrado</td></tr>:vehicles.map((v,i)=>(
                                <tr key={i}>
                                  <td style={{fontWeight:800,fontSize:13}}>#{v.os}</td><td style={{fontWeight:600,textTransform:'uppercase'}}>{v.modelo}</td><td style={{textTransform:'uppercase'}}>{v.fabricante}</td><td style={{textTransform:'uppercase'}}>{v.cor}</td>
                                  <td className="mono" style={{fontSize:10,fontWeight:700,letterSpacing:'.06em'}}>{v.chassi}</td>
                                  <td><span className="badge badge-pending">{v.etapa}</span></td><td style={{textTransform:'uppercase'}}>{v.localizacao}</td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>
                      </div>
                    )}

                    {/* Lista de pedidos — mesclada por OS */}
                    {['pending','quoting','bought','completed','donated'].includes(subView)&&(()=>{
                      const merged=mergeByOS(requests);
                      const filtered=merged.filter(req=>{
                        if(subView==='pending')return req.items?.some(it=>it.status==='Pendente');
                        if(subView==='quoting')return req.items?.some(it=>it.status==='Em Cotação');
                        if(subView==='bought')return req.items?.some(it=>it.status==='Comprado');
                        if(subView==='donated')return req.items?.some(it=>it.status==='Doado');
                        return req.items?.every(it=>it.status==='Concluído'||it.status==='Doado');
                      });
                      const accentCol=subView==='pending'?'#C45E00':subView==='quoting'?'#1A4EC2':subView==='bought'?'#6B21A8':subView==='donated'?'#A81515':'#0A6B34';
                      return(
                        <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:12}}>
                          {filtered.length===0&&<div style={{padding:'48px 20px',textAlign:'center',background:'#fff',borderRadius:14,border:'1.5px dashed var(--border)'}}><p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Nenhum pedido nesta categoria</p></div>}
                          {filtered.map(req=>(
                            <div key={req.os} className="card" style={{display:'flex',alignItems:'center',gap:16,padding:'14px 16px',borderLeft:`3px solid ${accentCol}`}}>
                              <div style={{textAlign:'center',flexShrink:0}}>
                                <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>OS</p>
                                <p style={{fontSize:16,fontWeight:800,margin:0}}>#{req.os}</p>
                                <p style={{fontSize:8,color:'var(--muted)',fontWeight:600,margin:0}}>{req.unidade||'Unidade 1'}</p>
                                {req._merged&&<span style={{fontSize:7,fontWeight:800,padding:'1px 5px',borderRadius:999,background:'#EAF0FF',color:'#1A4EC2',border:'1px solid #C0D0F5',display:'inline-block',marginTop:3}}>Mesclado</span>}
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:'0 0 6px'}}>Itens ({req.items?.length||0}) · {req.vehicleData?.modelo||'—'}</p>
                                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
                                  {req.items?.map((it,i)=>(
                                    <span key={i} style={{display:'inline-flex',flexDirection:'column',gap:2,background:it.status==='Concluído'?'#0A6B3410':it.status==='Doado'?'#FFF0F0':it.status==='Comprado'?'#F3E8FF':it.status==='Em Cotação'?'#EAF0FF':'#FFF4E6',border:`1px solid ${it.status==='Concluído'?'#AAE6C5':it.status==='Doado'?'#FFBDBD':it.status==='Comprado'?'#D8B4FE':it.status==='Em Cotação'?'#C0D0F5':'#FFD9A8'}`,borderRadius:7,padding:'4px 8px',fontSize:9,fontWeight:700,textTransform:'uppercase',color:it.status==='Concluído'?'#0A6B34':it.status==='Doado'?'var(--red)':it.status==='Comprado'?'#6B21A8':it.status==='Em Cotação'?'#1A4EC2':'#C45E00'}}>
                                      <span>{it.description}</span>
                                      {it.receivedFrom&&<span style={{fontSize:7,fontWeight:700,opacity:.8}}>← Recebida da OS #{it.receivedFrom}</span>}
                                      {it.donatedTo&&!it.receivedFrom&&<span style={{fontSize:7,fontWeight:700,opacity:.8}}>→ Doada p/ OS #{it.donatedTo}</span>}
                                    </span>
                                  ))}
                                </div>
                              </div>
                              <button onClick={()=>setEditing(req)} style={{display:'flex',alignItems:'center',gap:6,padding:'9px 16px',background:'var(--ink)',color:'#fff',border:'none',borderBottom:'3px solid var(--red)',borderRadius:10,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer',flexShrink:0,fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                                <Icon name="edit-2" size={13}/> Gerenciar
                              </button>
                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      </main>

      {/* Mobile Bottom Nav */}
      <div id="mobile-bottom"><style>{`@media(min-width:768px){#mobile-bottom{display:none!important}}`}</style>
        <div className="bottom-nav">
          {navItems.map(n=>(
            <button key={n.key} onClick={()=>setView(n.key)} className={`bottom-nav-btn ${view===n.key?'active':''}`}>
              <Icon name={n.icon} size={21}/><span>{n.label}</span>
            </button>
          ))}
        </div>
      </div>

      {/* Import Modal */}
      {showImport&&isAdmin&&(
        <div style={{position:'fixed',inset:0,zIndex:300,background:'rgba(0,0,0,.9)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',width:'100%',maxWidth:1000,height:'82vh',borderRadius:24,overflow:'hidden',boxShadow:'0 40px 80px rgba(0,0,0,.5)',display:'flex',flexDirection:'column'}}>
            <div style={{padding:'20px 28px',background:'var(--ink)',display:'flex',justifyContent:'space-between',alignItems:'center',borderBottom:'4px solid var(--red)',flexShrink:0}}>
              <div><h3 style={{margin:0,fontSize:20,fontWeight:800,color:'#fff'}}>Importar Planilha</h3><p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.35)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>Cole os dados do Excel (Ctrl+V)</p></div>
              <button onClick={()=>{setShowImport(false);setImportData([]);}} style={{width:38,height:38,background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={20}/></button>
            </div>
            <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',padding:20,gap:16}}>
              {importData.length===0?(
                <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',border:'2px dashed var(--border)',borderRadius:16,background:'var(--smoke)',position:'relative'}}>
                  <Icon name="file-spreadsheet" size={52} style={{color:'var(--border)',marginBottom:12}}/>
                  <p style={{fontSize:12,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Pronto para importar</p>
                  <p style={{fontSize:10,color:'var(--muted)',margin:'4px 0 0'}}>Selecione no Excel e CTRL+V</p>
                  <textarea onPaste={handlePaste} style={{position:'absolute',inset:0,opacity:0,cursor:'pointer',resize:'none'}} autoFocus/>
                </div>
              ):(
                <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
                  <div style={{flex:1,overflow:'auto',border:'1px solid var(--border)',borderRadius:12}} className="scroll-y">
                    <table style={{width:'100%',borderCollapse:'collapse',minWidth:900}}>
                      <thead style={{background:'var(--smoke)',position:'sticky',top:0}}>
                        <tr>{['OS','Modelo','Fabricante','Cor','Chassi','Etapa','Localização'].map(h=><th key={h} style={{padding:10,fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',textAlign:'left',borderBottom:'1px solid var(--border)'}}>{h}</th>)}</tr>
                      </thead>
                      <tbody>
                        {importData.map((row,rIdx)=>(
                          <tr key={rIdx} style={{borderBottom:'1px solid var(--smoke)'}}>
                            {['os','modelo','fabricante','cor','chassi','etapa','localizacao'].map(k=>(
                              <td key={k} style={{border:'none',padding:0,height:36}}><input className="excel-input" value={row[k]} onChange={e=>{const d=[...importData];d[rIdx][k]=sanitize(e.target.value);setImportData(d);}}/></td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                  <div style={{paddingTop:14,display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                    <p style={{fontSize:10,color:'var(--muted)',fontWeight:600}}>{importData.length} registros</p>
                    <div style={{display:'flex',gap:10}}><button onClick={()=>setImportData([])} className="btn-ghost">Limpar</button><button onClick={commitImport} className="btn-primary" style={{padding:'11px 28px'}}>Sincronizar</button></div>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* Editing Modal — MELHORIA 5: botão "Já foi comprado?" em itens Em Cotação */}
      {editing&&isAdmin&&(
        <div style={{position:'fixed',inset:0,zIndex:200,background:'rgba(0,0,0,.9)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',padding:16,overflowY:'auto'}}>
          <div style={{background:'#fff',width:'100%',maxWidth:1000,borderRadius:24,boxShadow:'0 40px 80px rgba(0,0,0,.5)',display:'flex',flexDirection:'column',margin:'auto',borderBottom:'5px solid var(--red)'}}>
            <div style={{padding:'20px 28px',background:'var(--ink)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <div>
                <div style={{display:'flex',alignItems:'center',gap:10}}>
                  <h3 style={{margin:0,fontSize:18,fontWeight:800,color:'#fff'}}>OS #{editing.os}</h3>
                  <span style={{padding:'3px 10px',borderRadius:999,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.5)',border:'1px solid rgba(255,255,255,.12)',fontSize:8,fontWeight:800}}>{editing.unidade||'Unidade 1'}</span>
                </div>
                <p style={{margin:0,fontSize:9,color:'var(--red)',fontWeight:700,textTransform:'uppercase',marginTop:4}}>{editing.vehicleData?.modelo||''}{editing.vehicleData?.chassi?' · '+editing.vehicleData.chassi:''}</p>
              </div>
              <button onClick={()=>setEditing(null)} style={{width:38,height:38,background:'rgba(255,255,255,.08)',border:'none',borderRadius:10,cursor:'pointer',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center'}}><Icon name="x" size={20}/></button>
            </div>
            <div style={{padding:24,overflowY:'auto',maxHeight:'68vh'}} className="scroll-y">
              {editing.items?.map((it,idx)=>(
                <div key={idx} style={{background:it.status==='Doado'?'var(--red-light)':it.status==='Comprado'?'#F5F0FF':'var(--smoke)',borderRadius:14,padding:18,border:`1.5px solid ${it.status==='Doado'?'#FFBDBD':it.status==='Comprado'?'#D8B4FE':'var(--border)'}`,marginBottom:12}}>
                  <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:14}}>
                    {it.photo?<img src={it.photo} style={{width:48,height:48,borderRadius:10,objectFit:'cover',border:'1px solid var(--border)',flexShrink:0}} alt="Peça"/>:<div style={{width:48,height:48,borderRadius:10,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="package" size={18}/></div>}
                    <div style={{minWidth:0,flex:1}}>
                      <p style={{fontSize:12,fontWeight:700,textTransform:'uppercase',margin:'0 0 6px',lineHeight:1.2}}>{it.description}</p>
                      <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                        <span style={{fontSize:9,color:'var(--muted)',fontWeight:600}}>QTD:{it.quantity}</span>
                        <StatusBadge status={it.status||'Pendente'} orig={it.statusOriginal}/>
                        {it.receivedFrom&&(
                          <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',background:'#EDFAF3',border:'1px solid #AAE6C5',borderRadius:6,fontSize:8,fontWeight:800,color:'#0A6B34'}}>
                            <Icon name="arrow-left" size={10}/> Recebida da OS #{it.receivedFrom}
                          </span>
                        )}
                        {it.donatedTo&&!it.receivedFrom&&(
                          <span style={{display:'inline-flex',alignItems:'center',gap:3,padding:'2px 7px',background:'#FFF0F0',border:'1px solid #FFBDBD',borderRadius:6,fontSize:8,fontWeight:800,color:'var(--red)'}}>
                            <Icon name="arrow-right" size={10}/> Doada para OS #{it.donatedTo}
                          </span>
                        )}
                        {/* MELHORIA 5: botão "Já foi comprado?" aparece em Em Cotação */}
                        {it.status==='Em Cotação'&&(
                          <button onClick={()=>updateItem(editing.id,idx,{status:'Comprado',boughtAt:new Date().toISOString().slice(0,10)})} className="btn-bought">
                            <Icon name="shopping-bag" size={12}/> Já foi comprado?
                          </button>
                        )}
                        {/* Volta para Em Cotação se quiser */}
                        {it.status==='Comprado'&&(
                          <button onClick={()=>updateItem(editing.id,idx,{status:'Em Cotação',boughtAt:null})} style={{fontSize:8,fontWeight:700,padding:'3px 8px',borderRadius:6,border:'1px solid #D8B4FE',background:'#F5F0FF',color:'#6B21A8',cursor:'pointer',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                            ↩ Desfazer
                          </button>
                        )}
                      </div>
                      {it.boughtAt&&<p style={{fontSize:8,color:'#6B21A8',fontWeight:700,margin:'4px 0 0'}}>🛍 Comprado em {it.boughtAt}</p>}
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10}} className="md-4col">
                    <style>{`@media(min-width:768px){.md-4col{grid-template-columns:repeat(4,1fr)!important}}`}</style>
                    {[
                      {label:'Valor Total',type:'number',key:'price',placeholder:'0.00',step:'0.01',disabled:it.status==='Concluído'||it.status==='Doado'},
                      {label:'Fornecedor',type:'text',key:'supplier',placeholder:'Loja',disabled:it.status==='Concluído'||it.status==='Doado'},
                      {label:'Prazo',type:'date',key:'deliveryDate',disabled:it.status==='Concluído'||it.status==='Doado'},
                      {label:'Entrega Real',type:'date',key:'actualDeliveryDate',red:true,disabled:it.status==='Pendente'||it.status==='Doado'},
                    ].map(f=>(
                      <div key={f.key}>
                        <label style={{fontSize:7,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:f.red?'var(--red)':'var(--muted)',display:'block',marginBottom:5}}>{f.label}</label>
                        <input type={f.type} step={f.step} value={it[f.key]||''} onChange={e=>updateItem(editing.id,idx,{[f.key]:sanitize(e.target.value)})} disabled={f.disabled} className="input" style={{fontSize:11,background:f.red?'var(--red-light)':'#fff',borderColor:f.red?'#FFBDBD':'var(--border)',opacity:f.disabled?.6:1}}/>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div style={{padding:'16px 24px',background:'var(--smoke)',borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
              <p style={{fontSize:8,color:'var(--muted)',fontWeight:600,fontStyle:'italic',margin:0}}>* Valor + Loja + Prazo → Em Cotação · "Já foi comprado?" → Comprado · Data Real → Concluído</p>
              <button onClick={()=>setEditing(null)} className="btn-primary" style={{padding:'11px 28px'}}>Fechar e Sincronizar</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
