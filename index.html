<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Compras VRZ</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            background: #f1f5f9; 
            overflow: hidden; 
        }

        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .text-wrap-anywhere { overflow-wrap: anywhere; word-break: break-word; }
        
        /* Efeito de planilha */
        .excel-input { 
            border: none; 
            width: 100%; 
            height: 100%; 
            padding: 4px 8px; 
            background: transparent; 
            font-size: 11px;
            outline: none;
        }
        .excel-input:focus { background: #fffbeb; box-shadow: inset 0 0 0 2px #ef4444; }
        
        /* Fonte para o Chassi */
        .font-chassi { font-family: 'JetBrains Mono', monospace; }
    </style>

    <!-- Bibliotecas Externas -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <!-- Ícones -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBT1N43mp6hoxXOj6bmTlqouQWSmfn32-E",
            authDomain: "portal-compras-vrz.firebaseapp.com",
            projectId: "portal-compras-vrz",
            storageBucket: "portal-compras-vrz.firebasestorage.app",
            messagingSenderId: "713014398002",
            appId: "1:713014398002:web:d89f485af020178b00002b"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const appId = 'portal-compras-vrz';

        const { useState, useEffect, useMemo, useRef } = React;

        function Icon({ name, className = "", size = 18 }) {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    const iconData = window.lucide.icons[name];
                    if (iconData) {
                        const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                        const [tag, attrs, children] = iconData;
                        Object.entries({...attrs, width: size, height: size, class: `lucide lucide-${name} ${className}`, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", "stroke-width": 2, "stroke-linecap": "round", "stroke-linejoin": "round"}).forEach(([k, v]) => svg.setAttribute(k, v));
                        children.forEach(([ct, ca]) => {
                            const c = document.createElementNS("http://www.w3.org/2000/svg", ct);
                            Object.entries(ca).forEach(([k, v]) => c.setAttribute(k, v));
                            svg.appendChild(c);
                        });
                        iconRef.current.innerHTML = '';
                        iconRef.current.appendChild(svg);
                    }
                }
            }, [name, className, size]);
            return <span ref={iconRef} className="inline-flex shrink-0 items-center justify-center"></span>;
        }

        function NavItem({ iconName, label, active, onClick }) {
            return (
                <button onClick={onClick} className={`w-full flex items-center gap-3 px-4 py-2.5 rounded-xl transition-all duration-300 group ${active ? 'bg-red-600 text-white shadow-lg' : 'hover:bg-white/5 text-neutral-400 hover:text-white'}`}>
                    <Icon name={iconName} className={active ? 'text-white' : 'text-red-500'} size={16} />
                    <span className="text-[10px] font-black uppercase tracking-wider">{label}</span>
                </button>
            );
        }

        function StatusBadge({ status }) {
            const configs = {
                'Pendente': 'bg-orange-500 text-white border-orange-500',
                'Em Cotação': 'bg-blue-600 text-white border-blue-600',
                'Concluído': 'bg-black text-white border-neutral-800'
            };
            return <span className={`px-2 py-0.5 rounded-md text-[8px] font-black uppercase tracking-tighter border ${configs[status] || 'bg-neutral-400 text-white'}`}>{status}</span>;
        }

        function RequestForm({ user, vehiclesDB }) {
            const [os, setOs] = useState('');
            const [responsavel, setResponsavel] = useState('');
            const [localizacao, setLocalizacao] = useState('');
            const [vehicle, setVehicle] = useState(null);
            const [items, setItems] = useState([{ id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }]);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submitted, setSubmitted] = useState(false);

            const handleOSBlur = () => {
                const found = vehiclesDB.find(v => String(v.os).trim() === String(os).trim());
                if (found) setVehicle(found);
                else { setVehicle(null); if(os.length > 0) alert('OS não cadastrada.'); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!vehicle || !responsavel) return alert('Informe OS e Responsável.');
                if (items.some(i => !i.photo)) return alert('Anexe a foto de cada item.');
                setIsSubmitting(true);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests').add({
                        os, responsavel, localizacaoSolicitacao: localizacao, vehicleData: vehicle, items,
                        timestamp: Date.now(), status: 'Pendente', userId: user.uid
                    });
                    setSubmitted(true);
                } catch (err) { alert('Erro no servidor.'); } finally { setIsSubmitting(false); }
            };

            if (submitted) return (
                <div className="flex flex-col items-center justify-center py-10 fade-in bg-white rounded-3xl border border-neutral-200 p-8 shadow-sm max-md mx-auto text-center">
                    <Icon name="check-circle" size={48} className="text-emerald-500 mb-4" />
                    <h2 className="text-xl font-black uppercase tracking-tight">Pedido Protocolado!</h2>
                    <button onClick={() => setSubmitted(false)} className="mt-8 w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-red-700">Nova Solicitação</button>
                </div>
            );

            return (
                <div className="space-y-4 fade-in text-wrap-anywhere">
                    <div className="flex flex-col">
                        <h2 className="text-2xl font-black text-black tracking-tighter uppercase leading-none">Nova Requisição</h2>
                        <span className="text-[9px] font-bold text-neutral-400 uppercase mt-1 tracking-widest italic">Operacional VRZ</span>
                    </div>

                    <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="bg-white p-4 rounded-2xl border border-neutral-200 shadow-sm grid grid-cols-1 md:grid-cols-5 gap-4">
                            <div className="md:col-span-2 space-y-3">
                                <div>
                                    <label className="text-[8px] font-black text-neutral-400 uppercase tracking-widest block mb-1">Ordem de Serviço (OS)</label>
                                    <input type="text" value={os} onChange={(e) => setOs(e.target.value)} onBlur={handleOSBlur} placeholder="Nº OS" className="w-full px-3 py-2 bg-neutral-50 border-2 rounded-xl focus:border-red-600 outline-none font-black text-base" required />
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <input type="text" value={responsavel} onChange={(e) => setResponsavel(e.target.value)} placeholder="SOLICITANTE" className="w-full px-3 py-2 bg-neutral-50 border border-neutral-200 rounded-lg font-black uppercase text-[9px] focus:border-red-600 outline-none" required />
                                    <input type="text" value={localizacao} onChange={(e) => setLocalizacao(e.target.value)} placeholder="SETOR" className="w-full px-3 py-2 bg-neutral-50 border border-neutral-200 rounded-lg font-black uppercase text-[9px] focus:border-red-600 outline-none" required />
                                </div>
                            </div>
                            <div className="md:col-span-3 bg-neutral-950 rounded-xl p-5 text-white border-l-[10px] border-red-600 shadow-2xl flex flex-col justify-center min-h-[140px]">
                                {vehicle ? (
                                    <div className="flex flex-col gap-4 w-full">
                                        <div className="grid grid-cols-2 gap-4 border-b border-white/5 pb-3">
                                            <div className="min-w-0"><span className="text-neutral-500 text-[8px] font-black uppercase block mb-0.5 tracking-widest">Modelo</span><span className="text-white text-sm font-black uppercase truncate block leading-none text-wrap-anywhere">{vehicle.modelo}</span></div>
                                            <div className="min-w-0"><span className="text-neutral-500 text-[8px] font-black uppercase block mb-0.5 tracking-widest">Fabricante</span><span className="text-white text-xs font-bold uppercase truncate block leading-none text-wrap-anywhere">{vehicle.fabricante || 'N/A'}</span></div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 pb-3">
                                            <div><span className="text-neutral-500 text-[8px] font-black uppercase block mb-0.5 tracking-widest">Etapa</span><span className="text-red-500 text-[10px] font-black uppercase block leading-none">{vehicle.etapa}</span></div>
                                            <div><span className="text-neutral-500 text-[8px] font-black uppercase block mb-0.5 tracking-widest">Cor</span><span className="text-white text-[10px] font-bold uppercase block leading-none">{vehicle.cor}</span></div>
                                            <div><span className="text-neutral-500 text-[8px] font-black uppercase block mb-0.5 tracking-widest">Local</span><span className="text-white text-[10px] font-bold uppercase block leading-none">{vehicle.localizacao}</span></div>
                                        </div>
                                        <div className="bg-white/5 p-3 rounded-xl border border-white/10">
                                            <span className="text-neutral-500 text-[8px] font-black uppercase block mb-1.5 tracking-[0.2em] text-center">Número do Chassi</span>
                                            <span className="text-white font-chassi text-base font-black tracking-[0.15em] block text-center leading-none select-all">{vehicle.chassi}</span>
                                        </div>
                                    </div>
                                ) : <div className="w-full text-center space-y-2"><div className="w-10 h-10 bg-white/5 rounded-full flex items-center justify-center mx-auto mb-2"><Icon name="search" size={20} className="text-neutral-700" /></div><p className="text-neutral-600 text-[9px] font-black uppercase tracking-[0.3em] italic leading-none">Aguardando OS...</p></div>}
                            </div>
                        </div>

                        <div className="space-y-3">
                            <div className="flex justify-between items-center px-1">
                                <h3 className="font-black text-black uppercase text-[10px] flex items-center gap-2"><Icon name="package" size={14} /> Peças Necessárias</h3>
                                <button type="button" onClick={() => setItems([...items, {id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente'}])} className="bg-red-600 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase tracking-widest shadow-sm hover:bg-red-700">+ ITEM</button>
                            </div>
                            <div className="grid grid-cols-1 gap-2">
                                {items.map((it, idx) => (
                                    <div key={it.id} className="bg-white p-3 rounded-xl border border-neutral-200 shadow-sm relative grid grid-cols-1 md:grid-cols-12 gap-4 items-end text-wrap-anywhere">
                                        <div className="md:col-span-2">
                                            <label className="text-[8px] font-black text-neutral-400 uppercase block mb-1">Qtd</label>
                                            <input type="number" min="1" value={it.quantity} onChange={(e) => setItems(prev => prev.map(i => i.id === it.id ? {...i, quantity: e.target.value} : i))} className="w-full p-2 bg-neutral-50 border rounded-lg font-black text-center text-sm" />
                                        </div>
                                        <div className="md:col-span-7">
                                            <label className="text-[8px] font-black text-neutral-400 uppercase block mb-1 text-wrap-anywhere">Descrição da Peça</label>
                                            <input type="text" value={it.description} onChange={(e) => setItems(prev => prev.map(i => i.id === it.id ? {...i, description: e.target.value} : i))} placeholder="NOME DA PEÇA" className="w-full p-2 bg-neutral-50 border rounded-lg font-black text-[10px] uppercase focus:border-red-600 outline-none" required />
                                        </div>
                                        <div className="md:col-span-3 text-center">
                                            <label className="text-[8px] font-black text-neutral-400 uppercase block mb-1 text-red-600">Foto</label>
                                            {it.photo ? (
                                                <div className="relative h-12 rounded-lg overflow-hidden border group shadow-inner"><img src={it.photo} className="h-full w-full object-cover" /><button type="button" onClick={() => setItems(prev => prev.map(i => i.id === it.id ? {...i, photo: null} : i))} className="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100"><Icon name="x" className="text-white" size={14} /></button></div>
                                            ) : (
                                                <label className="h-12 flex flex-col items-center justify-center border-2 border-dashed border-neutral-200 rounded-lg cursor-pointer hover:bg-red-50 transition-all bg-neutral-50"><Icon name="camera" className="text-neutral-400" size={24} /><input type="file" accept="image/*" onChange={(e) => { const r = new FileReader(); r.onload = () => setItems(prev => prev.map(i => i.id === it.id ? {...i, photo: r.result} : i)); if(e.target.files[0]) r.readAsDataURL(e.target.files[0]); }} className="hidden" required /></label>
                                            )}
                                        </div>
                                        {items.length > 1 && <button type="button" onClick={() => setItems(items.filter(i => i.id !== it.id))} className="absolute top-1 right-1 text-neutral-300 hover:text-red-600"><Icon name="trash-2" size={14} /></button>}
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button disabled={isSubmitting || !vehicle} className={`w-full py-4 rounded-xl font-black text-base uppercase flex items-center justify-center gap-3 shadow-lg ${isSubmitting || !vehicle ? 'bg-neutral-200 text-neutral-400' : 'bg-red-600 text-white border-b-4 border-red-800 hover:bg-red-700 active:translate-y-1 active:border-b-0'}`}>{isSubmitting ? <Icon name="refresh-cw" className="animate-spin" size={18} /> : 'Finalizar Pedido'}</button>
                    </form>
                </div>
            );
        }

        function StatusView({ requests }) {
            const [search, setSearch] = useState('');
            const filtered = useMemo(() => requests.filter(r => {
                const t = search.toLowerCase();
                return (String(r.os || '').toLowerCase().includes(t)) || (String(r.responsavel || '').toLowerCase().includes(t)) || (String(r.vehicleData?.modelo || '').toLowerCase().includes(t));
            }), [requests, search]);

            const deleteRequest = async (id) => {
                const password = window.prompt("ACESSO RESTRITO: Digite a senha master para EXCLUIR:");
                if (password !== 'VRZ2024') { if (password !== null) alert("Senha Master Incorreta!"); return; }
                if(!window.confirm("CONFIRMAÇÃO: Deseja apagar este registro permanentemente do servidor?")) return;
                try { await db.doc(`artifacts/${appId}/public/data/requests/${id}`).delete(); } catch(e) { alert("Erro ao excluir."); }
            };

            const exportGeneralReport = () => {
                const csvRows = [["Data", "OS", "Chassi", "Veiculo", "Peca", "Qtd", "Status Peca", "Valor", "Loja", "Prazo", "Data Real Entrega"].join(";")];
                requests.forEach(r => {
                    r.items?.forEach(item => {
                        csvRows.push([new Date(r.timestamp).toLocaleDateString(), r.os, r.vehicleData?.chassi || "-", r.vehicleData?.modelo || "-", item.description || "-", item.quantity || "1", item.status || "Pendente", item.price || "0", item.supplier || "-", item.deliveryDate ? new Date(item.deliveryDate).toLocaleDateString() : "-", item.actualDeliveryDate ? new Date(item.actualDeliveryDate).toLocaleDateString() : "-"].join(";"));
                    });
                });
                const blob = new Blob([csvRows.join("\n")], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a"); link.href = URL.createObjectURL(blob);
                link.download = `Extratificacao_Itens_VRZ_${new Date().toLocaleDateString()}.csv`;
                link.click();
            };

            const exportPDF = async (request) => {
                const { jsPDF } = window.jspdf; const doc = new jsPDF();
                doc.setFontSize(18); doc.text("Solicitacao de Pecas - VRZ", 10, 15);
                doc.setFontSize(10);
                doc.text(`OS: #${request.os}`, 10, 25); doc.text(`Data: ${new Date(request.timestamp).toLocaleString()}`, 10, 30);
                doc.text(`Veiculo: ${request.vehicleData?.modelo}`, 10, 35); doc.text(`Chassi: ${request.vehicleData?.chassi}`, 10, 40);
                doc.text(`Solicitante: ${request.responsavel} (${request.localizacaoSolicitacao})`, 10, 45);
                let y = 55; doc.setFontSize(12); doc.text("ITENS:", 10, y); y += 10;
                request.items.forEach((item, index) => {
                    if (y > 250) { doc.addPage(); y = 20; }
                    doc.setFontSize(10); doc.text(`${index + 1}. Qtd: ${item.quantity} - ${item.description} [${item.status || 'Pendente'}]`, 15, y);
                    y += 10; if (item.photo) { try { doc.addImage(item.photo, 'JPEG', 15, y, 50, 30); y += 35; } catch(e) {} }
                });
                doc.save(`OS_${request.os}_VRZ.pdf`);
            };

            return (
                <div className="space-y-4 fade-in">
                    <div className="flex flex-col md:flex-row md:items-end justify-between gap-3">
                        <div><h2 className="text-2xl font-black uppercase text-black leading-none tracking-tighter text-wrap-anywhere">Histórico de OS</h2><p className="text-[9px] font-bold text-neutral-400 uppercase tracking-widest mt-1 italic text-wrap-anywhere">Gestão e Exportação Detalhada</p></div>
                        <div className="flex gap-2"><button onClick={exportGeneralReport} className="bg-emerald-600 text-white px-3 py-2 rounded-xl text-[9px] font-black uppercase flex items-center gap-2 shadow-lg hover:bg-emerald-700 transition-all"><Icon name="file-text" size={12}/> EXTRATIFICAR TUDO (EXCEL)</button>
                            <div className="relative"><input type="text" placeholder="BUSCAR OS / NOME..." value={search} onChange={(e) => setSearch(e.target.value)} className="w-full md:w-56 pl-9 pr-4 py-2 bg-white border border-neutral-200 rounded-xl text-[9px] font-black uppercase outline-none focus:border-red-600 shadow-sm" /><div className="absolute left-3 top-2.5 text-neutral-300"><Icon name="search" size={12} /></div></div>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-3 max-h-[75vh] overflow-y-auto pr-2 scrollbar-hide">
                        {filtered.length === 0 ? (<div className="py-20 text-center bg-white rounded-2xl border border-neutral-100 border-dashed"><Icon name="inbox" size={32} className="text-neutral-200 mx-auto mb-2" /><p className="text-[9px] font-black uppercase text-neutral-300 tracking-widest leading-none">Vazio</p></div>) : filtered.map(r => (
                            <div key={r.id} className="bg-white rounded-2xl border border-neutral-200 p-4 shadow-sm flex flex-col lg:flex-row gap-4 hover:border-red-200 transition-all border-l-4 border-l-red-600 relative group text-wrap-anywhere">
                                <div className="flex-1 space-y-3 min-w-0">
                                    <div className="flex items-center justify-between"><div className="flex items-center gap-3"><span className="text-sm font-black uppercase">OS #{r.os}</span></div><div className="flex gap-2"><button onClick={() => exportPDF(r)} className="px-3 py-1.5 bg-blue-600 text-white hover:bg-blue-700 rounded-lg transition-colors flex items-center gap-2 text-[9px] font-black uppercase shadow-sm"><Icon name="file-down" size={12}/> <span>Exportar PDF</span></button><button onClick={() => deleteRequest(r.id)} className="px-3 py-1.5 bg-red-600 text-white hover:bg-red-700 rounded-lg transition-colors flex items-center gap-2 text-[9px] font-black uppercase shadow-sm"><Icon name="trash-2" size={12}/> <span>Excluir</span></button></div></div>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2 text-[8px] font-black uppercase tracking-wider text-neutral-400"><div className="min-w-0"><span className="text-red-600 block mb-0.5">Solicitante</span><span className="text-black">{r.responsavel}</span></div><div className="min-w-0"><span>Veículo</span><span className="text-black">{r.vehicleData?.modelo}</span></div><div className="min-w-0"><span>Setor</span><span className="text-black">{r.localizacaoSolicitacao}</span></div><div className="min-w-0"><span>Data</span><span className="text-black">{new Date(r.timestamp).toLocaleDateString()}</span></div></div>
                                    <div className="flex gap-2 overflow-x-auto scrollbar-hide py-1">
                                        {r.items?.map((it, idx) => (
                                            <div key={idx} className="flex-shrink-0 flex items-center gap-2 bg-neutral-50 p-1.5 rounded-lg border border-neutral-100 min-w-[140px] shadow-inner text-wrap-anywhere">
                                                {it.photo && <img src={it.photo} className="w-8 h-8 rounded-md object-cover border" />}
                                                <div className="min-w-0 flex-1"><p className="text-[8px] font-black uppercase leading-tight truncate text-neutral-800">{it.description}</p><div className="flex justify-between items-center mt-1"><span className="text-[7px] text-red-600 font-bold">QTD: {it.quantity}</span><StatusBadge status={it.status || 'Pendente'} /></div></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function App() {
            const [user, setUser] = useState(null);
            const [view, setView] = useState('request');
            const [requests, setRequests] = useState([]);
            const [vehiclesDB, setVehiclesDB] = useState([]);
            const [adminAuth, setAdminAuth] = useState(false);
            const [adminPassError, setAdminPassError] = useState(false);
            const [editingRequest, setEditingRequest] = useState(null);
            const [isSidebarOpen, setSidebarOpen] = useState(false);
            const [adminSubView, setAdminSubView] = useState('pending');
            const [importData, setImportData] = useState([]);
            const [showImportModal, setShowImportModal] = useState(false);

            useEffect(() => { const unsubAuth = auth.onAuthStateChanged((u) => { if (u) setUser(u); else auth.signInAnonymously(); }); return () => unsubAuth(); }, []);

            useEffect(() => {
                if (!user) return;
                const unsubReq = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests').onSnapshot((s) => { setRequests(s.docs.map(d => ({id: d.id, ...d.data()}))); });
                const unsubVeh = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('vehicles').onSnapshot((s) => { setVehiclesDB(s.docs.map(d => d.data())); });
                return () => { unsubReq(); unsubVeh(); };
            }, [user]);

            const handlePaste = (e) => {
                const text = e.clipboardData.getData('text');
                const lines = text.split(/\r?\n/).filter(l => l.trim() !== ''); if (lines.length === 0) return;
                const firstLine = lines[0].split(/[,\t]/); const headers = firstLine.map(h => h.trim().toUpperCase());
                const findIndex = (targets) => headers.findIndex(h => targets.some(t => h.includes(t)));
                const idxOS = findIndex(['OS']); const idxMod = findIndex(['MODELO']); const idxFab = findIndex(['FABRICANTE', 'MARCA']);
                const idxCor = findIndex(['COR']); const idxCha = findIndex(['CHASSI']); const idxEta = findIndex(['ETAPA']); const idxLoc = findIndex(['LOCALIZA']);
                const rowsToParse = (idxOS !== -1) ? lines.slice(1) : lines;
                const parsed = rowsToParse.map(l => {
                    const v = l.split(/[,\t]/);
                    return { os: (idxOS !== -1 ? v[idxOS] : v[0])?.trim() || '', modelo: (idxMod !== -1 ? v[idxMod] : v[1])?.trim() || '', fabricante: (idxFab !== -1 ? v[idxFab] : v[2])?.trim() || '', cor: (idxCor !== -1 ? v[idxCor] : v[3])?.trim() || '', chassi: (idxCha !== -1 ? v[idxCha] : v[4])?.trim() || '', etapa: (idxEta !== -1 ? v[idxEta] : v[5])?.trim() || '', localizacao: (idxLoc !== -1 ? v[idxLoc] : v[6])?.trim() || '' };
                }).filter(r => r.os !== '');
                setImportData(parsed);
            };

            const commitImport = async () => {
                if (importData.length === 0) return;
                const batch = db.batch();
                importData.forEach(v => { const vRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('vehicles').doc(v.os); batch.set(vRef, v); });
                await batch.commit(); alert(`Sucesso! ${importData.length} veiculos importados.`);
                setImportData([]); setShowImportModal(false);
            };

            const updateItemInRequest = async (requestId, itemIndex, updatedItemFields) => {
                setEditingRequest(prev => {
                    if (!prev || prev.id !== requestId) return prev;
                    const newItems = [...prev.items];
                    const item = { ...newItems[itemIndex], ...updatedItemFields };
                    if (item.price && item.supplier && item.deliveryDate && (!item.actualDeliveryDate)) item.status = 'Em Cotação';
                    if (item.actualDeliveryDate) item.status = 'Concluído';
                    newItems[itemIndex] = item;
                    return { ...prev, items: newItems };
                });
                const req = requests.find(r => r.id === requestId);
                if (!req) return;
                const newItemsForDB = [...req.items];
                const itemForDB = { ...newItemsForDB[itemIndex], ...updatedItemFields };
                if (itemForDB.price && itemForDB.supplier && itemForDB.deliveryDate && (!itemForDB.actualDeliveryDate)) itemForDB.status = 'Em Cotação';
                if (itemForDB.actualDeliveryDate) itemForDB.status = 'Concluído';
                newItemsForDB[itemIndex] = itemForDB;
                let globalStatus = 'Concluído';
                if (newItemsForDB.some(it => it.status === 'Pendente')) globalStatus = 'Pendente';
                else if (newItemsForDB.some(it => it.status === 'Em Cotação')) globalStatus = 'Em Cotação';
                try { await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('requests').doc(requestId).update({ items: newItemsForDB, status: globalStatus }); } catch (e) {}
            };

            return (
                <div className="h-screen flex flex-col md:flex-row bg-slate-100 overflow-hidden">
                    <div className="md:hidden bg-black text-white p-3 flex justify-between items-center z-[100] border-b-2 border-red-600 shadow-xl shrink-0"><div className="flex items-center gap-2"><div className="p-1 bg-red-600 rounded-lg"><Icon name="shopping-cart" size={16} /></div><span className="font-black text-sm uppercase tracking-tighter">VRZ</span></div><button onClick={() => setSidebarOpen(!isSidebarOpen)} className="p-2 bg-neutral-900 rounded-xl"><Icon name={isSidebarOpen ? "x" : "menu"} size={20} /></button></div>
                    <nav className={`fixed md:relative inset-y-0 left-0 w-52 bg-black text-white p-6 flex flex-col gap-6 z-[90] sidebar-transition transform ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'} shadow-2xl shrink-0`}><div className="hidden md:flex items-center gap-4"><div className="p-2 bg-red-600 rounded-xl shadow-lg shadow-red-600/30"><Icon name="shopping-cart" size={20} /></div><h1 className="text-sm font-black uppercase tracking-widest leading-none">VRZ COMPRAS</h1></div><div className="flex-1 space-y-1"><NavItem active={view === 'request'} onClick={() => { setView('request'); setSidebarOpen(false); }} iconName="plus" label="Nova Peça" /><NavItem active={view === 'status'} onClick={() => { setView('status'); setSidebarOpen(false); }} iconName="search" label="Histórico de OS" /><div className="pt-6 border-t border-white/5"><NavItem active={view === 'admin'} onClick={() => { setView('admin'); setSidebarOpen(false); }} iconName="shield" label="Gestão Admin" /></div></div><div className="bg-neutral-900/60 p-3 rounded-xl border border-white/5 text-center"><div className={`text-[8px] font-black tracking-widest ${user ? 'text-red-600' : 'text-neutral-500'}`}>● {user ? 'SISTEMA ONLINE' : 'RECONECTANDO...'}</div></div></nav>
                    <main className="flex-1 p-4 md:p-6 overflow-y-auto scrollbar-hide h-full min-w-0 text-wrap-anywhere">{!user ? (<div className="h-full flex flex-col items-center justify-center font-black animate-pulse text-neutral-400 gap-4"><Icon name="loader" size={32} className="animate-spin text-red-600" /><span className="text-[10px] uppercase tracking-[0.3em]">Sincronizando Sistema...</span></div>) : (<div className="max-w-6xl mx-auto min-w-0 text-wrap-anywhere">{view === 'request' && <RequestForm user={user} vehiclesDB={vehiclesDB} />}{view === 'status' && <StatusView requests={requests} />}{view === 'admin' && (!adminAuth ? (<div className="max-w-xs mx-auto py-12 slide-up"><div className="bg-black p-8 rounded-3xl text-center text-white border-2 border-red-600 shadow-2xl"><Icon name="lock" size={32} className="text-red-600 mx-auto mb-6" /><h2 className="text-sm font-black uppercase mb-8 tracking-[0.2em]">Área de Gestão</h2><input type="password" autoFocus onKeyDown={(e) => { 
                                            if(e.key === 'Enter') {
                                                if(e.target.value === 'VRZ2024') {
                                                    setAdminAuth(true);
                                                    setAdminPassError(false);
                                                } else {
                                                    setAdminPassError(true);
                                                    e.target.value = '';
                                                }
                                            }
                                        }} className="w-full p-4 bg-neutral-900 border border-white/10 rounded-xl outline-none text-center tracking-[1em] font-black focus:border-red-600 shadow-inner" placeholder="••••" />
                                        {adminPassError && <p className="text-red-500 text-[10px] font-black uppercase mt-4 animate-pulse">Senha Incorreta!</p>}
                                        </div></div>) : (<div className="space-y-6 fade-in pb-10 min-w-0 text-wrap-anywhere"><div className="flex flex-col md:flex-row justify-between items-start md:items-end border-b border-neutral-200 pb-4 gap-4"><div><h2 className="text-3xl font-black uppercase text-black tracking-tighter leading-none text-wrap-anywhere">Gestão de Compras</h2><p className="text-[9px] font-bold text-neutral-400 mt-1 uppercase tracking-widest text-wrap-anywhere">Protocolos e Base de Dados</p></div><button onClick={() => setShowImportModal(true)} className="bg-black text-white px-5 py-2.5 rounded-xl font-black uppercase text-[10px] border-b-4 border-red-600 flex items-center gap-2 hover:bg-neutral-900 shadow-xl shrink-0"><Icon name="file-up" size={14} /> Importar Planilha</button></div>
                        <div className="flex gap-2 bg-white p-1 rounded-xl border border-neutral-200 w-fit shrink-0 overflow-x-auto scrollbar-hide text-wrap-anywhere"><button onClick={() => setAdminSubView('pending')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase whitespace-nowrap transition-all ${adminSubView === 'pending' ? 'bg-orange-500 text-white shadow-md' : 'text-neutral-400'}`}>Pendentes ({requests.filter(r => r.items?.some(it => it.status === 'Pendente')).length})</button><button onClick={() => setAdminSubView('quoting')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase whitespace-nowrap transition-all ${adminSubView === 'quoting' ? 'bg-blue-600 text-white shadow-md' : 'text-neutral-400'}`}>Em Cotação ({requests.filter(r => r.items?.some(it => it.status === 'Em Cotação')).length})</button><button onClick={() => setAdminSubView('completed')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase whitespace-nowrap transition-all ${adminSubView === 'completed' ? 'bg-black text-white shadow-md' : 'text-neutral-400'}`}>Concluídos ({requests.filter(r => r.items?.every(it => it.status === 'Concluído')).length})</button><button onClick={() => setAdminSubView('vehicles')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase whitespace-nowrap transition-all ${adminSubView === 'vehicles' ? 'bg-neutral-800 text-white shadow-md' : 'text-neutral-400'}`}>Base Veículos ({vehiclesDB.length})</button></div>
                        <div className="min-w-0">{adminSubView === 'vehicles' && (<div className="bg-white rounded-2xl border border-neutral-200 shadow-sm overflow-hidden fade-in text-wrap-anywhere"><div className="overflow-x-auto max-h-[60vh] scrollbar-hide"><table className="w-full text-left border-collapse min-w-[1000px]"><thead className="bg-neutral-100 text-[10px] font-black uppercase text-neutral-500 sticky top-0"><tr><th className="p-3 border-b">OS</th><th className="p-3 border-b">Modelo</th><th className="p-3 border-b">Fabricante</th><th className="p-3 border-b">Cor</th><th className="p-3 border-b">Chassi</th><th className="p-3 border-b">Etapa</th><th className="p-3 border-b">Localização</th></tr></thead><tbody className="text-[10px] font-medium text-neutral-700">{vehiclesDB.length === 0 ? (<tr><td colSpan="7" className="p-10 text-center text-neutral-300 font-black uppercase tracking-widest leading-none text-wrap-anywhere">Vazio</td></tr>) : vehiclesDB.map((v, i) => (<tr key={i} className="border-b border-neutral-50 hover:bg-slate-50 transition-colors"><td className="p-3 font-black text-black">#{v.os}</td><td className="p-3 uppercase font-bold text-neutral-800 text-wrap-anywhere">{v.modelo}</td><td className="p-3 uppercase text-wrap-anywhere">{v.fabricante}</td><td className="p-3 uppercase text-wrap-anywhere">{v.cor}</td><td className="p-3 font-mono text-black text-[10px] font-black tracking-widest bg-neutral-50/50 text-wrap-anywhere">{v.chassi}</td><td className="p-3"><span className="bg-red-50 text-red-600 px-2 py-0.5 rounded font-black uppercase text-[8px] text-wrap-anywhere">{v.etapa}</span></td><td className="p-3 uppercase text-wrap-anywhere">{v.localizacao}</td></tr>))}</tbody></table></div></div>)}
                        {(adminSubView === 'pending' || adminSubView === 'quoting' || adminSubView === 'completed') && (<div className="grid grid-cols-1 gap-3 fade-in">{requests.filter(r => { if (adminSubView === 'pending') return r.items?.some(it => it.status === 'Pendente'); if (adminSubView === 'quoting') return r.items?.some(it => it.status === 'Em Cotação'); if (adminSubView === 'completed') return r.items?.every(it => it.status === 'Concluído'); return true; }).map(req => (<div key={req.id} className={`bg-white p-4 rounded-2xl border border-neutral-200 shadow-sm flex items-center justify-between gap-4 border-l-4 ${adminSubView === 'pending' ? 'border-l-orange-500' : adminSubView === 'quoting' ? 'border-l-blue-600' : 'border-l-black'}`}><div className="flex flex-1 gap-8 items-center min-w-0"><div className="text-center shrink-0"><p className="text-[7px] font-black text-neutral-400 uppercase leading-none">OS</p><p className="text-base font-black uppercase tracking-tighter">#{req.os}</p></div><div className="min-w-0 flex-1"><p className="text-[7px] font-black text-neutral-400 uppercase leading-none mb-1">Itens a Gerenciar</p><div className="flex gap-2 flex-wrap">{req.items?.map((it, idx) => (<span key={idx} className={`text-[8px] px-2 py-0.5 rounded-full font-black uppercase ${it.status === 'Concluído' ? 'bg-black text-white' : it.status === 'Em Cotação' ? 'bg-blue-100 text-blue-600' : 'bg-orange-100 text-orange-600'}`}>{it.description}</span>))}</div></div></div><button onClick={() => setEditingRequest(req)} className="bg-black text-white px-5 py-2.5 rounded-lg font-black uppercase text-[9px] tracking-widest border-b-4 border-red-600 shadow-lg hover:bg-neutral-900 shrink-0">Gerenciar</button></div>))}</div>)}</div></div>)
                                )}</div>)}</main>
                    {showImportModal && (<div className="fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4"><div className="bg-white w-full max-w-6xl h-[85vh] rounded-[2.5rem] shadow-2xl flex flex-col overflow-hidden border-4 border-white/10"><header className="p-6 bg-black text-white flex justify-between items-center border-b-8 border-red-600"><div><h3 className="text-2xl font-black uppercase tracking-tighter leading-none">Simulador VRZ</h3><p className="text-neutral-500 text-[10px] font-bold mt-1 uppercase italic">COLE OS DADOS DO EXCEL AQUI (CTRL+V)</p></div><button onClick={() => { setShowImportModal(false); setImportData([]); }} className="p-3 bg-neutral-900 rounded-2xl"><Icon name="x" size={24} /></button></header><div className="flex-1 overflow-hidden flex flex-col p-6 gap-6">{importData.length === 0 ? (<div className="flex-1 flex flex-col items-center justify-center border-4 border-dashed border-neutral-100 rounded-[2rem] bg-neutral-50 space-y-6 relative"><Icon name="file-spreadsheet" size={60} className="text-neutral-200" /><div className="text-center"><p className="text-sm font-black uppercase text-neutral-400">Pronto para importar</p><p className="text-[10px] font-bold uppercase text-neutral-300">Selecione dados no Excel e use CTRL+V aqui</p></div><textarea onPaste={handlePaste} className="absolute inset-0 opacity-0 cursor-pointer" autoFocus /></div>) : (<div className="flex-1 overflow-hidden flex flex-col text-wrap-anywhere"><div className="overflow-auto border rounded-2xl bg-neutral-50 flex-1 scrollbar-hide"><table className="w-full text-left border-collapse min-w-[1000px]"><thead className="bg-neutral-200 text-[9px] font-black uppercase sticky top-0 z-10"><tr><th className="p-3 border">OS</th><th className="p-3 border">Modelo</th><th className="p-3 border">Fabricante</th><th className="p-3 border">Cor</th><th className="p-3 border">Chassi</th><th className="p-3 border">Etapa</th><th className="p-3 border" text-wrap-anywhere>Localizacao</th></tr></thead><tbody className="text-wrap-anywhere">{importData.map((row, rIdx) => (<tr key={rIdx} className="bg-white border-b hover:bg-red-50 transition-colors">{['os', 'modelo', 'fabricante', 'cor', 'chassi', 'etapa', 'localizacao'].map(key => ( <td key={key} className="border p-0"><input className="excel-input" value={row[key]} onChange={(e) => { const newData = [...importData]; newData[rIdx][key] = e.target.value; setImportData(newData); }} /></td>))}</tr>))}</tbody></table></div><div className="pt-6 flex justify-between items-center"><p className="text-[10px] font-black text-neutral-400 uppercase tracking-widest">{importData.length} registros prontos</p><div className="flex gap-4"><button onClick={() => setImportData([])} className="px-8 py-3 bg-neutral-100 text-neutral-500 rounded-xl font-black text-[10px]">LIMPAR</button><button onClick={commitImport} className="px-10 py-3 bg-red-600 text-white rounded-xl font-black text-[10px] shadow-xl">SINCRONIZAR</button></div></div></div>)}</div></div></div>)}
                    {editingRequest && (
                        <div className="fixed inset-0 z-[200] bg-black/95 backdrop-blur-sm flex items-center justify-center p-4 overflow-y-auto">
                            <div className="bg-white w-full max-w-6xl rounded-[2.5rem] shadow-2xl flex flex-col my-auto border-b-[12px] border-red-600 text-wrap-anywhere">
                                <header className="px-8 py-6 bg-black text-white flex justify-between items-center shrink-0 text-wrap-anywhere"><div className="min-w-0 text-wrap-anywhere"><h3 className="text-xl font-black uppercase truncate leading-none">Gerenciamento OS #{editingRequest.os}</h3><p className="text-red-500 text-[8px] font-black uppercase truncate mt-1">{editingRequest.vehicleData?.modelo}</p></div><button onClick={() => setEditingRequest(null)} className="p-3 bg-neutral-900 hover:bg-neutral-800 rounded-2xl shrink-0"><Icon name="x" size={24} /></button></header>
                                <div className="p-6 overflow-y-auto max-h-[70vh] space-y-6 scrollbar-hide text-wrap-anywhere">
                                    <div className="grid grid-cols-1 gap-4 text-wrap-anywhere">{editingRequest.items?.map((it, idx) => (
                                            <div key={idx} className="bg-neutral-50 p-5 rounded-2xl border-2 border-neutral-100 grid grid-cols-1 md:grid-cols-12 gap-6 items-center text-wrap-anywhere">
                                                <div className="md:col-span-3 flex items-center gap-3 min-w-0 text-wrap-anywhere">{it.photo && <img src={it.photo} className="w-12 h-12 rounded-xl object-cover border" />}<div className="min-w-0 flex-1 text-wrap-anywhere"><p className="text-[10px] font-black uppercase leading-tight text-wrap-anywhere">{it.description}</p><div className="flex items-center gap-2 mt-1"><span className="text-[8px] text-neutral-400 font-bold uppercase">QTD: {it.quantity}</span><StatusBadge status={it.status || 'Pendente'} /></div></div></div>
                                                <div className="md:col-span-9 grid grid-cols-2 lg:grid-cols-4 gap-3 text-wrap-anywhere">
                                                    <div className="space-y-1"><label className="text-[7px] font-black uppercase text-neutral-500 ml-1">Valor Total</label><input type="number" step="0.01" value={it.price || ''} onChange={(e) => updateItemInRequest(editingRequest.id, idx, { price: e.target.value })} className="w-full bg-white border border-neutral-200 rounded-lg p-2 text-[9px] font-black outline-none focus:border-red-600" placeholder="0.00" disabled={it.status === 'Concluído'} /></div>
                                                    <div className="space-y-1"><label className="text-[7px] font-black uppercase text-neutral-500 ml-1">Loja (Fornecedor)</label><input type="text" value={it.supplier || ''} onChange={(e) => updateItemInRequest(editingRequest.id, idx, { supplier: e.target.value })} className="w-full bg-white border border-neutral-200 rounded-lg p-2 text-[9px] font-black uppercase outline-none focus:border-red-600" placeholder="LOJA" disabled={it.status === 'Concluído'} /></div>
                                                    <div className="space-y-1"><label className="text-[7px] font-black uppercase text-neutral-500 ml-1">Prazo Fornecedor</label><input type="date" value={it.deliveryDate || ''} onChange={(e) => updateItemInRequest(editingRequest.id, idx, { deliveryDate: e.target.value })} className="w-full bg-white border border-neutral-200 rounded-lg p-2 text-[9px] font-black outline-none focus:border-red-600" disabled={it.status === 'Concluído'} /></div>
                                                    <div className="space-y-1"><label className="text-[7px] font-black uppercase text-red-500 ml-1">Data Entrega Real</label><input type="date" value={it.actualDeliveryDate || ''} onChange={(e) => updateItemInRequest(editingRequest.id, idx, { actualDeliveryDate: e.target.value })} className="w-full bg-red-50 border-2 border-red-100 rounded-lg p-2 text-[9px] font-black outline-none focus:border-red-600" disabled={it.status === 'Pendente'} /></div>
                                                </div>
                                            </div>))}</div>
                                </div>
                                <div className="p-6 bg-neutral-50 flex justify-between items-center shrink-0 text-wrap-anywhere"><p className="text-[8px] text-neutral-400 font-bold uppercase italic max-w-md">* Preencha Valor, Loja e Prazo para mover para 'Em Cotação'. Informe a 'Data Real' para 'Concluir'.</p><button onClick={() => setEditingRequest(null)} className="px-10 py-3 bg-red-600 text-white rounded-xl font-black uppercase text-xs shadow-xl tracking-widest hover:bg-red-700 active:scale-95 transition-all">Fechar e Sincronizar</button></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
