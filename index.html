// Custom Hook para Firestore
const useFirestore = (collectionName) => {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  
  useEffect(() => {
    setLoading(true);
    const unsubscribe = col(collectionName).onSnapshot(
      snapshot => {
        setData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        setLoading(false);
      },
      err => {
        console.error(`Erro ao carregar ${collectionName}:`, err);
        setError(err);
        setLoading(false);
      }
    );
    return unsubscribe;
  }, [collectionName]);
  
  return { data, loading, error };
};

// Hash simples para senhas (em produção use bcrypt)
const hashPassword = async (password) => {
  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
};

function Icon({name,size=18,className=''}){
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current&&window.lucide){
      const d=window.lucide.icons[name];
      if(d){
        const svg=document.createElementNS('http://www.w3.org/2000/svg','svg');
        const[,at,ch]=d;
        Object.entries({...at,width:size,height:size,class:`lucide-${name} ${className}`,viewBox:'0 0 24 24',fill:'none',stroke:'currentColor','stroke-width':2,'stroke-linecap':'round','stroke-linejoin':'round'}).forEach(([k,v])=>svg.setAttribute(k,v));
        ch.forEach(([t,a])=>{ const el=document.createElementNS('http://www.w3.org/2000/svg',t); Object.entries(a).forEach(([k,v])=>el.setAttribute(k,v)); svg.appendChild(el); });
        ref.current.innerHTML=''; ref.current.appendChild(svg);
      }
    }
  },[name,size,className]);
  return <span ref={ref} className="inline-flex shrink-0 items-center justify-center" role="img" aria-label={name}/>;
}

const NetworkStatus = () => {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(()=>{
    const handleChange = () => setOnline(navigator.onLine);
    window.addEventListener('online', handleChange);
    window.addEventListener('offline', handleChange);
    return () => {
      window.removeEventListener('online', handleChange);
      window.removeEventListener('offline', handleChange);

// ── Dashboard ──────────────────────────────────────────────────────────────
function DashboardView({requests}){
  const stats=useMemo(()=>{
    if(!requests?.length)return null;
    const byOS={};
    requests.forEach(r=>{ const k=String(r.os||'').trim(); if(k){if(!byOS[k])byOS[k]=[];byOS[k].push(r);} });
    const multi=Object.entries(byOS).filter(([,a])=>a.length>1);
    const totalAdd=multi.reduce((a,[,arr])=>a+(arr.length-1),0);
    const intervalos=[];
    const detalhe=[];
    multi.forEach(([os,arr])=>{
      const sorted=[...arr].sort((a,b)=>a.timestamp-b.timestamp);
      sorted.slice(1).forEach(p=>{
        const dias=Math.round((p.timestamp-sorted[0].timestamp)/(864e5));
        intervalos.push(dias);
        detalhe.push({os,dias,sol:p.responsavel,dt0:sorted[0].timestamp,dt1:p.timestamp});
      });
    });
    const mediaAdd=intervalos.length?(intervalos.reduce((a,b)=>a+b,0)/intervalos.length).toFixed(1):0;
    const maxAdd=intervalos.length?Math.max(...intervalos):0;
    let totalIt=0,pend=0,cotac=0,conc=0,doado=0;
    requests.forEach(r=>(r.items||[]).forEach(it=>{totalIt++;if(it.status==='Concluído')conc++;else if(it.status==='Doado')doado++;else if(it.status==='Em Cotação')cotac++;else pend++;}));
    const porSol={};
    requests.forEach(r=>{porSol[r.responsavel]=(porSol[r.responsavel]||0)+1;});
    const rankSol=Object.entries(porSol).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const diasSem=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
    const porDia=[0,0,0,0,0,0,0];
    requests.forEach(r=>porDia[new Date(r.timestamp).getDay()]++);
    const pedDia=diasSem.map((l,i)=>({l,v:porDia[i]}));
    const agora=Date.now();
    const semanas=Array.from({length:8},(_,i)=>{
      const ini=agora-(8-i)*7*864e5,fim=agora-(7-i)*7*864e5;
      const cnt=requests.filter(r=>r.timestamp>=ini&&r.timestamp<fim).length;
      const d=new Date(ini);
      return {l:`${d.getDate()}/${d.getMonth()+1}`,v:cnt};
    });
    const porMod={};
    requests.forEach(r=>{const m=r.vehicleData?.modelo||'N/D';porMod[m]=(porMod[m]||0)+1;});
    const rankMod=Object.entries(porMod).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const osRep=Object.entries(byOS).filter(([,v])=>v.length>1).sort((a,b)=>b[1].length-a[1].length).slice(0,5);
    const taxa=totalIt>0?Math.round(conc/totalIt*100):0;
    // Unidade stats
    const porUnidade={};
    requests.forEach(r=>{const u=r.unidade||'Unidade 1';porUnidade[u]=(porUnidade[u]||0)+1;});
    return {total:requests.length,osU:Object.keys(byOS).length,totalAdd,mediaAdd:parseFloat(mediaAdd),maxAdd,detalhe:detalhe.sort((a,b)=>b.dt1-a.dt1).slice(0,8),totalIt,pend,cotac,conc,doado,rankSol,pedDia,semanas,rankMod,osRep,taxa,porUnidade};
  },[requests]);

  if(!stats) return (
    <div className="flex flex-col items-center justify-center py-24 text-center fade-in">
      <div className="w-16 h-16 bg-neutral-100 rounded-2xl flex items-center justify-center mb-4"><Icon name="bar-chart-2" size={28} className="text-neutral-300"/></div>
      <p className="text-[10px] font-black uppercase text-neutral-300 tracking-widest">Nenhum dado disponível</p>
    </div>
  );

  const maxSol=stats.rankSol[0]?.[1]||1, maxMod=stats.rankMod[0]?.[1]||1;
  return (
    <div className="space-y-5 fade-in pb-10">
      <div className="flex items-end justify-between">
        <div>
          <h2 className="font-display text-5xl font-black uppercase text-black tracking-tight leading-none">Analytics VRZ</h2>
          <p className="text-[9px] font-bold text-neutral-400 uppercase tracking-widest mt-1">Inteligência Operacional · Tempo real</p>
        </div>
        <div className="flex items-center gap-2 bg-black text-white px-4 py-2 rounded-xl">
          <span className="w-2 h-2 rounded-full bg-red-500 pulse-dot"/><span className="text-[9px] font-black uppercase tracking-widest">Live</span>
        </div>
      </div>

      {/* KPIs */}
      <div className="grid grid-cols-2 lg:grid-cols-5 gap-3">
        {[
          {label:'Total de Pedidos',v:stats.total,sub:`${stats.osU} OS únicas`,icon:'clipboard-list',bg:'bg-black'},
          {label:'Inclusões Adicionais',v:stats.totalAdd,sub:'mesma OS, novo pedido',icon:'plus-circle',bg:'bg-red-600'},
          {label:'Média p/ Inclusão',v:stats.mediaAdd>0?stats.mediaAdd+'d':'—',sub:`máx ${stats.maxAdd}d`,icon:'clock',bg:'bg-orange-500'},
          {label:'Taxa de Conclusão',v:stats.taxa+'%',sub:`${stats.conc} de ${stats.totalIt} itens`,icon:'check-circle',bg:'bg-emerald-600'},
          {label:'Peças Doadas',v:stats.doado,sub:'transferidas entre OS',icon:'git-merge',bg:'bg-purple-600'},
        ].map((k,i)=>(
          <div key={i} className={`${k.bg} rounded-2xl p-4 text-white`}>

            <p className="text-[7px] font-bold opacity-40 mt-0.5">{k.sub}</p>

      {/* Distribuição por Unidade */}
      <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
        <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Pedidos por Unidade</p>
        <div className="flex gap-4">
          {UNIDADES.map(u=>(
            <div key={u} className="flex-1">
              <div className="flex justify-between mb-1"><span className="text-[9px] font-black uppercase">{u}</span><span className="text-[9px] font-black text-red-600">{stats.porUnidade[u]||0}</span></div>
              <div className="h-2 bg-neutral-100 rounded-full overflow-hidden">
                <div className="h-full bg-red-600 rounded-full transition-all duration-700" style={{width:`${((stats.porUnidade[u]||0)/stats.total*100)}%`}}/>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Charts */}
      <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Pipeline de Itens</p>
          <div className="flex items-center gap-4">
            <Donut size={110} slices={[{v:stats.pend,c:'#f97316'},{v:stats.cotac,c:'#2563eb'},{v:stats.conc,c:'#000'},{v:stats.doado,c:'#9333ea'}]}/>
            <div className="space-y-2 flex-1">
              {[{l:'Pendentes',v:stats.pend,c:'bg-orange-500'},{l:'Em Cotação',v:stats.cotac,c:'bg-blue-600'},{l:'Concluídos',v:stats.conc,c:'bg-black'},{l:'Doados',v:stats.doado,c:'bg-purple-600'}].map((s,i)=>(
                <div key={i}>
                  <div className="flex justify-between mb-1"><div className="flex items-center gap-1.5"><div className={`w-2 h-2 rounded-full ${s.c}`}/><span className="text-[8px] font-bold uppercase text-neutral-500">{s.l}</span></div><span className="text-[9px] font-black">{s.v}</span></div>
                  <div className="h-1 bg-neutral-100 rounded-full overflow-hidden"><div className={`h-full ${s.c} rounded-full transition-all duration-700`} style={{width:stats.totalIt>0?`${s.v/stats.totalIt*100}%`:'0%'}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-0.5">Pedidos por Semana</p>
          <p className="text-[7px] text-neutral-300 font-bold mb-3">Últimas 8 semanas</p>
          <MiniBar data={stats.semanas} color="#ef4444"/>
        </div>
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-0.5">Distribuição Semanal</p>
          <p className="text-[7px] text-neutral-300 font-bold mb-3">Qual dia mais solicita</p>
          <MiniBar data={stats.pedDia} color="#2563eb"/>
        </div>
      </div>

      {/* Rankings */}
      <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
        <div className="bg-white rounded-2xl border border-neutral-100 p-5 shadow-sm">
          <p className="text-[8px] font-black uppercase text-neutral-400 mb-4">Top Solicitantes</p>
          <div className="space-y-3">{stats.rankSol.map(([nome,qtd],i)=>(
            <div key={i} className="flex items-center gap-3">
              <div className={`w-5 h-5 rounded-full flex items-center justify-center text-[8px] font-black shrink-0 ${i===0?'bg-red-600 text-white':i===1?'bg-neutral-800 text-white':'bg-neutral-100 text-neutral-500'}`}>{i+1}</div>

// ── Donut Chart ────────────────────────────────────────────────────────────
function Donut({slices,size=110}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const ctx=ref.current.getContext('2d');
    const total=slices.reduce((a,s)=>a+s.v,0);
    ctx.clearRect(0,0,size,size);
    const cx=size/2,cy=size/2,r=size/2-6;
    if(!total){ ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fillStyle='#f1f5f9';ctx.fill(); }
    else {
      let start=-Math.PI/2;
      slices.forEach(s=>{
        const ang=(s.v/total)*2*Math.PI;
        ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,start,start+ang);ctx.closePath();
        ctx.fillStyle=s.c;ctx.fill();start+=ang;
      });
    }
    ctx.beginPath();ctx.arc(cx,cy,r*.58,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  },[slices,size]);
  return <canvas ref={ref} width={size} height={size} role="img" aria-label="Gráfico de distribuição"/>;
}

// ── Mini Bar ───────────────────────────────────────────────────────────────
function MiniBar({data,color='#ef4444'}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    const ctx=ref.current.getContext('2d');
    const w=ref.current.width,h=ref.current.height;
    ctx.clearRect(0,0,w,h);
    const max=Math.max(...data.map(d=>d.v),1);
    const bw=w/data.length;
    data.forEach((d,i)=>{
      const bh=(d.v/max)*(h-22);
      ctx.fillStyle=i===data.length-1?color:color+'99';
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(i*bw+2,h-bh-20,bw-4,bh,3);
      else ctx.rect(i*bw+2,h-bh-20,bw-4,bh);
      ctx.fill();
      ctx.fillStyle='#94a3b8';ctx.font='bold 8px Inter';ctx.textAlign='center';
      ctx.fillText(d.l,i*bw+bw/2,h-4);
      if(d.v>0){ctx.fillStyle='#475569';ctx.font='bold 9px Inter';ctx.fillText(d.v,i*bw+bw/2,h-bh-24);}
    });
  },[data,color]);
  return <canvas ref={ref} width={280} height={110} className="w-full" role="img" aria-label="Gráfico de barras"/>;
}

// ── Sistema de Doador ──────────────────────────────────────────────────────
function DonorSystem({requests, vehicles, onDonate}){
  const [selectedSourceOS, setSelectedSourceOS] = useState('');
  const [selectedTargetOS, setSelectedTargetOS] = useState('');
  const [selectedItems, setSelectedItems] = useState([]);
  const [step, setStep] = useState(1);
  
  const sourceRequest = requests.find(r => String(r.os) === selectedSourceOS);
  const targetRequest = requests.find(r => String(r.os) === selectedTargetOS);
  
  const availableSourceItems = useMemo(() => {
    if (!sourceRequest) return [];
    return sourceRequest.items?.filter(it => it.status === 'Concluído' || it.status === 'Pendente') || [];
  }, [sourceRequest]);
  
  const handleDonate = async () => {
    if (!sourceRequest || !targetRequest || selectedItems.length === 0) {
      alert('Selecione OS de origem, destino e pelo menos uma peça');
      return;
    }
    
    const confirm = window.confirm(
      `Confirmar doação de ${selectedItems.length} peça(s) da OS ${selectedSourceOS} para OS ${selectedTargetOS}?\n\n` +
      `As peças serão marcadas como "Doado" na OS ${selectedSourceOS} e novos pedidos serão criados na OS ${selectedTargetOS}.`
    );
    
    if (!confirm) return;
    
    try {
      const batch = db.batch();
      
      // 1. Marcar itens como doados na OS origem
      const sourceItems = [...sourceRequest.items];
      selectedItems.forEach(itemId => {
        const idx = sourceItems.findIndex(it => it.id === itemId);
        if (idx !== -1) {
          sourceItems[idx] = {
            ...sourceItems[idx],
            status: 'Doado',
            statusOriginal: 'Doado',
            donatedTo: selectedTargetOS,
            donatedAt: Date.now()
          };
        }
      });
      
      batch.update(col('requests').doc(sourceRequest.id), { items: sourceItems });
      
      // 2. Criar novos pedidos na OS destino
      const itemsToAdd = selectedItems.map(itemId => {
        const originalItem = sourceRequest.items.find(it => it.id === itemId);
        return {
          ...originalItem,
          id: Date.now() + Math.random(),
          status: 'Pendente',
          statusOriginal: undefined,
          donatedFrom: selectedSourceOS,
          photo: originalItem.photo,
          price: undefined,
          supplier: undefined,
          deliveryDate: undefined,
          actualDeliveryDate: undefined
        };
      });
      
      const targetItems = [...(targetRequest.items || []), ...itemsToAdd];
      batch.update(col('requests').doc(targetRequest.id), { items: targetItems });
      
      // 3. Registrar log da doação
      await col('donations').add({
        sourceOS: selectedSourceOS,
        targetOS: selectedTargetOS,
        items: selectedItems,
        donatedBy: loggedInUser?.user || 'Sistema',
        timestamp: Date.now()
      });
      
      await batch.commit();
      
      alert('Doação realizada com sucesso!');
      onDonate?.();
      setSelectedSourceOS('');
      setSelectedTargetOS('');
      setSelectedItems([]);
      setStep(1);
    } catch (error) {
      console.error('Erro na doação:', error);
      alert('Erro ao processar doação. Tente novamente.');
    }
  };
  
  const toggleItemSelection = (itemId) => {
    setSelectedItems(prev => 
      prev.includes(itemId) 
        ? prev.filter(id => id !== itemId)
        : [...prev, itemId]
    );
  };
  
  return (
    <div className="bg-white rounded-2xl border border-neutral-200 shadow-sm overflow-hidden fade-in">
      <div className="p-5 bg-gradient-to-r from-purple-600 to-purple-800 text-white">
        <div className="flex items-center gap-3">
          <div className="p-3 bg-white/20 rounded-xl">
            <Icon name="git-merge" size={24}/>
          </div>
          <div>
            <h3 className="text-xl font-black uppercase">Sistema de Doação de Peças</h3>
            <p className="text-[9px] font-bold opacity-80">Transfira peças entre veículos para agilizar reparos</p>
          </div>
        </div>
      </div>
      
      <div className="p-6">
        {/* Step indicator */}
        <div className="flex items-center justify-center mb-8">
          {[1,2,3].map((s, i) => (
            <React.Fragment key={s}>
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-black text-sm ${step >= s ? 'bg-purple-600 text-white' : 'bg-neutral-200 text-neutral-400'}`}>
                {s}
              </div>
              {i < 2 && <div className={`w-16 h-1 ${step > s ? 'bg-purple-600' : 'bg-neutral-200'}`}/>}
            </React.Fragment>
          ))}
        </div>
        
        {step === 1 && (
          <div className="space-y-4">
            <p className="text-sm font-black uppercase text-neutral-600">Passo 1: Selecione a OS doadora (veículo que vai doar peças)</p>
            <select 
              value={selectedSourceOS} 
              onChange={e => setSelectedSourceOS(e.target.value)}
              className="w-full p-4 bg-neutral-50 border-2 border-neutral-200 rounded-xl font-black text-lg"
            >
              <option value="">Selecione a OS doadora...</option>
              {requests.filter(r => r.items?.some(it => it.status === 'Concluído' || it.status === 'Pendente')).map(r => (
                <option key={r.id} value={r.os}>
                  OS #{r.os} - {r.vehicleData?.modelo} ({r.items?.length || 0} peças)
                </option>
              ))}
            </select>
            <button 
              onClick={() => setStep(2)} 
              disabled={!selectedSourceOS}
              className={`w-full py-4 rounded-xl font-black uppercase ${selectedSourceOS ? 'bg-purple-600 text-white' : 'bg-neutral-200 text-neutral-400'}`}
            >
              Próximo →
            </button>
          </div>
        )}
        
        {step === 2 && (
          <div className="space-y-4">
            <p className="text-sm font-black uppercase text-neutral-600">Passo 2: Selecione as peças para doar</p>
            {availableSourceItems.length === 0 ? (
              <p className="text-center text-neutral-400 py-8">Nenhuma peça disponível para doação nesta OS</p>
            ) : (
              <div className="max-h-96 overflow-y-auto space-y-2">
                {availableSourceItems.map((item, idx) => (
                  <label key={item.id || idx} className="flex items-center gap-3 p-3 border rounded-xl cursor-pointer hover:bg-purple-50">
                    <input 
                      type="checkbox" 
                      checked={selectedItems.includes(item.id)}
                      onChange={() => toggleItemSelection(item.id)}
                      className="w-5 h-5 accent-purple-600"
                    />
                    <div className="flex-1">
                      <p className="font-black uppercase text-sm">{item.description}</p>
                      <div className="flex gap-2 mt-1">
                        <span className="text-xs">Qtd: {item.quantity}</span>
                        <StatusBadge status={item.status}/>
                      </div>
                    </div>
                    {item.photo && <img src={item.photo} className="w-12 h-12 rounded object-cover"/>}
                  </label>
                ))}
              </div>
            )}
            <div className="flex gap-3">
              <button onClick={() => setStep(1)} className="flex-1 py-4 bg-neutral-200 rounded-xl font-black uppercase">← Voltar</button>
              <button 
                onClick={() => setStep(3)} 
                disabled={selectedItems.length === 0}
                className={`flex-1 py-4 rounded-xl font-black uppercase ${selectedItems.length > 0 ? 'bg-purple-600 text-white' : 'bg-neutral-200 text-neutral-400'}`}
              >
                Próximo →
              </button>
            </div>
          </div>
        )}
        
        {step === 3 && (
          <div className="space-y-4">
            <p className="text-sm font-black uppercase text-neutral-600">Passo 3: Selecione a OS receptora (veículo que receberá as peças)</p>
            <select 
              value={selectedTargetOS} 
              onChange={e => setSelectedTargetOS(e.target.value)}
              className="w-full p-4 bg-neutral-50 border-2 border-neutral-200 rounded-xl font-black text-lg"
            >
              <option value="">Selecione a OS receptora...</option>
              {requests.filter(r => String(r.os) !== selectedSourceOS).map(r => (
                <option key={r.id} value={r.os}>
                  OS #{r.os} - {r.vehicleData?.modelo}
                </option>
              ))}
            </select>
            
            <div className="bg-purple-50 p-4 rounded-xl">
              <p className="font-black uppercase text-purple-800 mb-2">Resumo da Doação</p>
              <p className="text-sm">OS Doadora: <strong>#{selectedSourceOS}</strong></p>
              <p className="text-sm">OS Receptora: <strong>#{selectedTargetOS || '(não selecionada)'}</strong></p>
              <p className="text-sm mt-2">{selectedItems.length} peça(s) selecionada(s)</p>
            </div>
            
            <div className="flex gap-3">
              <button onClick={() => setStep(2)} className="flex-1 py-4 bg-neutral-200 rounded-xl font-black uppercase">← Voltar</button>
              <button 
                onClick={handleDonate} 
                disabled={!selectedTargetOS}
                className={`flex-1 py-4 rounded-xl font-black uppercase ${selectedTargetOS ? 'bg-purple-600 text-white' : 'bg-neutral-200 text-neutral-400'}`}
              >
                Confirmar Doação 🎁
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Request Form (com unidade) ─────────────────────────────────────────────
function RequestForm({user,loggedInUser,vehiclesDB,requests}){
  const [os,setOs]=useState('');
  const [vehicle,setVehicle]=useState(null);
  const [unidade,setUnidade]=useState('Unidade 1');
  const [items,setItems]=useState([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);
  const [submitting,setSubmitting]=useState(false);
  const [done,setDone]=useState(false);
  const [semFoto,setSemFoto]=useState([]);
  const [showFoto,setShowFoto]=useState(false);
  const [showDup,setShowDup]=useState(false);
  const [dups,setDups]=useState([]);
  const [compressing,setCompressing] = useState(false);

  const onOSBlur=()=>{
    const t=String(os).trim();if(!t)return;
    const f=vehiclesDB.find(v=>String(v.os).trim()===t);
    if(f)setVehicle(f);else{setVehicle(null);alert('OS não cadastrada.');}
  };

  // Compressão de imagem
  const compressImage = async (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          
          // Redimensionar para no máximo 1024px
          let width = img.width;
          let height = img.height;
          const maxSize = 1024;
          
          if (width > height && width > maxSize) {
            height *= maxSize / width;
            width = maxSize;
          } else if (height > maxSize) {
            width *= maxSize / height;
            height = maxSize;
          }
          
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          
          // Comprimir para JPEG com qualidade 0.7
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const handleImageUpload = async (itemId, file) => {
    setCompressing(true);
    try {
      const compressed = await compressImage(file);
      setItems(p=>p.map(i=>i.id===itemId?{...i,photo:compressed}:i));
      setSemFoto(p=>p.filter(id=>id!==itemId));
    } catch (error) {
      console.error('Erro ao comprimir imagem:', error);
      alert('Erro ao processar imagem. Tente novamente.');
    }
    setCompressing(false);
  };

  const salvar=async()=>{
    setSubmitting(true);
    try{
      await col('requests').add({
        os,
        responsavel:loggedInUser.user,
        localizacaoSolicitacao:'-',
        vehicleData:vehicle,
        unidade, // Nova propriedade
        items,
        timestamp:Date.now(),
        status:'Pendente',
        userId:user.uid||'anon'
      });
      setDone(true);
      setShowDup(false);
    }catch(error){
      console.error('Erro ao salvar:', error);
      alert('Erro ao salvar pedido. Verifique sua conexão.');
    }
    setSubmitting(false);
  };

  const submit=async e=>{
    e.preventDefault();
    if(!os.trim())return alert('OS obrigatória.');
    if(!vehicle)return alert('OS não cadastrada no sistema.');
    if(items.some(i=>!i.description.trim()))return alert('Todos os itens precisam de descrição.');
    const sf=items.filter(i=>!i.photo).map(i=>i.id);
    if(sf.length){setSemFoto(sf);setShowFoto(true);return;}
    const ex=requests.filter(r=>String(r.os).trim()===String(os).trim());
    if(ex.length){setDups(ex);setShowDup(true);return;}
    await salvar();
  };

  if(done) return (
    <div className="flex flex-col items-center justify-center py-10 fade-in bg-white rounded-3xl border p-8 max-w-md mx-auto text-center">
      <Icon name="check-circle" size={48} className="text-emerald-500 mb-4"/>
      <h2 className="text-xl font-black uppercase">Pedido Protocolado!</h2>
      <p className="text-sm text-neutral-500 mt-2">OS #{os} - {unidade}</p>
      <button onClick={()=>{setDone(false);setOs('');setVehicle(null);setUnidade('Unidade 1');setItems([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);}} className="mt-8 w-full py-4 bg-red-600 text-white rounded-2xl font-black uppercase text-xs shadow-lg hover:bg-red-700">Nova Solicitação</button>
    </div>
  );

  return (
    <div className="space-y-4 fade-in">
      {showFoto&&(
        <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-sm rounded-3xl overflow-hidden shadow-2xl">
            <div className="bg-red-600 p-6 text-center text-white">
              <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3">
                <Icon name="camera" size={28}/>
              </div>
              <h3 className="text-lg font-black uppercase">Foto Obrigatória!</h3>
            </div>
            <div className="p-6">
              <p className="text-xs font-bold text-neutral-600 text-center">{semFoto.length} item(s) sem foto.</p>
              <button onClick={()=>setShowFoto(false)} className="mt-4 w-full py-3.5 bg-red-600 text-white rounded-xl font-black uppercase text-[10px]">Entendido</button>
            </div>
          </div>
        </div>
      )}
      
      {showDup&&(
        <div className="fixed inset-0 z-[600] bg-black/85 backdrop-blur-sm flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-2xl rounded-3xl overflow-hidden shadow-2xl">
            <div className="bg-black p-5 text-white border-b-4 border-red-600 flex items-center gap-4">
              <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center shrink-0">
                <Icon name="alert-triangle" size={22}/>
              </div>
              <div>
                <h3 className="text-base font-black uppercase">OS já possui pedido!</h3>
                <p className="text-neutral-400 text-[9px] font-bold uppercase mt-1">OS #{os} — Contará como inclusão adicional</p>

            </div>
            <div className="p-5 max-h-[40vh] overflow-y-auto scrollbar-hide space-y-3">
              {dups.map((req,i)=>(
                <div key={i} className="bg-neutral-50 rounded-xl p-3 border">
                  <p className="text-[9px] font-black uppercase text-neutral-500 mb-2">
                    {new Date(req.timestamp).toLocaleDateString()} — {req.responsavel} ({req.unidade || 'Unidade 1'})

                    {(req.items||[]).map((it,j)=>(
                      <div key={j} className="flex items-center gap-2 bg-white border rounded-lg px-2 py-1">

            </div>
            <div className="p-5 bg-neutral-50 border-t flex gap-3">

            <div>

                      setItems(items.filter(i=>i.id!==it.id));
                      setSemFoto(p=>p.filter(id=>id!==it.id));

                      setItems([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);
                      setSemFoto([]);
                    }
                  }} 
                  className="flex items-center gap-1.5 bg-red-600 hover:bg-red-700 text-white px-3 py-1.5 rounded-lg text-[9px] font-black uppercase active:scale-95 transition-transform"

              </div>

                <div>
                  <label className="text-[9px] font-black text-neutral-400 uppercase block mb-1.5">Descrição da Peça</label>
                  <input 
                    type="text" 
                    value={it.description} 
                    onChange={e=>setItems(p=>p.map(i=>i.id===it.id?{...i,description:sanitizeInput(e.target.value)}:i))} 
                    placeholder="NOME DA PEÇA" 
                    className="w-full p-4 bg-neutral-50 border-2 border-neutral-200 rounded-xl font-black text-base uppercase focus:border-red-600 outline-none" 
                    required 
                    autoCapitalize="characters"

                  />
