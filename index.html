@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap');

* { box-sizing: border-box; }

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
  margin: 0;
  overflow: hidden;
}

/* Animações */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes slideInLeft {
  from { opacity: 0; transform: translateX(-30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes slideInRight {
  from { opacity: 0; transform: translateX(30px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

@keyframes shimmer {
  0% { background-position: -1000px 0; }
  100% { background-position: 1000px 0; }
}

.fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
.slide-in-left { animation: slideInLeft 0.3s ease-out forwards; }
.slide-in-right { animation: slideInRight 0.3s ease-out forwards; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }

/* Card hover */
.hover-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
.hover-card:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15); }

/* Skeleton */
.skeleton {
  background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

/* Glassmorphism */
.glass {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Mobile Bottom Nav */
@media (max-width: 768px) {
  .mobile-bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    display: flex;
    padding: 8px 12px 20px;
    gap: 4px;
    z-index: 90;
  }
  
  .mobile-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 12px;
    transition: all 0.2s;
  }
  
  .mobile-nav-item.active {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
  }
}

/* Progress ring */
.progress-ring__circle {
  transition: stroke-dashoffset 0.35s;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
}

/* Excel input */
.excel-input {
  border: none;
  width: 100%;
  height: 100%;
  padding: 4px 8px;
  background: transparent;
  font-size: 11px;
  outline: none;
}
.excel-input:focus { background: #fffbeb; box-shadow: inset 0 0 0 2px #ef4444; }
</style>

const useFirestore = (collectionName) => {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  
  useEffect(() => {
    setLoading(true);
    const unsubscribe = col(collectionName).onSnapshot(
      snapshot => { setData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }))); setLoading(false); },
      err => { setError(err); setLoading(false); }
    );
    return unsubscribe;
  }, [collectionName]);
  
  return { data, loading, error };
};

function Icon({ name, size = 18, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide && window.lucide.icons[name]) {
      const icon = window.lucide.icons[name];
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', size);
      svg.setAttribute('height', size);
      svg.setAttribute('viewBox', '0 0 24 24');
      svg.setAttribute('fill', 'none');
      svg.setAttribute('stroke', 'currentColor');
      svg.setAttribute('stroke-width', '2');
      svg.setAttribute('stroke-linecap', 'round');
      svg.setAttribute('stroke-linejoin', 'round');
      svg.setAttribute('class', className);
      const paths = icon[2] || [];
      svg.innerHTML = paths.map(p => `<${p[0]} ${Object.entries(p[1] || {}).map(([k, v]) => `${k}="${v}"`).join(' ')}></${p[0]}>`).join('');
      ref.current.innerHTML = '';
      ref.current.appendChild(svg);
    }
  }, [name, size, className]);
  return <span ref={ref} className="inline-flex items-center justify-center" />;
}

// ============================================

// ============================================
function NetworkStatus() {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const handleChange = () => setOnline(navigator.onLine);
    window.addEventListener('online', handleChange);
    window.addEventListener('offline', handleChange);
    return () => { window.removeEventListener('online', handleChange); window.removeEventListener('offline', handleChange); };
  }, []);
  if (online) return null;
  return <div className="fixed top-0 left-0 right-0 bg-gradient-to-r from-yellow-500 to-orange-500 text-white text-center py-2 text-xs font-bold z-[1000] shadow-lg">📡 Modo Offline - Alterações serão sincronizadas quando reconectar</div>;
}

// ============================================
// DONUT CHART
// ============================================
function Donut({ slices, size = 110 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    const ctx = ref.current.getContext('2d');
    const total = slices.reduce((a, s) => a + s.v, 0);
    ctx.clearRect(0, 0, size, size);
    const cx = size / 2, cy = size / 2, r = size / 2 - 6;
    if (!total) { ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2 * Math.PI); ctx.fillStyle = '#f1f5f9'; ctx.fill(); }
    else {
      let start = -Math.PI / 2;
      slices.forEach(s => {
        const ang = (s.v / total) * 2 * Math.PI;
        ctx.beginPath(); ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, start, start + ang); ctx.closePath();
        ctx.fillStyle = s.c; ctx.fill(); start += ang;
      });
    }
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.58, 0, 2 * Math.PI); ctx.fillStyle = '#fff'; ctx.fill();
  }, [slices, size]);
  return <canvas ref={ref} width={size} height={size} />;
}

// ============================================
// MINI BAR CHART
// ============================================
function MiniBar({ data, color = '#ef4444' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !data?.length) return;
    const ctx = ref.current.getContext('2d');
    const w = ref.current.width, h = ref.current.height;
    ctx.clearRect(0, 0, w, h);
    const max = Math.max(...data.map(d => d.v), 1);
    const bw = w / data.length;
    data.forEach((d, i) => {
      const bh = (d.v / max) * (h - 22);
      ctx.fillStyle = i === data.length - 1 ? color : color + '99';
      ctx.fillRect(i * bw + 2, h - bh - 20, bw - 4, bh);
      ctx.fillStyle = '#94a3b8'; ctx.font = 'bold 8px Inter'; ctx.textAlign = 'center';
      ctx.fillText(d.l, i * bw + bw / 2, h - 4);
      if (d.v > 0) { ctx.fillStyle = '#475569'; ctx.font = 'bold 9px Inter'; ctx.fillText(d.v, i * bw + bw / 2, h - bh - 24); }
    });
  }, [data, color]);
  return <canvas ref={ref} width={280} height={110} className="w-full" />;
}

// ============================================
// DASHBOARD VIEW (COMPLETA)
// ============================================
function DashboardView({ requests }) {
  const stats = useMemo(() => {
    if (!requests?.length) return null;
    const byOS = {};
    requests.forEach(r => { const k = String(r.os || '').trim(); if (k) { if (!byOS[k]) byOS[k] = []; byOS[k].push(r); } });
    const multi = Object.entries(byOS).filter(([, a]) => a.length > 1);
    const totalAdd = multi.reduce((a, [, arr]) => a + (arr.length - 1), 0);
    const intervalos = [], detalhe = [];
    multi.forEach(([os, arr]) => {
      const sorted = [...arr].sort((a, b) => a.timestamp - b.timestamp);
      sorted.slice(1).forEach(p => {
        const dias = Math.round((p.timestamp - sorted[0].timestamp) / 864e5);
        intervalos.push(dias);
        detalhe.push({ os, dias, sol: p.responsavel, dt0: sorted[0].timestamp, dt1: p.timestamp });
      });
    });
    const mediaAdd = intervalos.length ? (intervalos.reduce((a, b) => a + b, 0) / intervalos.length).toFixed(1) : 0;
    const maxAdd = intervalos.length ? Math.max(...intervalos) : 0;
    let totalIt = 0, pend = 0, cotac = 0, conc = 0, doado = 0;
    requests.forEach(r => (r.items || []).forEach(it => { totalIt++; if (it.status === 'Concluído') conc++; else if (it.status === 'Doado') doado++; else if (it.status === 'Em Cotação') cotac++; else pend++; }));
    const porSol = {};
    requests.forEach(r => { porSol[r.responsavel] = (porSol[r.responsavel] || 0) + 1; });
    const rankSol = Object.entries(porSol).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const diasSem = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    const porDia = [0, 0, 0, 0, 0, 0, 0];
    requests.forEach(r => porDia[new Date(r.timestamp).getDay()]++);
    const pedDia = diasSem.map((l, i) => ({ l, v: porDia[i] }));
    const agora = Date.now();
    const semanas = Array.from({ length: 8 }, (_, i) => {
      const ini = agora - (8 - i) * 7 * 864e5, fim = agora - (7 - i) * 7 * 864e5;
      const cnt = requests.filter(r => r.timestamp >= ini && r.timestamp < fim).length;
      const d = new Date(ini);
      return { l: `${d.getDate()}/${d.getMonth() + 1}`, v: cnt };
    });
    const porMod = {};
    requests.forEach(r => { const m = r.vehicleData?.modelo || 'N/D'; porMod[m] = (porMod[m] || 0) + 1; });
    const rankMod = Object.entries(porMod).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const osRep = Object.entries(byOS).filter(([, v]) => v.length > 1).sort((a, b) => b[1].length - a[1].length).slice(0, 5);
    const taxa = totalIt > 0 ? Math.round(conc / totalIt * 100) : 0;
    const porUnidade = {};
    requests.forEach(r => { const u = r.unidade || 'Unidade 1'; porUnidade[u] = (porUnidade[u] || 0) + 1; });
    return { total: requests.length, osU: Object.keys(byOS).length, totalAdd, mediaAdd: parseFloat(mediaAdd), maxAdd, detalhe: detalhe.sort((a, b) => b.dt1 - a.dt1).slice(0, 8), totalIt, pend, cotac, conc, doado, rankSol, pedDia, semanas, rankMod, osRep, taxa, porUnidade };
  }, [requests]);

  if (!stats) {
    return <div className="flex flex-col items-center justify-center py-32"><Icon name="bar-chart-2" size={48} className="text-gray-300 mb-4" /><p className="text-sm font-bold text-gray-400">Nenhum dado disponível</p></div>;
  }

  const maxSol = stats.rankSol[0]?.[1] || 1, maxMod = stats.rankMod[0]?.[1] || 1;

  return (
    <div className="space-y-6 fade-in-up pb-10">
      <div className="flex items-center justify-between">
        <div><h1 className="text-3xl font-black bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">Analytics VRZ</h1><p className="text-xs text-gray-500 mt-1">Inteligência Operacional em Tempo Real</p></div>
        <div className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl shadow-lg"><div className="w-2 h-2 bg-white rounded-full animate-pulse"></div><span className="text-[10px] font-bold text-white">Live</span></div>
      </div>

      <div className="grid grid-cols-2 lg:grid-cols-5 gap-4">
        <div className="bg-gradient-to-r from-gray-900 to-gray-800 rounded-2xl p-5 text-white shadow-xl"><Icon name="clipboard-list" size={24} className="mb-3 opacity-80" /><p className="text-3xl font-black">{stats.total}</p><p className="text-[10px] font-bold uppercase mt-1">Total Pedidos</p><p className="text-[7px] opacity-40">{stats.osU} OS únicas</p></div>
        <div className="bg-gradient-to-r from-red-500 to-red-600 rounded-2xl p-5 text-white shadow-xl"><Icon name="plus-circle" size={24} className="mb-3 opacity-80" /><p className="text-3xl font-black">{stats.totalAdd}</p><p className="text-[10px] font-bold uppercase mt-1">Inclusões</p><p className="text-[7px] opacity-40">mesma OS</p></div>
        <div className="bg-gradient-to-r from-orange-500 to-orange-600 rounded-2xl p-5 text-white shadow-xl"><Icon name="clock" size={24} className="mb-3 opacity-80" /><p className="text-3xl font-black">{stats.mediaAdd > 0 ? stats.mediaAdd + 'd' : '—'}</p><p className="text-[10px] font-bold uppercase mt-1">Média p/ Inclusão</p><p className="text-[7px] opacity-40">máx {stats.maxAdd}d</p></div>
        <div className="bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-2xl p-5 text-white shadow-xl"><Icon name="check-circle" size={24} className="mb-3 opacity-80" /><p className="text-3xl font-black">{stats.taxa}%</p><p className="text-[10px] font-bold uppercase mt-1">Taxa de Conclusão</p><p className="text-[7px] opacity-40">{stats.conc} de {stats.totalIt} itens</p></div>
        <div className="bg-gradient-to-r from-purple-500 to-purple-600 rounded-2xl p-5 text-white shadow-xl"><Icon name="git-merge" size={24} className="mb-3 opacity-80" /><p className="text-3xl font-black">{stats.doado}</p><p className="text-[10px] font-bold uppercase mt-1">Peças Doadas</p><p className="text-[7px] opacity-40">transferidas</p></div>
      </div>

      <div className="bg-white rounded-2xl p-6 shadow-lg"><p className="text-xs font-bold uppercase text-gray-500 mb-4">Pedidos por Unidade</p><div className="flex gap-4">{UNIDADES.map(u => (<div key={u} className="flex-1"><div className="flex justify-between mb-2"><span className="text-sm font-bold text-gray-700">{u}</span><span className="text-sm font-bold text-red-600">{stats.porUnidade[u] || 0}</span></div><div className="h-2 bg-gray-100 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-red-500 to-red-600 rounded-full transition-all" style={{ width: `${((stats.porUnidade[u] || 0) / stats.total * 100)}%` }} /></div></div>))}</div></div>

      <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div className="bg-white rounded-2xl p-6 shadow-lg"><p className="text-xs font-bold uppercase text-gray-500 mb-4">Pipeline de Itens</p><div className="flex items-center gap-4"><Donut size={110} slices={[{ v: stats.pend, c: '#f97316' }, { v: stats.cotac, c: '#3b82f6' }, { v: stats.conc, c: '#000' }, { v: stats.doado, c: '#9333ea' }]} /><div className="space-y-2 flex-1">{[{ l: 'Pendentes', v: stats.pend, c: 'bg-orange-500' }, { l: 'Em Cotação', v: stats.cotac, c: 'bg-blue-600' }, { l: 'Concluídos', v: stats.conc, c: 'bg-black' }, { l: 'Doados', v: stats.doado, c: 'bg-purple-600' }].map(s => (<div key={s.l}><div className="flex justify-between mb-1"><div className="flex items-center gap-1"><div className={`w-2 h-2 rounded-full ${s.c}`} /><span className="text-[8px] font-bold text-gray-500">{s.l}</span></div><span className="text-[9px] font-black">{s.v}</span></div><div className="h-1 bg-gray-100 rounded-full"><div className={`h-full ${s.c} rounded-full transition-all`} style={{ width: stats.totalIt > 0 ? `${s.v / stats.totalIt * 100}%` : '0%' }} /></div></div>))}</div></div></div>
        <div className="bg-white rounded-2xl p-6 shadow-lg"><p className="text-xs font-bold uppercase text-gray-500 mb-1">Pedidos por Semana</p><p className="text-[7px] text-gray-300 mb-3">Últimas 8 semanas</p><MiniBar data={stats.semanas} color="#ef4444" /></div>
        <div className="bg-white rounded-2xl p-6 shadow-lg"><p className="text-xs font-bold uppercase text-gray-500 mb-1">Distribuição Semanal</p><p className="text-[7px] text-gray-300 mb-3">Qual dia mais solicita</p><MiniBar data={stats.pedDia} color="#3b82f6" /></div>
      </div>

      <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div className="bg-white rounded-2xl p-6 shadow-lg"><p className="text-xs font-bold uppercase text-gray-500 mb-4">Top Solicitantes</p><div className="space-y-3">{stats.rankSol.map(([nome, qtd], i) => (<div key={i} className="flex items-center gap-3"><div className={`w-6 h-6 rounded-full flex items-center justify-center text-[8px] font-bold ${i === 0 ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-600'}`}>{i + 1}</div><div className="flex-1"><div className="flex justify-between mb-1"><span className="text-[9px] font-bold truncate">{nome}</span><span className="text-[9px] font-bold text-gray-400">{qtd}</span></div><div className="h-1.5 bg-gray-100 rounded-full"><div className={`h-full rounded-full ${i === 0 ? 'bg-red-500' : 'bg-gray-400'}`} style={{ width: `${qtd / maxSol * 100}%` }} /></div></div></div>))}</div></div>

// REQUEST FORM (COMPLETA)
// ============================================
function RequestForm({ user, loggedInUser, vehiclesDB, requests }) {
  const [os, setOs] = useState('');
  const [vehicle, setVehicle] = useState(null);
  const [unidade, setUnidade] = useState('Unidade 1');
  const [items, setItems] = useState([{ id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }]);
  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);
  const [semFoto, setSemFoto] = useState([]);
  const [showFoto, setShowFoto] = useState(false);
  const [showDup, setShowDup] = useState(false);
  const [dups, setDups] = useState([]);
  const [compressing, setCompressing] = useState(false);

  const onOSBlur = () => { const t = String(os).trim(); if (!t) return; const f = vehiclesDB.find(v => String(v.os).trim() === t); if (f) setVehicle(f); else { setVehicle(null); alert('OS não cadastrada.'); } };

  const compressImage = async (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let width = img.width, height = img.height;
          const maxSize = 1024;
          if (width > height && width > maxSize) { height *= maxSize / width; width = maxSize; }
          else if (height > maxSize) { width *= maxSize / height; height = maxSize; }
          canvas.width = width; canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const handleImageUpload = async (itemId, file) => {
    setCompressing(true);
    try { const compressed = await compressImage(file); setItems(p => p.map(i => i.id === itemId ? { ...i, photo: compressed } : i)); setSemFoto(p => p.filter(id => id !== itemId)); } catch (error) { alert('Erro ao processar imagem.'); }
    setCompressing(false);
  };

  const salvar = async () => {
    setSubmitting(true);
    try {
      await col('requests').add({ os, responsavel: loggedInUser.user, localizacaoSolicitacao: '-', vehicleData: vehicle, unidade, items, timestamp: Date.now(), status: 'Pendente', userId: user?.uid || 'anon' });
      setDone(true); setShowDup(false);
    } catch (error) { alert('Erro ao salvar pedido.'); }
    setSubmitting(false);
  };

  const submit = async e => {
    e.preventDefault();
    if (!os.trim()) return alert('OS obrigatória.');
    if (!vehicle) return alert('OS não cadastrada.');
    if (items.some(i => !i.description.trim())) return alert('Todos os itens precisam de descrição.');
    const sf = items.filter(i => !i.photo).map(i => i.id);
    if (sf.length) { setSemFoto(sf); setShowFoto(true); return; }
    const ex = requests.filter(r => String(r.os).trim() === String(os).trim());
    if (ex.length) { setDups(ex); setShowDup(true); return; }
    await salvar();
  };

  if (done) {
    return <div className="flex flex-col items-center justify-center py-16 bg-white rounded-2xl shadow-xl p-8 max-w-md mx-auto text-center"><Icon name="check-circle" size={48} className="text-emerald-500 mb-4" /><h2 className="text-xl font-black">Pedido Protocolado!</h2><p className="text-gray-500 mt-2">OS #{os} - {unidade}</p><button onClick={() => { setDone(false); setOs(''); setVehicle(null); setUnidade('Unidade 1'); setItems([{ id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }]); }} className="mt-6 w-full py-3 bg-red-500 text-white rounded-xl font-bold">Nova Solicitação</button></div>;
  }

  return (
    <div className="space-y-6 fade-in-up">
      {showFoto && <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur flex items-center justify-center p-4"><div className="bg-white rounded-2xl max-w-sm w-full"><div className="bg-gradient-to-r from-red-500 to-red-600 p-6 text-center text-white"><Icon name="camera" size={32} className="mx-auto mb-3" /><h3 className="text-lg font-black">Foto Obrigatória!</h3></div><div className="p-6"><p className="text-sm text-center">{semFoto.length} item(s) sem foto.</p><button onClick={() => setShowFoto(false)} className="mt-4 w-full py-3 bg-red-500 text-white rounded-xl font-bold">Entendido</button></div></div></div>}
      
      {showDup && <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur flex items-center justify-center p-4"><div className="bg-white rounded-2xl max-w-2xl w-full"><div className="bg-gradient-to-r from-gray-800 to-gray-900 p-5 text-white"><div className="flex items-center gap-4"><Icon name="alert-triangle" size={22} /><div><h3 className="font-black">OS já possui pedido!</h3><p className="text-gray-400 text-[10px]">OS #{os} — Contará como inclusão adicional</p></div></div></div><div className="p-5 max-h-[40vh] overflow-y-auto">{dups.map(req => (<div key={req.id} className="bg-gray-50 rounded-xl p-3 mb-3"><p className="text-[10px] text-gray-500">{new Date(req.timestamp).toLocaleDateString()} — {req.responsavel} ({req.unidade})</p><div className="flex flex-wrap gap-2 mt-2">{(req.items || []).map((it, j) => (<div key={j} className="bg-white border rounded-lg px-2 py-1 text-[10px]">{it.description}</div>))}</div></div>))}</div><div className="p-5 border-t flex gap-3"><button onClick={() => { setShowDup(false); setDups([]); }} className="flex-1 py-3 bg-gray-200 rounded-xl font-bold">Cancelar</button><button onClick={salvar} disabled={submitting} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">{submitting ? 'Enviando...' : 'Incluir mesmo assim'}</button></div></div></div>}

      <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div className="bg-gradient-to-r from-gray-900 to-gray-800 px-6 py-4"><h2 className="text-xl font-black text-white">Nova Requisição</h2><p className="text-xs text-gray-400 mt-1">Preencha os dados da solicitação</p></div>
        <form onSubmit={submit} className="p-6 space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div><label className="text-xs font-bold text-gray-500 block mb-2">Número da OS</label><input type="text" inputMode="numeric" value={os} onChange={e => setOs(sanitizeInput(e.target.value))} onBlur={onOSBlur} className="w-full px-4 py-3 bg-gray-50 border-2 rounded-xl focus:border-red-500 outline-none font-bold" required /></div>
            <div><label className="text-xs font-bold text-gray-500 block mb-2">Unidade</label><select value={unidade} onChange={e => setUnidade(e.target.value)} className="w-full px-4 py-3 bg-gray-50 border-2 rounded-xl focus:border-red-500 outline-none">{UNIDADES.map(u => <option key={u}>{u}</option>)}</select></div>
          </div>

          {vehicle && <div className="bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl p-4 text-white"><div className="flex justify-between"><div><p className="text-gray-400 text-[10px]">Modelo</p><p className="text-xl font-black">{vehicle.modelo}</p></div><div className="text-right"><p className="text-gray-400 text-[10px]">Fabricante</p><p className="font-bold">{vehicle.fabricante}</p></div></div><div className="grid grid-cols-3 gap-2 mt-3 pt-3 border-t border-white/10"><div><p className="text-gray-400 text-[10px]">Etapa</p><p className="text-red-400 font-bold">{vehicle.etapa}</p></div><div><p className="text-gray-400 text-[10px]">Cor</p><p>{vehicle.cor}</p></div><div><p className="text-gray-400 text-[10px]">Local</p><p>{vehicle.localizacao}</p></div></div><div className="mt-3 pt-3 border-t border-white/10"><p className="text-gray-400 text-[10px]">Chassi</p><p className="font-mono text-sm">{vehicle.chassi}</p></div></div>}

          <div><div className="flex justify-between items-center mb-4"><h3 className="font-bold text-gray-800">Peças</h3><button type="button" onClick={() => setItems([...items, { id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }])} className="bg-red-500 text-white px-4 py-2 rounded-xl text-xs font-bold">+ Item</button></div><div className="space-y-4">{items.map((it, idx) => (<div key={it.id} className="bg-gray-50 rounded-xl p-4 border"><div className="flex justify-between mb-3"><span className="text-xs font-bold text-gray-500">Item {idx + 1}</span>{items.length > 1 && <button type="button" onClick={() => setItems(items.filter(i => i.id !== it.id))} className="text-red-500 text-xs">Remover</button>}</div><input type="text" value={it.description} onChange={e => setItems(items.map(i => i.id === it.id ? { ...i, description: sanitizeInput(e.target.value) } : i))} placeholder="Descrição da peça" className="w-full px-3 py-2 bg-white border rounded-lg mb-3" required /><div className="flex gap-3"><input type="number" min="1" value={it.quantity} onChange={e => setItems(items.map(i => i.id === it.id ? { ...i, quantity: e.target.value } : i))} className="w-24 px-3 py-2 bg-white border rounded-lg text-center" /><label className="flex-1 flex items-center justify-center gap-2 px-3 py-2 bg-white border rounded-lg cursor-pointer hover:bg-gray-50">{it.photo ? <><Icon name="check-circle" size={16} className="text-green-500" /><span>Foto OK</span></> : <><Icon name="camera" size={16} /><span>Adicionar foto</span></>}<input type="file" accept="image/*" capture="environment" onChange={e => e.target.files[0] && handleImageUpload(it.id, e.target.files[0])} className="hidden" /></label></div></div>))}</div></div>

          <button disabled={submitting || !vehicle || compressing} className={`w-full py-4 rounded-xl font-bold text-base shadow-lg transition ${submitting || !vehicle || compressing ? 'bg-gray-200 text-gray-400' : 'bg-gradient-to-r from-red-500 to-red-600 text-white hover:shadow-xl'}`}>{submitting ? 'Enviando...' : 'Enviar Pedido'}</button>
        </form>
      </div>
    </div>
  );
}

function StatusView({ requests, isAdmin }) {
  const [search, setSearch] = useState('');
  const [origem, setOrigem] = useState('todos');
  const [unidadeFilter, setUnidadeFilter] = useState('todas');
  const [toDelete, setToDelete] = useState(null);

  const filtered = useMemo(() => requests.filter(r => { const t = search.toLowerCase(); const match = String(r.os || '').toLowerCase().includes(t) || String(r.responsavel || '').toLowerCase().includes(t) || String(r.vehicleData?.modelo || '').toLowerCase().includes(t); const mo = origem === 'todos' || (origem === 'importado' ? r.importado : !r.importado); const mu = unidadeFilter === 'todas' || r.unidade === unidadeFilter; return match && mo && mu; }), [requests, search, origem, unidadeFilter]);

  const exportCSV = () => { const rows = [['Data', 'OS', 'Unidade', 'Chassi', 'Veiculo', 'Peca', 'Qtd', 'Status', 'Valor', 'Loja', 'Prazo', 'Entrega'].join(';')]; requests.forEach(r => (r.items || []).forEach(it => rows.push([r.timestamp ? new Date(r.timestamp).toLocaleDateString() : '', r.os, r.unidade || 'Unidade 1', r.vehicleData?.chassi || '-', r.vehicleData?.modelo || '-', it.description || '-', it.quantity || 1, it.statusOriginal || it.status || 'Pendente', it.price || 0, it.supplier || '-', it.deliveryDate || '-', it.actualDeliveryDate || '-'].join(';')))); const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Relatorio_VRZ_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click(); };
  const exportControle = () => { const byOS = {}; requests.forEach(r => { const k = String(r.os || '').trim(); if (!k) return; if (!byOS[k]) byOS[k] = { os: k, unidade: r.unidade || 'Unidade 1', modelo: r.vehicleData?.modelo || '-', chassi: r.vehicleData?.chassi || '-', fabricante: r.vehicleData?.fabricante || '-', itens: [], ts: r.timestamp || 0 }; (r.items || []).forEach(it => byOS[k].itens.push({ desc: it.description || '-', qty: it.quantity || 1, status: it.status || 'Pendente', orig: it.statusOriginal || '' })); if ((r.timestamp || 0) > byOS[k].ts) byOS[k].ts = r.timestamp; }); const header = ['OS', 'Unidade', 'Modelo', 'Fabricante', 'Chassi', 'Peças Solicitadas', 'Status Geral', 'Última Atualização'].join(';'); const rows = [header]; Object.values(byOS).sort((a, b) => parseInt(a.os) - parseInt(b.os)).forEach(r => { const pecas = r.itens.map(it => `${it.qty}x ${it.desc}`).join(' | '); let sg = 'Concluído'; if (r.itens.some(it => it.status === 'Pendente')) sg = 'Pendente'; else if (r.itens.some(it => it.status === 'Em Cotação')) sg = 'Em Cotação'; else if (r.itens.some(it => it.status === 'Doado')) sg = 'Doado'; const dt = r.ts ? new Date(r.ts).toLocaleDateString('pt-BR') : ''; rows.push([r.os, r.unidade, r.modelo, r.fabricante, r.chassi, `"${pecas}"`, sg, dt].join(';')); }); const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VRZ_Controle_PROCV_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click(); };
  const exportPDF = async req => { const { jsPDF } = window.jspdf; const doc = new jsPDF(); doc.setFontSize(16); doc.text('Solicitação de Peças - VRZ', 10, 15); doc.setFontSize(9); doc.text('OS: #' + req.os, 10, 24); doc.text('Unidade: ' + (req.unidade || 'Unidade 1'), 10, 30); doc.text('Data: ' + new Date(req.timestamp).toLocaleString(), 10, 36); doc.text('Veículo: ' + (req.vehicleData?.modelo || ''), 10, 42); doc.text('Chassi: ' + (req.vehicleData?.chassi || ''), 10, 48); doc.text('Solicitante: ' + req.responsavel, 10, 54); let y = 64; doc.setFontSize(11); doc.text('ITENS:', 10, y); y += 8; (req.items || []).forEach((it, i) => { if (y > 250) { doc.addPage(); y = 15; } doc.setFontSize(9); const statusText = it.status === 'Doado' ? `[DOADO para OS ${it.donatedTo || '?'}]` : `[${it.status || 'Pendente'}]`; doc.text(`${i + 1}. Qtd:${it.quantity} - ${it.description} ${statusText}`, 14, y); y += 7; if (it.photo) { try { doc.addImage(it.photo, 'JPEG', 14, y, 45, 28); y += 32; } catch { } } }); doc.save('OS_' + req.os + '_VRZ.pdf'); };

  return (
    <div className="space-y-6 fade-in-up">
      {toDelete && <div className="fixed inset-0 z-[500] bg-black/80 backdrop-blur flex items-center justify-center p-4"><div className="bg-white rounded-2xl max-w-sm w-full"><div className="bg-gradient-to-r from-red-500 to-red-600 p-6 text-center text-white"><Icon name="trash-2" size={32} className="mx-auto mb-3" /><h3 className="text-lg font-black">Excluir Registro</h3></div><div className="p-6"><p className="text-center mb-4">Confirmar exclusão permanente?</p><div className="flex gap-3"><button onClick={() => setToDelete(null)} className="flex-1 py-3 bg-gray-200 rounded-xl font-bold">Cancelar</button><button onClick={async () => { try { await col('requests').doc(toDelete).delete(); setToDelete(null); } catch (error) { alert('Erro ao excluir.'); } }} className="flex-1 py-3 bg-red-500 text-white rounded-xl font-bold">Confirmar</button></div></div></div></div>}

      <div className="flex flex-wrap justify-between items-center gap-4"><div><h1 className="text-2xl font-black">Histórico de OS</h1><p className="text-xs text-gray-500">Gestão e Exportação Detalhada</p></div><div className="flex flex-wrap gap-2"><div className="flex bg-white rounded-xl shadow overflow-hidden">{['todos', 'Todos'], ['portal', 'Portal'], ['importado', 'Planilha']].map(([v, l]) => <button key={v} onClick={() => setOrigem(v)} className={`px-3 py-2 text-[10px] font-bold ${origem === v ? 'bg-red-500 text-white' : 'text-gray-500'}`}>{l}</button>)}</div><select value={unidadeFilter} onChange={e => setUnidadeFilter(e.target.value)} className="px-3 py-2 bg-white border rounded-xl text-sm">{UNIDADES.map(u => <option key={u}>{u}</option>)}</select>{isAdmin && <><button onClick={exportCSV} className="bg-emerald-500 text-white px-3 py-2 rounded-xl text-xs font-bold">Excel</button><button onClick={exportControle} className="bg-gray-800 text-white px-3 py-2 rounded-xl text-xs font-bold">PROCV</button></>}<input type="text" placeholder="Buscar..." value={search} onChange={e => setSearch(e.target.value)} className="px-3 py-2 bg-white border rounded-xl w-40" /></div></div>

      <div className="space-y-3 max-h-[70vh] overflow-y-auto">

-bold">{fmtBRL(it.price)}</p>}</div>))}</div></div>))}
      </div>
    </div>
  );
}

// ============================================
// DONOR SYSTEM (COMPLETO)
// ============================================
function DonorSystem({ requests, vehicles, onDonate }) {
  const [selectedSourceOS, setSelectedSourceOS] = useState('');
  const [selectedTargetOS, setSelectedTargetOS] = useState('');
  const [selectedItems, setSelectedItems] = useState([]);
  const [step, setStep] = useState(1);

  const sourceRequest = requests.find(r => String(r.os) === selectedSourceOS);
  const targetRequest = requests.find(r => String(r.os) === selectedTargetOS);
  const availableSourceItems = useMemo(() => sourceRequest?.items?.filter(it => it.status === 'Concluído' || it.status === 'Pendente') || [], [sourceRequest]);

  const handleDonate = async () => {
    if (!sourceRequest || !targetRequest || selectedItems.length === 0) { alert('Selecione OS de origem, destino e pelo menos uma peça'); return; }
    if (!confirm(`Confirmar doação de ${selectedItems.length} peça(s) da OS ${selectedSourceOS} para OS ${selectedTargetOS}?`)) return;
    try {
      const batch = db.batch();
      const sourceItems = [...sourceRequest.items];
      selectedItems.forEach(itemId => { const idx = sourceItems.findIndex(it => it.id === itemId); if (idx !== -1) sourceItems[idx] = { ...sourceItems[idx], status: 'Doado', statusOriginal: 'Doado', donatedTo: selectedTargetOS, donatedAt: Date.now() }; });
      batch.update(col('requests').doc(sourceRequest.id), { items: sourceItems });
      const itemsToAdd = selectedItems.map(itemId => { const originalItem = sourceRequest.items.find(it => it.id === itemId); return { ...originalItem, id: Date.now() + Math.random(), status: 'Pendente', statusOriginal: undefined, donatedFrom: selectedSourceOS, photo: originalItem.photo, price: undefined, supplier: undefined, deliveryDate: undefined, actualDeliveryDate: undefined }; });
      const targetItems = [...(targetRequest.items || []), ...itemsToAdd];
      batch.update(col('requests').doc(targetRequest.id), { items: targetItems });
      await col('donations').add({ sourceOS: selectedSourceOS, targetOS: selectedTargetOS, items: selectedItems, donatedBy: 'Sistema', timestamp: Date.now() });
      await batch.commit();
      alert('Doação realizada com sucesso!'); onDonate?.();
      setSelectedSourceOS(''); setSelectedTargetOS(''); setSelectedItems([]); setStep(1);
    } catch (error) { alert('Erro ao processar doação.'); }
  };

  const toggleItemSelection = (itemId) => setSelectedItems(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);

  return (
    <div className="bg-white rounded-2xl shadow-xl overflow-hidden fade-in-up">
      <div className="bg-gradient-to-r from-purple-600 to-purple-700 p-6 text-white"><div className="flex items-center gap-3"><div className="p-3 bg-white/20 rounded-xl"><Icon name="git-merge" size={24} /></div><div><h3 className="text-2xl font-black">Sistema de Doação de Peças</h3><p className="text-[10px] opacity-80 mt-1">Transfira peças entre veículos para agilizar reparos</p></div></div></div>

// ============================================
// STORAGE VIEW (COMPLETO)
// ============================================
function StorageView({ requests }) {
  const LIM = 1000;
  const [sel, setSel] = useState({});
  const [exportando, setExportando] = useState(false);
  const [excluindo, setExcluindo] = useState(false);
  const [confirmar, setConfirmar] = useState(false);
  const [prog, setProg] = useState({ atual: 0, total: 0, msg: '' });

  const concluidos = useMemo(() => requests.filter(r => r.items?.length > 0 && r.items.every(it => it.status === 'Concluído')).sort((a, b) => a.timestamp - b.timestamp), [requests]);
  const total = requests.length;
  const totalConc = concluidos.length;
  const ativos = total - totalConc;
  const pctPed = Math.min(total / LIM * 100, 100);
  const bytesU = estimarBytes(requests);
  const bytesLim = 1073741824;
  const pctSt = Math.min(bytesU / bytesLim * 100, 100);
  const corB = pctPed >= 85 ? '#ef4444' : pctPed >= 60 ? '#f97316' : '#22c55e';
  const todosSel = concluidos.length > 0 && concluidos.every(r => sel[r.id]);
  const qtdSel = Object.values(sel).filter(Boolean).length;
  const idsSel = Object.entries(sel).filter(([, v]) => v).map(([id]) => id);
  const pedSel = concluidos.filter(r => idsSel.includes(r.id));

  const toggleTodos = () => todosSel ? setSel({}) : setSel(Object.fromEntries(concluidos.map(r => [r.id, true])));
  const exportCSV = () => { if (!pedSel.length) return; const rows = [['Data', 'OS', 'Unidade', 'Modelo', 'Fabricante', 'Chassi', 'Solicitante', 'Peça', 'Qtd', 'Status', 'Fornecedor', 'Valor', 'Entrega Real'].join(';')]; pedSel.forEach(r => (r.items || []).forEach(it => rows.push([r.timestamp ? new Date(r.timestamp).toLocaleDateString('pt-BR') : '', r.os, r.unidade || 'Unidade 1', r.vehicleData?.modelo || '', r.vehicleData?.fabricante || '', r.vehicleData?.chassi || '', r.responsavel || '', it.description || '', it.quantity || 1, it.statusOriginal || it.status || '', it.supplier || '', it.price ? Number(it.price).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : '', it.actualDeliveryDate || ''].join(';')))); const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VRZ_Concluidos_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click(); };
  const exportPDF = async () => { if (!pedSel.length) return; setExportando(true); try { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const hoje = new Date().toLocaleDateString('pt-BR'); doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 38, 'F'); doc.setTextColor(255, 255, 255); doc.setFontSize(16); doc.setFont('helvetica', 'bold'); doc.text('VRZ COMPRAS — ARQUIVO DE CONCLUÍDOS', 10, 16); doc.setFontSize(8); doc.setFont('helvetica', 'normal'); doc.text(`Gerado: ${hoje}  |  Pedidos: ${pedSel.length}`, 10, 28); doc.setTextColor(0, 0, 0); let y = 50; pedSel.forEach((req) => { if (y > 250) { doc.addPage(); y = 15; } doc.setFillColor(240, 240, 240); doc.rect(8, y - 4, 194, 13, 'F'); doc.setFont('helvetica', 'bold'); doc.setFontSize(9); doc.text(`OS #${req.os} (${req.unidade || 'Unidade 1'}) — ${req.vehicleData?.modelo || ''}`, 12, y + 3); doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.text(`Solicitante: ${req.responsavel || '—'}  |  ${req.timestamp ? new Date(req.timestamp).toLocaleDateString('pt-BR') : ''}  |  Chassi: ${req.vehicleData?.chassi || '—'}`, 12, y + 9); y += 16; (req.items || []).forEach((it, ii) => { if (y > 265) { doc.addPage(); y = 15; } doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(0, 0, 0); doc.text(`${ii + 1}. ${it.description || ''}`, 14, y); doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(80, 80, 80); const det = `Qtd:${it.quantity || 1}  Fornecedor:${it.supplier || '—'}  Valor:${it.price ? 'R$' + Number(it.price).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : '—'}  Entrega:${it.actualDeliveryDate || '—'}`; const ls = doc.splitTextToSize(det, 180); doc.text(ls, 16, y + 5); doc.setTextColor(0, 0, 0); y += 5 + ls.length * 4 + 2; }); y += 4; doc.setDrawColor(220, 220, 220); doc.line(8, y - 2, 202, y - 2); }); doc.addPage(); doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 18, 'F'); doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(11); doc.text('RESUMO FINANCEIRO', 10, 12); doc.setTextColor(0, 0, 0); y = 30; const vTotal = pedSel.reduce((a, r) => a + (r.items || []).reduce((b, it) => b + parseFloat(it.price || 0), 0), 0); doc.setFontSize(9); doc.setFont('helvetica', 'normal'); doc.text(`OS arquivadas: ${pedSel.length}`, 12, y); y += 8; doc.text(`Total de itens: ${pedSel.reduce((a, r) => a + (r.items?.length || 0), 0)}`, 12, y); y += 10; doc.setFont('helvetica', 'bold'); doc.setFontSize(12); doc.text(`Valor total: R$ ${vTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`, 12, y); doc.save(`VRZ_Concluidos_${hoje.replace(/\//g, '-')}.pdf`); } catch (e) { alert('Erro PDF: ' + e.message); } setExportando(false); };
  const executarExclusao = async () => { setConfirmar(false); setExcluindo(true); const tot = idsSel.length; setProg({ atual: 0, total: tot, msg: 'Iniciando...' }); let ok = 0; for (const id of idsSel) { try { await col('requests').doc(id).delete(); ok++; setProg({ atual: ok, total: tot, msg: `Excluindo ${ok} de ${tot}...` }); } catch (e) { console.error(e); } if (ok % 5 === 0) await new Promise(r => setTimeout(r, 100)); } setProg({ atual: tot, total: tot, msg: 'Concluído!' }); setSel({}); await new Promise(r => setTimeout(r, 1200)); setExcluindo(false); setProg({ atual: 0, total: 0, msg: '' }); };

  return (
    <div className="space-y-6 fade-in-up pb-10">
      {confirmar && <div className="fixed inset-0 z-[600] bg-black/90 flex items-center justify-center p-4"><div className="bg-white rounded-2xl max-w-md w-full"><div className="bg-red-600 p-6 text-white text-center"><Icon name="trash-2" size={32} className="mx-auto mb-3" /><h3 className="text-xl font-black">Confirmar Exclusão</h3><p className="text-xs opacity-80">Ação irreversível</p></div><div className="p-6"><div className="bg-red-50 rounded-xl p-4 text-center"><p className="text-3xl font-black text-red-600">{qtdSel}</p><p className="text-[10px] font-bold text-red-500">pedidos serão excluídos</p></div><div className="flex gap-3 mt-4"><button onClick={() => setConfirmar(false)} className="flex-1 py-3 bg-gray-200 rounded-xl font-bold">Cancelar</button><button onClick={executarExclusao} className="flex-1 py-3 bg-red-600 text-white rounded-xl font-bold">Excluir</button></div></div></div></div>}
      {excluindo && <div className="fixed inset-0 z-[600] bg-black/95 flex items-center justify-center p-4"><div className="bg-white rounded-2xl p-8 text-center space-y-4"><Icon name="loader" size={32} className="text-red-600 animate-spin mx-auto" /><h3 className="font-bold">Excluindo...</h3><div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden"><div className="h-full bg-red-600 rounded-full transition-all" style={{ width: prog.total > 0 ? `${prog.atual / prog.total * 100}%` : '0%' }} /></div><p className="text-xs text-gray-400">{prog.msg}</p></div></div>}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl p-6 text-white shadow-xl"><div className="flex items-center gap-3 mb-4"><div className="w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center"><Icon name="database" size={18} /></div><div><p className="text-[8px] font-bold uppercase text-gray-400">Pedidos no Firebase</p><p className="text-[7px] text-gray-500">Limite ~{LIM.toLocaleString()}</p></div></div><div className="flex justify-between mb-2"><span className="text-4xl font-black">{total.toLocaleString()}</span><span className="text-[10px] text-gray-500">de ~{LIM.toLocaleString()}</span></div><div className="w-full bg-gray-700 rounded-full h-2 overflow-hidden mb-2"><div className="h-full rounded-full transition-all" style={{ width: `${pctPed}%`, backgroundColor: corB }} /></div><div className="flex justify-between text-[10px]"><span style={{ color: corB }}>{pctPed >= 85 ? '⚠ Próximo do limite!' : pctPed >= 60 ? 'Uso moderado' : 'Uso saudável'}</span><span>{pctPed.toFixed(1)}%</span></div><div className="mt-4 grid grid-cols-3 gap-2 pt-4 border-t border-white/10"><div className="text-center"><p className="text-2xl font-black text-blue-400">{ativos}</p><p className="text-[8px] text-gray-500">Ativos</p></div><div className="text-center"><p className="text-2xl font-black text-emerald-400">{totalConc}</p><p className="text-[8px] text-gray-500">Concluídos</p></div><div className="text-center"><p className="text-2xl font-black text-violet-400">{Math.max(LIM - total, 0)}</p><p className="text-[8px] text-gray-500">Restam</p></div></div></div>
        <div className="bg-white rounded-2xl p-6 shadow-xl"><div className="flex items-center gap-3 mb-4"><div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center"><Icon name="hard-drive" size={18} className="text-white" /></div><div><p className="text-[8px] font-bold uppercase text-gray-400">Storage Estimado</p><p className="text-[7px] text-gray-300">Com foto ~800KB/pedido</p></div></div><div className="flex justify-between mb-2"><span className="text-3xl font-black">{fmtBytes(bytesU)}</span><span className="text-[10px] text-gray-400">de 1 GB</span></div><div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden mb-2"><div className="h-full rounded-full transition-all" style={{ width: `${pctSt}%`, backgroundColor: pctSt >= 85 ? '#ef4444' : pctSt >= 60 ? '#f97316' : '#8b5cf6' }} /></div><p className="text-[8px] text-gray-400">{pctSt.toFixed(1)}% do armazenamento usado</p><div className="mt-4 bg-amber-50 rounded-xl p-3"><p className="text-[8px] font-bold text-amber-700 mb-1">💡 Dica</p><p className="text-[8px] text-amber-600">Arquive e exclua concluídos regularmente para manter o sistema rápido.</p></div></div>
      </div>

      <div className="bg-white rounded-2xl shadow-xl overflow-hidden"><div className="p-5 border-b flex flex-wrap justify-between items-center gap-3"><div><p className="font-bold">Arquivar Pedidos Concluídos</p><p className="text-[8px] text-gray-400">Exporte e exclua para liberar capacidade</p></div><div className="flex gap-2"><button onClick={exportCSV} disabled={!qtdSel} className={`px-4 py-2 rounded-xl text-[10px] font-bold ${qtdSel ? 'bg-emerald-500 text-white' : 'bg-gray-100 text-gray-300'}`}>Excel ({qtdSel})</button><button onClick={exportPDF} disabled={!qtdSel || exportando} className={`px-4 py-2 rounded-xl text-[10px] font-bold ${qtdSel ? 'bg-blue-500 text-white' : 'bg-gray-100 text-gray-300'}`}>PDF ({qtdSel})</button><button onClick={() => qtdSel && setConfirmar(true)} disabled={!qtdSel || excluindo} className={`px-4 py-2 rounded-xl text-[10px] font-bold ${qtdSel ? 'bg-red-500 text-white' : 'bg-gray-100 text-gray-300'}`}>Excluir ({qtdSel})</button></div></div>
        {concluidos.length === 0 ? <div className="py-16 text-center text-gray-400">Nenhum pedido concluído</div> : <div className="overflow-x-auto"><table className="w-full text-left"><thead className="bg-gray-50"><tr><th className="p-3 w-10"><input type="checkbox" checked={todosSel} onChange={toggleTodos} className="accent-red-500" /></th><th className="p-3 text-[10px] font-bold">OS</th><th>Unidade</th><th>Veículo</th><th>Solicitante</th><th>Data</th><th>Itens</th><th>Valor</th></tr></thead><tbody>{concluidos.map(r => { const vT = (r.items || []).reduce((a, it) => a + parseFloat(it.price || 0), 0); return (<tr key={r.id} onClick={() => setSel(p => ({ ...p, [r.id]: !p[r.id] }))} className={`cursor-pointer ${sel[r.id] ? 'bg-red-50' : 'hover:bg-gray-50'}`}><td className="p-3" onClick={e => e.stopPropagation()}><input type="checkbox" checked={!!sel[r.id]} onChange={() => setSel(p => ({ ...p, [r.id]: !p[r.id] }))} className="accent-red-500" /></td><td className="p-3 font-bold">#{r.os}</td><td className="p-3"><span className="px-2 py-1 bg-purple-100 rounded text-[10px]">{r.unidade}</span></td><td className="p-3">{r.vehicleData?.modelo}</td><td className="p-3">{r.responsavel}</td><td className="p-3 text-[10px]">{new Date(r.timestamp).toLocaleDateString()}</td><td className="p-3 text-center"><span className="bg-gray-800 text-white px-2 py-1 rounded text-[10px]">{r.items?.length}</span></td><td className="p-3 font-bold text-emerald-600">{fmtBRL(vT)}</td></tr>); })}</tbody></table></div>}
        {concluidos.length > 0 && <div className="p-4 bg-gray-900 flex justify-between items-center"><p className="text-[10px] text-gray-400">{qtdSel} de {concluidos.length} selecionados</p><div className="flex gap-2"><button onClick={() => setSel({})} className="text-[10px] text-gray-400">Limpar</button><button onClick={toggleTodos} className="text-[10px] text-gray-400">{todosSel ? 'Desmarcar' : 'Selecionar todos'}</button></div></div>}
      </div>
    </div>
  );
}

  const [subView, setSubView] = useState('pending');
  const [importData, setImportData] = useState([]);
  const [showImport, setShowImport] = useState(false);
  const [editing, setEditing] = useState(null);

  const { data: requests, loading: reqLoading } = useFirestore('requests');
  const { data: vehicles, loading: vehLoading } = useFirestore('vehicles');
  const { data: usersData, loading: userLoading } = useFirestore('users');
  const [users, setUsers] = useState([]);

  useEffect(() => { const combined = [...usersData]; INIT_USERS.forEach(u => { if (!combined.find(d => d.user === u.user)) combined.push(u); }); setUsers(combined); }, [usersData]);

  const isAdmin = loggedIn?.role === 'admin';
  const isSol = loggedIn?.role === 'solicitante' || isAdmin;

  useEffect(() => { const u = auth.onAuthStateChanged(u => { if (u) setUser(u); else auth.signInAnonymously(); }); return u; }, []);

  const addUser = async (user, pass, role) => { try { await col('users').add({ user, pass: await hashPassword(pass), active: true, role }); } catch (error) { alert('Erro ao criar usuário.'); } };
  const deleteUser = async id => { if (!confirm('Remover usuário?')) return; try { if (id && id.length > 15) await col('users').doc(id).delete(); else setUsers(p => p.filter(u => u.user !== id)); } catch (error) { setUsers(p => p.filter(u => u.id !== id)); } };
  const toggleUser = async u => { const s = !(u.active !== false); try { if (u.id) await col('users').doc(u.id).update({ active: s }); else await col('users').add({ ...u, active: s }); } catch (error) { alert('Erro ao atualizar status.'); } };
  const changeRole = async (u, role) => { try { if (u.id) await col('users').doc(u.id).update({ role }); else await col('users').add({ ...u, role }); } catch (error) { alert('Erro ao atualizar categoria.'); } };
  const login = async u => { const found = users.find(x => x.user.toLowerCase() === u.user.toLowerCase() && x.pass === u.pass); if (found) { setLoggedIn(found); setView(found.role === 'leitor' ? 'status' : found.role === 'admin' ? 'dashboard' : 'request'); } };
  const logout = () => { setLoggedIn(null); setView('request'); };

  const handlePaste = e => { const text = e.clipboardData.getData('text'); const lines = text.split(/\r?\n/).filter(l => l.trim()); if (!lines.length) return; const headers = lines[0].split(/[,\t]/).map(h => h.trim().toUpperCase()); const fi = t => headers.findIndex(h => t.some(x => h.includes(x))); const [iO, iM, iF, iC, iCh, iE, iL] = [fi(['OS']), fi(['MODELO']), fi(['FABRICANTE', 'MARCA']), fi(['COR']), fi(['CHASSI']), fi(['ETAPA']), fi(['LOCALIZA'])]; const rows = (iO !== -1 ? lines.slice(1) : lines).map(l => { const v = l.split(/[,\t]/); return { os: (iO !== -1 ? v[iO] : v[0])?.trim() || '', modelo: (iM !== -1 ? v[iM] : v[1])?.trim() || '', fabricante: (iF !== -1 ? v[iF] : v[2])?.trim() || '', cor: (iC !== -1 ? v[iC] : v[3])?.trim() || '', chassi: (iCh !== -1 ? v[iCh] : v[4])?.trim() || '', etapa: (iE !== -1 ? v[iE] : v[5])?.trim() || '', localizacao: (iL !== -1 ? v[iL] : v[6])?.trim() || '' }; }).filter(r => r.os); setImportData(rows); };
  const commitImport = async () => { if (!importData.length) return; const batch = db.batch(); importData.forEach(v => batch.set(col('vehicles').doc(v.os), v)); await batch.commit(); alert('Sucesso! ' + importData.length + ' veículos importados.'); setImportData([]); setShowImport(false); };

  const updateItem = async (reqId, idx, fields) => { const req = requests.find(r => r.id === reqId); if (!req) return; const newItems = [...req.items]; const item = { ...newItems[idx], ...fields }; if (item.price && item.supplier && item.deliveryDate && !item.actualDeliveryDate) item.status = 'Em Cotação'; if (item.actualDeliveryDate) item.status = 'Concluído'; newItems[idx] = item; let gs = 'Concluído'; if (newItems.some(it => it.status === 'Pendente')) gs = 'Pendente'; else if (newItems.some(it => it.status === 'Em Cotação')) gs = 'Em Cotação'; else if (newItems.some(it => it.status === 'Doado')) gs = 'Doado'; setEditing(p => p?.id === reqId ? { ...p, items: newItems } : p); try { await col('requests').doc(reqId).update({ items: newItems, status: gs }); } catch (error) { console.error(error); } };

  if (!loggedIn) return <LoginView onLogin={login} usersList={users} />;

  const tabCounts = { pending: requests.filter(r => r.items?.some(it => it.status === 'Pendente')).length, quoting: requests.filter(r => r.items?.some(it => it.status === 'Em Cotação')).length, completed: requests.filter(r => r.items?.every(it => it.status === 'Concluído')).length, donated: requests.filter(r => r.items?.some(it => it.status === 'Doado')).length };
  const navItems = [isSol && { key: 'request', icon: 'plus', label: 'Nova Peça' }, { key: 'status', icon: 'search', label: 'Histórico' }, isAdmin && { key: 'donor', icon: 'git-merge', label: 'Doações' }, isAdmin && { key: 'admin', icon: 'shield', label: 'Gestão' }, isAdmin && { key: 'dashboard', icon: 'bar-chart-2', label: 'Analytics' }].filter(Boolean);
  const loading = reqLoading || vehLoading || userLoading;

  return (
    <div className="h-screen flex flex-col md:flex-row bg-gray-100 overflow-hidden">
      <NetworkStatus />
      <nav className="hidden md:flex flex-col w-64 bg-gradient-to-b from-gray-900 to-gray-800 text-white p-6 gap-4 shrink-0"><div className="flex items-center gap-3 pb-4 border-b border-white/10"><div className="p-2 bg-red-500 rounded-xl"><Icon name="shopping-cart" size={20} /></div><div><p className="text-[10px] text-gray-400">Portal Compras</p><h1 className="text-2xl font-black">VRZ</h1></div></div>{navItems.map(n => <button key={n.key} onClick={() => setView(n.key)} className={`flex items-center gap-3 px-4 py-3 rounded-xl transition ${view === n.key ? 'bg-red-500' : 'hover:bg-white/10'}`}><Icon name={n.icon} size={18} /><span className="text-sm font-bold">{n.label}</span></button>)}<div className="mt-auto pt-4 border-t border-white/10"><p className="text-xs text-gray-400">{loggedIn.user}</p><RoleBadge role={loggedIn.role} /><button onClick={logout} className="mt-3 w-full py-2 bg-white/10 rounded-lg text-sm">Sair</button></div></nav>

      <div className="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur border-t flex py-2 px-4 pb-6 z-50">{navItems.map(n => <button key={n.key} onClick={() => setView(n.key)} className={`flex-1 flex flex-col items-center gap-1 py-2 rounded-xl ${view === n.key ? 'text-red-500 bg-red-50' : 'text-gray-400'}`}><Icon name={n.icon} size={20} /><span className="text-[10px] font-bold">{n.label}</span></button>)}</div>

      <main className="flex-1 overflow-y-auto p-4 md:p-6 pb-24 md:pb-6"><div className="max-w-7xl mx-auto">{loading ? <SkeletonLoader /> : (<>{view === 'dashboard' && isAdmin && <DashboardView requests={requests} />}{view === 'request' && isSol && <RequestForm user={user} loggedInUser={loggedIn} vehiclesDB={vehicles} requests={requests} />}{view === 'status' && <StatusView requests={requests} isAdmin={isAdmin} />}{view === 'donor' && isAdmin && <DonorSystem requests={requests} vehicles={vehicles} onDonate={() => {}} />}{view === 'admin' && isAdmin && (<div className="space-y-6"><div className="flex justify-between items-center"><div><h1 className="text-2xl font-black">Gestão de Compras</h1><p className="text-xs text-gray-500">Protocolos e Base de Dados</p></div><button onClick={() => setShowImport(true)} className="bg-gray-800 text-white px-4 py-2 rounded-xl text-xs font-bold">Importar Planilha</button></div><div className="flex flex-wrap gap-2 bg-white p-2 rounded-xl shadow">{[{ key: 'pending', label: `Pendentes (${tabCounts.pending})` }, { key: 'quoting', label: `Em Cotação (${tabCounts.quoting})` }, { key: 'completed', label: `Concluídos (${tabCounts.completed})` }, { key: 'donated', label: `Doados (${tabCounts.donated})` }, { key: 'vehicles', label: `Veículos (${vehicles.length})` }, { key: 'users', label: 'Usuários' }, { key: 'storage', label: 'Capacidade' }].map(t => <button key={t.key} onClick={() => setSubView(t.key)} className={`px-3 py-2 rounded-lg text-[10px] font-bold ${subView === t.key ? 'bg-red-500 text-white' : 'text-gray-500'}`}>{t.label}</button>)}</div><div>{subView === 'users' && <UserManagement users={users} onAdd={addUser} onDelete={deleteUser} onToggle={toggleUser} onRole={changeRole} />}{subView === 'storage' && <StorageView requests={requests} />}{subView === 'vehicles' && <div className="bg-white rounded-xl shadow overflow-hidden"><table className="w-full"><thead className="bg-gray-800 text-white"><tr><th className="p-3">OS</th><th>Modelo</th><th>Fabricante</th><th>Cor</th><th>Chassi</th><th>Etapa</th><th>Localização</th></tr></thead><tbody>{vehicles.map(v => (<tr key={v.os} className="border-b"><td className="p-3 font-bold">#{v.os}</td><td className="p-3">{v.modelo}</td><td>{v.fabricante}</td><td>{v.cor}</td><td className="font-mono text-xs">{v.chassi}</td><td><span className="px-2 py-1 bg-red-100 rounded text-[10px]">{v.etapa}</span></td><td>{v.localizacao}</td></tr>))}</tbody></table></div>}{['pending', 'quoting', 'completed', 'donated'].includes(subView) && <div className="space-y-3">{requests.filter(r => { if (subView === 'pending') return r.items?.some(it => it.status === 'Pendente'); if (subView === 'quoting') return r.items?.some(it => it.status === 'Em Cotação'); if (subView === 'donated') return r.items?.some(it => it.status === 'Doado'); return r.items?.every(it => it.status === 'Concluído'); }).map(req => (<div key={req.id} className="bg-white p-4 rounded-xl shadow flex justify-between items-center"><div><span className="font-bold">OS #{req.os}</span><span className="ml-2 text-xs text-gray-500">{req.unidade}</span><div className="flex gap-1 mt-1">{(req.items || []).slice(0, 3).map((it, i) => <span key={i} className="text-[10px] bg-gray-100 px-2 py-0.5 rounded">{it.description}</span>)}</div></div><button onClick={() => setEditing(req)} className="bg-gray-800 text-white px-4 py-2 rounded-lg text-xs font-bold">Gerenciar</button></div>))}</div>}</div></div>)}</>)}</div></main>

      {showImport && <div className="fixed inset-0 z-[300] bg-black/95 flex items-center justify-center p-4"><div className="bg-white w-full max-w-6xl h-[85vh] rounded-2xl flex flex-col"><div className="p-6 bg-gray-800 text-white flex justify-between"><div><h3 className="text-xl font-black">Importar Planilha</h3><p className="text-xs text-gray-400">Cole os dados do Excel (Ctrl+V)</p></div><button onClick={() => { setShowImport(false); setImportData([]); }}><Icon name="x" size={24} /></button></div><div className="flex-1 overflow-auto p-6">{importData.length === 0 ? <div className="h-full flex flex-col items-center justify-center border-4 border-dashed rounded-2xl"><textarea onPaste={handlePaste} className="absolute inset-0 opacity-0" /><Icon name="file-spreadsheet" size={48} className="text-gray-300 mb-4" /><p className="text-center text-gray-400">Clique aqui e cole (Ctrl+V) os dados do Excel</p></div> : <div><table className="w-full text-sm"><thead><tr>{['OS', 'Modelo', 'Fabricante', 'Cor', 'Chassi', 'Etapa', 'Localização'].map(h => <th key={h} className="p-2 text-left">{h}</th>)}</tr></thead><tbody>{importData.map((row, i) => (<tr key={i}>{['os', 'modelo', 'fabricante', 'cor', 'chassi', 'etapa', 'localizacao'].map(key => (<td key={key} className="border p-0"><input className="excel-input p-2 w-full" value={row[key]} onChange={e => { const d = [...importData]; d[i][key] = e.target.value; setImportData(d); }} /></td>))}</tr>))}</tbody></table><div className="mt-4 flex justify-between"><button onClick={() => setImportData([])} className="px-4 py-2 bg-gray-200 rounded">Limpar</button><button onClick={commitImport} className="px-6 py-2 bg-red-500 text-white rounded font-bold">Importar {importData.length} veículos</button></div></div>}</div></div></div>}

      {editing && <div className="fixed inset-0 z-[200] bg-black/95 backdrop-blur flex items-center justify-center p-4 overflow-y-auto"><div className="bg-white rounded-2xl max-w-5xl w-full my-auto"><div className="p-6 bg-gray-800 text-white flex justify-between"><div><h3 className="font-black">OS #{editing.os}</h3><p className="text-xs text-gray-400">{editing.vehicleData?.modelo}</p></div><button onClick={() => setEditing(null)}><Icon name="x" size={20} /></button></div><div className="p-6 max-h-[70vh] overflow-y-auto space-y-4">{editing.items?.map((it, idx) => (<div key={idx} className="bg-gray-50 p-4 rounded-xl border"><div className="flex items-center gap-3 mb-3"><img src={it.photo || 'https://via.placeholder.com/40'} className="w-10 h-10 rounded object-cover" /><div><p className="font-bold">{it.description}</p><StatusBadge status={it.status} /></div></div><div className="grid grid-cols-2 md:grid-cols-4 gap-3"><input type="number" placeholder="Valor" value={it.price || ''} onChange={e => updateItem(editing.id, idx, { price: e.target.value })} className="p-2 border rounded" /><input type="text" placeholder="Fornecedor" value={it.supplier || ''} onChange={e => updateItem(editing.id, idx, { supplier: e.target.value })} className="p-2 border rounded" /><input type="date" placeholder="Prazo" value={it.deliveryDate || ''} onChange={e => updateItem(editing.id, idx, { deliveryDate: e.target.value })} className="p-2 border rounded" /><input type="date" placeholder="Entrega Real" value={it.actualDeliveryDate || ''} onChange={e => updateItem(editing.id, idx, { actualDeliveryDate: e.target.value })} className="p-2 border rounded bg-green-50" /></div></div>))}</div><div className="p-6 border-t flex justify-end"><button onClick={() => setEditing(null)} className="px-6 py-2 bg-red-500 text-white rounded font-bold">Fechar</button></div></div></div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
