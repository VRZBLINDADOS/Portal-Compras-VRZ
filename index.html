// Remove campos undefined recursivamente — Firestore não aceita undefined
function stripUndefined(obj){
  if(Array.isArray(obj))return obj.map(stripUndefined);
  if(obj!==null&&typeof obj==='object'){
    const out={};
    Object.entries(obj).forEach(([k,v])=>{if(v!==undefined)out[k]=stripUndefined(v);});

  }
  return obj;
}

// ── MESCLAR pedidos da mesma OS ────────────────────────────────────────────
// Retorna um array onde cada OS aparece UMA vez, com todos os itens mesclados
function mergeByOS(requests){
  const map={};
  const order=[];
  requests.forEach(r=>{
    const k=String(r.os||'').trim();
    if(!k){order.push(r);return;}
    if(!map[k]){
      map[k]={...r,_merged:false};
      order.push(map[k]);
    } else {
      // Mescla itens, mantém dados do veículo/responsável mais recente
      const existing=map[k];
      const allItems=[...(existing.items||[]),...(r.items||[])];
      // Remove duplicados por id
      const seen=new Set();
      const deduped=allItems.filter(it=>{
        const key=it.id||it.description;
        if(seen.has(key))return false;
        seen.add(key);return true;
      });
      existing.items=deduped;
      existing._merged=true;
      // Mantém o timestamp mais recente para exibição
      if((r.timestamp||0)>(existing.timestamp||0)){
        existing.vehicleData=r.vehicleData||existing.vehicleData;
        existing.responsavel=r.responsavel||existing.responsavel;
      }
    }
  });
  return order;
}

// ── Donut ─────────────────────────────────────────────────────────────────
function Donut({slices,size=100}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    const ctx=ref.current.getContext('2d');const total=slices.reduce((a,s)=>a+s.v,0);
    ctx.clearRect(0,0,size,size);const cx=size/2,cy=size/2,r=size/2-5;
    if(!total){ctx.beginPath();ctx.arc(cx,cy,r,0,2*Math.PI);ctx.fillStyle='#F0EAE6';ctx.fill();}
    else{let s=-Math.PI/2;slices.forEach(sl=>{const a=(sl.v/total)*2*Math.PI;ctx.beginPath();ctx.moveTo(cx,cy);ctx.arc(cx,cy,r,s,s+a);ctx.closePath();ctx.fillStyle=sl.c;ctx.fill();s+=a;});}
    ctx.beginPath();ctx.arc(cx,cy,r*.56,0,2*Math.PI);ctx.fillStyle='#fff';ctx.fill();
  },[slices,size]);
  return <canvas ref={ref} width={size} height={size}/>;
}

function MiniBar({data,color='#DC1F1F'}){
  const ref=useRef(null);
  useEffect(()=>{
    if(!ref.current||!data?.length)return;
    const ctx=ref.current.getContext('2d');const w=ref.current.width,h=ref.current.height;
    ctx.clearRect(0,0,w,h);const max=Math.max(...data.map(d=>d.v),1);const bw=w/data.length;
    data.forEach((d,i)=>{
      const bh=(d.v/max)*(h-22);
      ctx.fillStyle=i===data.length-1?color:color+'66';
      ctx.beginPath();
      if(ctx.roundRect)ctx.roundRect(i*bw+3,h-bh-20,bw-6,bh,4);
      else ctx.rect(i*bw+3,h-bh-20,bw-6,bh);
      ctx.fill();
      ctx.fillStyle='#9A9189';ctx.font='bold 8px Plus Jakarta Sans';ctx.textAlign='center';
      ctx.fillText(d.l,i*bw+bw/2,h-4);
      if(d.v>0){ctx.fillStyle='#1A1A1A';ctx.font='bold 9px Plus Jakarta Sans';ctx.fillText(d.v,i*bw+bw/2,h-bh-26);}
    });
  },[data,color]);
  return <canvas ref={ref} width={280} height={115} className="w-full"/>;
}

// ── Dashboard ─────────────────────────────────────────────────────────────
function DashboardView({requests}){
  const stats=useMemo(()=>{
    if(!requests?.length)return null;
    const byOS={};
    requests.forEach(r=>{const k=String(r.os||'').trim();if(k){if(!byOS[k])byOS[k]=[];byOS[k].push(r);}});
    const multi=Object.entries(byOS).filter(([,a])=>a.length>1);
    const totalAdd=multi.reduce((a,[,arr])=>a+(arr.length-1),0);
    const intervalos=[];
    multi.forEach(([,arr])=>{const sorted=[...arr].sort((a,b)=>a.timestamp-b.timestamp);sorted.slice(1).forEach(p=>{intervalos.push(Math.round((p.timestamp-sorted[0].timestamp)/864e5));});});
    const mediaAdd=intervalos.length?(intervalos.reduce((a,b)=>a+b,0)/intervalos.length).toFixed(1):0;
    const maxAdd=intervalos.length?Math.max(...intervalos):0;
    let totalIt=0,pend=0,cotac=0,comprado=0,conc=0,doado=0;
    requests.forEach(r=>(r.items||[]).forEach(it=>{
      totalIt++;
      if(it.status==='Concluído')conc++;
      else if(it.status==='Doado')doado++;
      else if(it.status==='Comprado')comprado++;
      else if(it.status==='Em Cotação')cotac++;
      else pend++;
    }));
    const porSol={};requests.forEach(r=>{porSol[r.responsavel]=(porSol[r.responsavel]||0)+1;});
    const rankSol=Object.entries(porSol).sort((a,b)=>b[1]-a[1]).slice(0,6);
    const diasSem=['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];const porDia=[0,0,0,0,0,0,0];
    requests.forEach(r=>porDia[new Date(r.timestamp).getDay()]++);
    const pedDia=diasSem.map((l,i)=>({l,v:porDia[i]}));
    const agora=Date.now();
    // Encontra a última segunda-feira (início da semana atual)
    const hoje=new Date();const diaSem=hoje.getDay();
    const diasDesdeSegunda=(diaSem===0?6:diaSem-1); // 0=Dom→6, 1=Seg→0, etc
    const inicioSemanaAtual=new Date(hoje);
    inicioSemanaAtual.setHours(0,0,0,0);
    inicioSemanaAtual.setDate(hoje.getDate()-diasDesdeSegunda);
    const semanas=Array.from({length:8},(_,i)=>{
      const ini=new Date(inicioSemanaAtual);ini.setDate(inicioSemanaAtual.getDate()-(7-i)*7);
      const fim=new Date(ini);fim.setDate(ini.getDate()+7);
      const cnt=requests.filter(r=>r.timestamp>=ini.getTime()&&r.timestamp<fim.getTime()).length;
      return{l:`${ini.getDate()}/${ini.getMonth()+1}`,v:cnt};
    });
    const porMod={};requests.forEach(r=>{const m=r.vehicleData?.modelo||'N/D';porMod[m]=(porMod[m]||0)+1;});
    const rankMod=Object.entries(porMod).sort((a,b)=>b[1]-a[1]).slice(0,5);
    const taxa=totalIt>0?Math.round(conc/totalIt*100):0;
    const porUnidade={};requests.forEach(r=>{const u=r.unidade||'Unidade 1';porUnidade[u]=(porUnidade[u]||0)+1;});
    return{total:requests.length,osU:Object.keys(byOS).length,totalAdd,mediaAdd:parseFloat(mediaAdd),maxAdd,totalIt,pend,cotac,comprado,conc,doado,rankSol,pedDia,semanas,rankMod,taxa,porUnidade};
  },[requests]);

  if(!stats)return(
    <div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'80px 20px',textAlign:'center'}}>
      <div style={{width:64,height:64,background:'var(--smoke)',borderRadius:16,display:'flex',alignItems:'center',justifyContent:'center',marginBottom:16}}><Icon name="bar-chart-2" size={26}/></div>
      <p style={{fontSize:11,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)'}}>Nenhum dado disponível</p>
    </div>
  );
  const maxSol=stats.rankSol[0]?.[1]||1,maxMod=stats.rankMod[0]?.[1]||1;
  return(
    <div style={{paddingBottom:40}} className="fade-up">
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',marginBottom:20}}>
        <div>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Inteligência Operacional</p>
          <h2 style={{fontSize:36,fontWeight:800,lineHeight:1,color:'var(--ink)',margin:0,letterSpacing:'-.02em'}}>Análises VRZ</h2>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:8,background:'var(--ink)',color:'#fff',padding:'8px 16px',borderRadius:10}}>
          <span className="pulse-beacon" style={{width:7,height:7,borderRadius:'50%',background:'var(--red)',display:'inline-block'}}/>
          <span style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em'}}>Tempo real</span>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(160px,1fr))',gap:12,marginBottom:16}}>
        {[
          {label:'Total de Pedidos',v:stats.total,sub:`${stats.osU} OS únicas`,icon:'clipboard-list',dark:true},
          {label:'Inclusões Adicionais',v:stats.totalAdd,sub:'mesma OS',icon:'plus-circle',red:true},
          {label:'Taxa de Conclusão',v:stats.taxa+'%',sub:`${stats.conc}/${stats.totalIt}`,icon:'check-circle'},
          {label:'Itens Comprados',v:stats.comprado,sub:'aguardando entrega',icon:'shopping-bag'},
          {label:'Itens Doados',v:stats.doado,sub:'transferidos entre OS',icon:'git-merge'},
        ].map((k,i)=>(
          <div key={i} style={{background:k.dark?'var(--ink)':k.red?'var(--red)':'var(--smoke)',color:k.dark||k.red?'#fff':'var(--ink)',borderRadius:14,padding:20,border:(!k.dark&&!k.red)?'1.5px solid var(--border)':'none'}}>
            <div style={{width:32,height:32,borderRadius:8,background:k.dark||k.red?'rgba(255,255,255,.12)':'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}><Icon name={k.icon} size={16}/></div>
            <p style={{fontSize:36,fontWeight:800,lineHeight:1,margin:0,letterSpacing:'-.02em'}}>{k.v}</p>
            <p style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',marginTop:6,opacity:.7}}>{k.label}</p>
            <p style={{fontSize:8,fontWeight:500,marginTop:2,opacity:.4}}>{k.sub}</p>
          </div>
        ))}
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:16}}>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:16}}>Pipeline</p>
          <div style={{display:'flex',alignItems:'center',gap:16}}>
            <Donut size={90} slices={[{v:stats.pend,c:'#F59E0B'},{v:stats.cotac,c:'#2563EB'},{v:stats.comprado,c:'#7C3AED'},{v:stats.conc,c:'#059669'},{v:stats.doado,c:'#DC1F1F'}]}/>
            <div style={{flex:1}}>
              {[{l:'Pendente',v:stats.pend,c:'#F59E0B'},{l:'Em Cotação',v:stats.cotac,c:'#2563EB'},{l:'Comprado',v:stats.comprado,c:'#7C3AED'},{l:'Concluído',v:stats.conc,c:'#059669'},{l:'Doado',v:stats.doado,c:'#DC1F1F'}].map((s,i)=>(
                <div key={i} style={{marginBottom:6}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:2}}>
                    <div style={{display:'flex',alignItems:'center',gap:5}}><div style={{width:6,height:6,borderRadius:'50%',background:s.c}}/><span style={{fontSize:8,fontWeight:700,color:'var(--muted)',textTransform:'uppercase'}}>{s.l}</span></div>
                    <span style={{fontSize:9,fontWeight:800,color:'var(--ink)'}}>{s.v}</span>
                  </div>
                  <div className="progress-track"><div className="progress-fill" style={{width:stats.totalIt>0?`${s.v/stats.totalIt*100}%`:'0%',background:s.c}}/></div>
                </div>
              ))}
            </div>
          </div>
        </div>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:2}}>Pedidos por Semana</p>
          <p style={{fontSize:8,color:'var(--muted)',marginBottom:14,fontWeight:500}}>Últimas 8 semanas</p>
          <MiniBar data={stats.semanas} color="#DC1F1F"/>
        </div>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:2}}>Distribuição Semanal</p>
          <p style={{fontSize:8,color:'var(--muted)',marginBottom:14,fontWeight:500}}>Pico de solicitações</p>
          <MiniBar data={stats.pedDia} color="#1A4EC2"/>
        </div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:16}}>Top Solicitantes</p>
          {stats.rankSol.map(([nome,qtd],i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{width:22,height:22,borderRadius:7,background:i===0?'var(--red)':i===1?'var(--ink)':'var(--smoke)',color:i<2?'#fff':'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase'}}>{nome}</span>
                  <span style={{fontSize:10,fontWeight:800,color:'var(--muted)'}}>{qtd}</span>
                </div>
                <div className="progress-track"><div className="progress-fill" style={{width:`${qtd/maxSol*100}%`,background:i===0?'var(--red)':'var(--ink)'}}/></div>
              </div>
            </div>
          ))}
        </div>
        <div className="card" style={{padding:20}}>
          <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',marginBottom:16}}>Modelos Mais Solicitados</p>
          {stats.rankMod.map(([mod,qtd],i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
              <div style={{width:22,height:22,borderRadius:7,background:i===0?'var(--ink)':'var(--smoke)',color:i===0?'#fff':'var(--muted)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:9,fontWeight:800,flexShrink:0}}>{i+1}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                  <span style={{fontSize:10,fontWeight:700,textTransform:'uppercase'}}>{mod}</span>
                  <span style={{fontSize:10,fontWeight:800,color:'var(--muted)'}}>{qtd}×</span>
                </div>
                <div className="progress-track"><div className="progress-fill" style={{width:`${qtd/maxMod*100}%`,background:'var(--ink)'}}/></div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── Donor System — MELHORIAS 2 e 3 ────────────────────────────────────────
// Melhoria 2: digitar OS diretamente
// Melhoria 3: busca no banco de veículos (vehicles), não em requests;
//             todos do mesmo modelo exceto os entregues; recebidos primeiro
function DonorSystem({requests,vehicles,loggedInUser}){
  const[step,setStep]=useState(1);
  const[targetOSInput,setTargetOSInput]=useState('');
  const[targetOS,setTargetOS]=useState('');
  const[selectedItems,setSelectedItems]=useState([]);
  const[sourceOS,setSourceOS]=useState('');
  const[processing,setProcessing]=useState(false);
  const[done,setDone]=useState(false);
  const[showConfirm,setShowConfirm]=useState(false);
  const[etapaFilter,setEtapaFilter]=useState('');

  // OS receptora: encontrar o pedido de compra pela OS digitada
  const targetRequest=useMemo(()=>{
    if(!targetOS)return null;
    // Junta todos os pedidos da mesma OS em um único objeto para exibir peças
    const matching=requests.filter(r=>String(r.os).trim()===targetOS.trim());
    if(!matching.length)return null;
    // Mescla peças de todos os pedidos da mesma OS
    const base={...matching[0]};
    const allItems=[];const seen=new Set();
    matching.forEach(r=>(r.items||[]).forEach(it=>{const k=it.id||it.description;if(!seen.has(k)){seen.add(k);allItems.push(it);}}));
    base.items=allItems;
    return base;
  },[requests,targetOS]);

  // Peças pendentes / em cotação da OS receptora
  // Usa targetOS (já confirmado) para garantir que os dados estejam disponíveis
  const targetItems=useMemo(()=>{
    if(!targetRequest)return[];
    return(targetRequest.items||[]).filter(it=>
      it.status==='Pendente'||it.status==='Em Cotação'||it.status==='Comprado'
    );
  },[targetRequest]);

  const targetModelo=(targetRequest?.vehicleData?.modelo||'').trim().toLowerCase();

  // MELHORIA 3: busca no banco de veículos (vehicles collection)
  // Excluir a própria OS; excluir os com etapa/localizacao = "Entregue"
  // Recebidos sempre primeiro
  const vehicleCandidates=useMemo(()=>{
    if(!targetModelo)return{recebidos:[],outros:[]};
    const candidatos=vehicles.filter(v=>{
      if(String(v.os).trim()===targetOS.trim())return false;// exclui a própria
      const modelo=(v.modelo||'').trim().toLowerCase();
      if(modelo!==targetModelo)return false;
      // Exclui entregues
      const loc=(v.localizacao||'').trim().toLowerCase();
      const etapa=(v.etapa||'').trim().toLowerCase();
      if(loc==='entregue'||etapa==='entregue')return false;
      return true;
    });
    const recebidos=candidatos.filter(v=>(v.localizacao||'').trim().toLowerCase()==='recebido');
    const outros=candidatos.filter(v=>(v.localizacao||'').trim().toLowerCase()!=='recebido');
    return{recebidos,outros};
  },[vehicles,targetModelo,targetOS]);

  // Encontra o request da OS doadora (se existir) para exibir info extra
  const sourceVehicle=useMemo(()=>vehicles.find(v=>String(v.os).trim()===sourceOS.trim()),[vehicles,sourceOS]);

  // Etapas únicas dos candidatos (para filtro)
  const etapasUnicas=useMemo(()=>{
    const all=[...vehicleCandidates.recebidos,...vehicleCandidates.outros];
    const set=new Set(all.map(v=>(v.etapa||'').trim()).filter(Boolean));
    return Array.from(set).sort();
  },[vehicleCandidates]);

  // Candidatos filtrados por etapa
  const filteredRecebidos=useMemo(()=>
    etapaFilter?vehicleCandidates.recebidos.filter(v=>(v.etapa||'').trim()===etapaFilter):vehicleCandidates.recebidos
  ,[vehicleCandidates.recebidos,etapaFilter]);
  const filteredOutros=useMemo(()=>
    etapaFilter?vehicleCandidates.outros.filter(v=>(v.etapa||'').trim()===etapaFilter):vehicleCandidates.outros
  ,[vehicleCandidates.outros,etapaFilter]);

  const toggleItem=(id)=>setSelectedItems(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);
  const reset=()=>{setStep(1);setTargetOSInput('');setTargetOS('');setSelectedItems([]);setSourceOS('');setDone(false);};

  const confirmStep1=()=>{
    const t=targetOSInput.trim();
    if(!t)return alert('Digite o número da OS receptora.');
    // Verifica diretamente pelo input, sem depender dos estados async
    const matching=requests.filter(r=>String(r.os).trim()===t);
    if(!matching.length){alert('Nenhum pedido encontrado para a OS '+t+'.');return;}
    const allItems=[];const seen=new Set();
    matching.forEach(r=>(r.items||[]).forEach(it=>{const k=it.id||it.description;if(!seen.has(k)){seen.add(k);allItems.push(it);}}));
    const pending=allItems.filter(it=>it.status==='Pendente'||it.status==='Em Cotação'||it.status==='Comprado');
    if(pending.length===0){alert('Esta OS não possui peças pendentes para transferir.');return;}
    setTargetOS(t);setStep(2);
  };

  const executeTransfer=async()=>{
    setShowConfirm(false);
    setProcessing(true);
    try{
      // ── PASSO 1: Marca itens da OS RECEPTORA (targetOS) como "Doado"
      // com receivedFrom:sourceOS — ela vai RECEBER as peças da sourceOS
      const receptoraDocs=requests.filter(r=>String(r.os).trim()===targetOS.trim());
      for(const req of receptoraDocs){
        const newItems=[...req.items];let changed=false;
        selectedItems.forEach(itemId=>{
          const idx=newItems.findIndex(it=>String(it.id)===String(itemId));
          if(idx!==-1){
            newItems[idx]={
              ...newItems[idx],
              status:'Doado',
              statusOriginal:'Doado',
              receivedFrom:sourceOS,   // ← RECEPTORA recebeu DA doadora
              donatedTo:undefined,     // não doou para ninguém
              donatedAt:Date.now()
            };
            changed=true;
          }
        });
        if(changed)await col('requests').doc(req.id).update({items:stripUndefined(newItems)});
      }

      // ── PASSO 2: Cria pedido de compra na OS DOADORA (sourceOS)
      // com donatedTo:targetOS — ela vai COMPRAR/CEDER para a receptora
      const toTransfer=selectedItems.map(itemId=>{
        const orig=targetRequest.items.find(it=>String(it.id)===String(itemId));
        if(!orig)return null;
        const base=stripUndefined({...orig});
        // Limpa campos de cotação — é um pedido novo
        delete base.price; delete base.supplier; delete base.deliveryDate;
        delete base.actualDeliveryDate; delete base.boughtAt; delete base.statusOriginal;
        delete base.receivedFrom; delete base.donatedTo;
        return{
          ...base,
          id:String(Date.now())+String(Math.floor(Math.random()*9999)),
          status:'Pendente',
          donatedTo:targetOS    // ← DOADORA vai ceder PARA a receptora
        };
      }).filter(Boolean);

      const doadoraDocs=requests.filter(r=>String(r.os).trim()===sourceOS.trim());
      if(doadoraDocs.length>0){
        const donorReq=doadoraDocs[0];
        await col('requests').doc(donorReq.id).update({
          items:stripUndefined([...(donorReq.items||[]),...toTransfer])
        });
      } else {
        const vData=sourceVehicle||{os:sourceOS};
        const cleanVData={};
        Object.entries(vData).forEach(([k,v])=>{if(v!==undefined)cleanVData[k]=v;});
        await col('requests').add({
          os:sourceOS,
          responsavel:loggedInUser?.user||'Sistema',
          vehicleData:cleanVData,
          unidade:'Unidade 1',
          items:toTransfer,
          timestamp:Date.now(),
          status:'Pendente'
        });
      }
      col('donations').add(stripUndefined({
        receptoraOS:targetOS,
        doadoraOS:sourceOS,
        itemIds:selectedItems.map(String),
        executadoPor:loggedInUser?.user||'Sistema',
        timestamp:Date.now()
      })).catch(e=>console.warn('Log doação:',e));
      setDone(true);
    }catch(err){
      console.error('Erro na transferência:',err);
      alert('Erro ao processar: '+err.message);
    }
    setProcessing(false);
  };

  const handleConfirm=()=>{
    if(!targetRequest||!sourceOS||selectedItems.length===0)return;
    setShowConfirm(true);
  };

  // ── Modal de confirmação elegante ──────────────────────────────────────────
  if(processing)return(
    <div style={{maxWidth:440,margin:'0 auto',background:'#fff',borderRadius:20,border:'1.5px solid var(--border)',padding:48,textAlign:'center'}} className="fade-in">
      <div style={{width:72,height:72,borderRadius:999,background:'var(--red-light)',border:'2px solid #FFBDBD',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
        <Icon name="refresh-cw" size={32} className="spin" style={{color:'var(--red)'}}/>
      </div>
      <h3 style={{fontSize:18,fontWeight:800,margin:'0 0 8px',letterSpacing:'-.01em'}}>Processando...</h3>
      <p style={{fontSize:11,color:'var(--muted)',margin:0}}>Aguarde enquanto a transferência é registrada</p>
    </div>
  );

  if(showConfirm)return(
    <div style={{position:'fixed',inset:0,zIndex:700,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}} className="fade-in">
      <div style={{background:'#fff',borderRadius:24,overflow:'hidden',maxWidth:460,width:'100%',boxShadow:'0 40px 80px rgba(0,0,0,.4)'}}>
        <div style={{background:'var(--ink)',padding:'28px 28px 24px',color:'#fff'}}>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16}}>
            <div style={{width:48,height:48,background:'var(--red)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,boxShadow:'0 6px 16px rgba(220,31,31,.4)'}}><Icon name="git-merge" size={22}/></div>
            <div><h3 style={{margin:0,fontSize:18,fontWeight:800,color:'#fff'}}>Confirmar Transferência</h3><p style={{margin:0,fontSize:10,color:'rgba(255,255,255,.4)',marginTop:2}}>Esta ação moverá o pedido de compra entre OS</p></div>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:10,alignItems:'center',background:'rgba(255,255,255,.04)',borderRadius:14,padding:'14px 16px',border:'1px solid rgba(255,255,255,.08)'}}>
            <div>
              <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>OS Receptora</p>
              <p style={{fontSize:22,fontWeight:800,color:'#FFAAAA',margin:0,letterSpacing:'-.01em'}}>#{targetOS}</p>
              <p style={{fontSize:9,color:'rgba(255,255,255,.4)',margin:'2px 0 0',textTransform:'uppercase'}}>{targetRequest?.vehicleData?.modelo||'—'}</p>
            </div>
            <div style={{textAlign:'center',padding:'0 4px'}}>
              <div style={{width:32,height:32,borderRadius:999,background:'rgba(220,31,31,.2)',border:'1px solid rgba(220,31,31,.4)',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto'}}><Icon name="arrow-right" size={16}/></div>
              <p style={{fontSize:7,fontWeight:800,textTransform:'uppercase',color:'rgba(255,255,255,.3)',margin:'5px 0 0',letterSpacing:'.08em'}}>{selectedItems.length} peça(s)</p>
            </div>
            <div>
              <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>OS Doadora</p>
              <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-.01em'}}>#{sourceOS}</p>
              <p style={{fontSize:9,color:'rgba(255,255,255,.4)',margin:'2px 0 0',textTransform:'uppercase'}}>{sourceVehicle?.modelo||'—'}</p>
            </div>
          </div>
        </div>
        <div style={{padding:'20px 28px'}}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--muted)',marginBottom:14,margin:'0 0 16px'}}>Peças que serão transferidas:</p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:20}}>
            {selectedItems.map(itemId=>{
              const it=targetRequest?.items.find(i=>String(i.id)===String(itemId));
              return it?(<span key={itemId} style={{display:'inline-flex',alignItems:'center',gap:5,background:'var(--smoke)',border:'1px solid var(--border)',padding:'5px 10px',borderRadius:8,fontSize:10,fontWeight:700,textTransform:'uppercase'}}>
                <span style={{width:18,height:18,borderRadius:5,background:'var(--red)',color:'#fff',display:'inline-flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:800,flexShrink:0}}>{it.quantity}</span>
                {it.description}
              </span>):null;
            })}
          </div>
          <div style={{background:'#FFFBE6',border:'1px solid #FFE680',borderRadius:10,padding:'10px 14px',marginBottom:20}}>
            <p style={{fontSize:9,fontWeight:800,color:'#856A00',margin:'0 0 2px',textTransform:'uppercase',letterSpacing:'.06em'}}>⚠ O que acontecerá</p>
            <p style={{fontSize:10,color:'#856A00',margin:0,lineHeight:1.5}}>A OS <strong>#{targetOS}</strong> (receptora) terá os itens marcados como recebidos. A OS <strong>#{sourceOS}</strong> (doadora) receberá um pedido de compra para fornecer as peças.</p>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={()=>setShowConfirm(false)} className="btn-ghost" style={{flex:1}}>Cancelar</button>
            <button onClick={executeTransfer} className="btn-primary" style={{flex:2,padding:14}}>
              <Icon name="check" size={16}/> Confirmar Transferência
            </button>
          </div>
        </div>
      </div>
    </div>
  );

  if(done)return(
    <div style={{maxWidth:440,margin:'0 auto',background:'#fff',borderRadius:20,border:'1.5px solid var(--border)',padding:40,textAlign:'center'}} className="fade-up">
      <div style={{width:64,height:64,background:'#EDFAF3',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}><Icon name="check-circle" size={32}/></div>
      <h2 style={{fontSize:24,fontWeight:800,margin:'0 0 8px',letterSpacing:'-.02em'}}>Transferência Concluída</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:20}}>OS <strong>#{targetOS}</strong> vai receber {selectedItems.length} peça(s) compradas pela OS <strong>#{sourceOS}</strong></p>
      <div style={{background:'var(--smoke)',borderRadius:12,padding:'14px 16px',textAlign:'left',marginBottom:24}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--red)',marginBottom:6}}>Resultado</p>
        <p style={{fontSize:11,color:'var(--ink)',margin:'0 0 4px'}}>• OS <strong>#{targetOS}</strong> — itens marcados como "Recebido" (receivedFrom: {sourceOS})</p>
        <p style={{fontSize:11,color:'var(--ink)',margin:0}}>• OS <strong>#{sourceOS}</strong> — pedido de compra criado para entregar à OS #{targetOS}</p>
      </div>
      <button onClick={reset} className="btn-primary" style={{width:'100%',padding:14}}>Nova Transferência</button>
    </div>
  );

  const steps=[{n:1,label:'OS Receptora',icon:'inbox'},{n:2,label:'Peças',icon:'package'},{n:3,label:'OS Doadora',icon:'send'}];

  return(
    <div style={{maxWidth:680,margin:'0 auto'}} className="fade-up">
      {/* Header */}
      <div style={{background:'var(--ink)',borderRadius:16,padding:'20px 24px',display:'flex',alignItems:'center',gap:14,color:'#fff',marginBottom:16}}>
        <div style={{width:44,height:44,background:'var(--red)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="git-merge" size={20}/></div>
        <div>
          <h3 style={{margin:0,fontSize:18,fontWeight:800}}>Transferência de Peças</h3>
          <p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.45)',textTransform:'uppercase',letterSpacing:'.1em',marginTop:2}}>Redirecionar pedido entre OS</p>
        </div>
      </div>

      {/* Steps indicator */}
      <div className="card" style={{padding:16,marginBottom:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          {steps.map((s,i)=>(
            <React.Fragment key={s.n}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <div className="step-dot" style={{background:step>s.n?'#059669':step===s.n?'var(--red)':'var(--smoke)',color:step>s.n||step===s.n?'#fff':'var(--muted)'}}>
                  {step>s.n?<Icon name="check" size={14}/>:<Icon name={s.icon} size={14}/>}
                </div>
                <span style={{fontSize:7,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:step===s.n?'var(--red)':step>s.n?'#059669':'var(--muted)'}}>{s.label}</span>
              </div>
              {i<2&&<div style={{flex:1,height:1,margin:'0 8px',marginBottom:20,background:step>s.n?'#059669':'var(--border)'}}/>}
            </React.Fragment>
          ))}
        </div>
      </div>

            </div>

            {targetOSInput.trim()&&(()=>{
              const found=requests.filter(r=>String(r.os).trim()===targetOSInput.trim());

              <p style={{fontSize:7,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 8px'}}>Peças a transferir da OS #{targetOS}</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                {selectedItems.map(itemId=>{const it=targetRequest?.items.find(i=>i.id===itemId);return it?(<span key={itemId} style={{background:'rgba(220,31,31,.25)',border:'1px solid rgba(220,31,31,.4)',color:'#FFAAAA',padding:'3px 8px',borderRadius:6,fontSize:9,fontWeight:700,textTransform:'uppercase'}}>{it.quantity}× {it.description}</span>):null;})}
              </div>
            </div>

            {/* Filtro por etapa */}
            {etapasUnicas.length>0&&(
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14}}>
                <Icon name="filter" size={14} style={{color:'var(--muted)',flexShrink:0}}/>
                <div style={{display:'flex',gap:6,flexWrap:'wrap',flex:1}}>
                  <button onClick={()=>setEtapaFilter('')} style={{padding:'4px 12px',borderRadius:999,fontSize:8,fontWeight:800,textTransform:'uppercase',border:'1.5px solid',cursor:'pointer',transition:'all .15s',background:etapaFilter===''?'var(--ink)':'transparent',color:etapaFilter===''?'#fff':'var(--muted)',borderColor:etapaFilter===''?'var(--ink)':'var(--border)',fontFamily:'Plus Jakarta Sans,sans-serif'}}>

                    <button key={e} onClick={()=>setEtapaFilter(etapaFilter===e?'':e)} style={{padding:'4px 12px',borderRadius:999,fontSize:8,fontWeight:800,textTransform:'uppercase',border:'1.5px solid',cursor:'pointer',transition:'all .15s',background:etapaFilter===e?'var(--red)':'transparent',color:etapaFilter===e?'#fff':'var(--muted)',borderColor:etapaFilter===e?'var(--red)':'var(--border)',fontFamily:'Plus Jakarta Sans,sans-serif'}}>
                      {e}

            {/* Seção RECEBIDOS */}
            {filteredRecebidos.length>0&&(
              <div style={{marginBottom:16}}>
                <div className="divider" style={{marginBottom:12}}>
                  <span style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'#059669',padding:'3px 10px',background:'#EDFAF3',borderRadius:999,border:'1px solid #AAE6C5',whiteSpace:'nowrap',flexShrink:0}}>
                    ✦ Recebidos — Prioridade · Mesmo modelo
                  </span>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:8}}>
                  {filteredRecebidos.map((v,i)=>(
                    <div key={v.os} onClick={()=>setSourceOS(String(v.os))} className={`donor-card ${String(v.os)===sourceOS?'selected':''}`}>
                      <div style={{display:'flex',alignItems:'center',gap:12}}>
                        <input type="radio" name="sourceOS" checked={String(v.os)===sourceOS} onChange={()=>setSourceOS(String(v.os))} style={{width:16,height:16,accentColor:'var(--red)',flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:2}}>
                            <span style={{fontSize:14,fontWeight:800,color:'var(--ink)'}}>OS #{v.os}</span>
                            {i===0&&<span className="badge badge-admin">Melhor opção</span>}
                            <span style={{fontSize:8,fontWeight:800,color:'#059669',background:'#EDFAF3',border:'1px solid #AAE6C5',padding:'2px 8px',borderRadius:999}}>📍 Recebido</span>
                          </div>
                          <p style={{margin:0,fontSize:10,fontWeight:700,textTransform:'uppercase',color:'var(--muted)'}}>{v.modelo}</p>
                          <div style={{display:'flex',gap:10,marginTop:2}}>
                            <p className="mono" style={{margin:0,fontSize:9,color:'var(--muted)'}}>{v.chassi}</p>
                            {v.cor&&<p style={{margin:0,fontSize:9,color:'var(--muted)'}}>{v.cor}</p>}
                          </div>
                        </div>
                        <div style={{textAlign:'right',flexShrink:0}}>
                          <p style={{fontSize:8,fontWeight:700,background:'var(--smoke)',color:'var(--muted)',padding:'2px 8px',borderRadius:6,margin:0}}>{v.etapa||'—'}</p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Outros veículos do mesmo modelo */}
            {filteredOutros.length>0&&(
              <div style={{marginBottom:16}}>
                <div className="divider" style={{marginBottom:12}}>
                  <span style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',whiteSpace:'nowrap',flexShrink:0}}>
                    {vehicleCandidates.recebidos.length>0?'Outros veículos do mesmo modelo':'Todos os veículos do mesmo modelo'}
                  </span>
                </div>
                <div className="scroll-y" style={{maxHeight:200,display:'flex',flexDirection:'column',gap:8}}>
                  {filteredOutros.map(v=>(
                    <div key={v.os} onClick={()=>setSourceOS(String(v.os))} className={`donor-card ${String(v.os)===sourceOS?'selected':''}`} style={{padding:'10px 14px'}}>
                      <div style={{display:'flex',alignItems:'center',gap:10}}>
                        <input type="radio" name="sourceOS" checked={String(v.os)===sourceOS} onChange={()=>setSourceOS(String(v.os))} style={{width:15,height:15,accentColor:'var(--red)',flexShrink:0}}/>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:8}}>
                            <span style={{fontSize:13,fontWeight:800}}>OS #{v.os}</span>
                            <span style={{fontSize:8,fontWeight:700,background:'var(--smoke)',color:'var(--muted)',padding:'2px 7px',borderRadius:999,textTransform:'uppercase'}}>{v.etapa||v.localizacao||'—'}</span>
                          </div>
                          <p style={{margin:0,fontSize:9,color:'var(--muted)',textTransform:'uppercase',fontWeight:600}}>{v.modelo} · <span className="mono">{v.chassi}</span></p>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {filteredRecebidos.length===0&&filteredOutros.length===0&&(
              <div style={{textAlign:'center',padding:'32px 0',color:'var(--muted)'}}>
                <Icon name="search" size={28} style={{margin:'0 auto 10px',display:'block'}}/>
                <p style={{fontSize:10,fontWeight:700,textTransform:'uppercase',margin:0}}>Nenhum veículo do mesmo modelo encontrado</p>
                <p style={{fontSize:9,margin:'4px 0 0'}}>Modelo: {targetRequest?.vehicleData?.modelo}</p>
              </div>
            )}

            {/* MELHORIA 2: também permite digitar uma OS manualmente */}
            <div style={{marginBottom:16}}>
              <div className="divider" style={{marginBottom:12}}>
                <span style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--muted)',whiteSpace:'nowrap',flexShrink:0}}>Ou digitar outra OS</span>
              </div>
              <div style={{display:'flex',gap:8}}>
                <input type="text" inputMode="numeric" placeholder="Número da OS doadora" className="input" style={{fontSize:14,fontWeight:700}}
                  value={sourceOS} onChange={e=>setSourceOS(sanitize(e.target.value))}/>
              </div>
            </div>

            {/* Resumo */}
            {sourceOS&&(
              <div style={{background:'var(--ink)',borderRadius:12,padding:14,color:'#fff',marginBottom:16}}>
                <p style={{fontSize:7,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 10px'}}>Resumo da operação</p>
                <div style={{display:'grid',gridTemplateColumns:'1fr auto 1fr',gap:8,alignItems:'center',textAlign:'center'}}>
                  <div style={{background:'rgba(255,255,255,.05)',borderRadius:10,padding:'10px 8px'}}>
                    <p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'0 0 4px'}}>OS Receptora</p>
                    <p style={{fontSize:22,fontWeight:800,color:'#FFAAAA',margin:0,letterSpacing:'-.01em'}}>#{targetOS}</p>
                    <p style={{fontSize:9,color:'rgba(255,255,255,.4)',margin:0}}>{targetRequest?.vehicleData?.modelo}</p>
                  </div>
                  <div style={{textAlign:'center'}}>
                    <Icon name="arrow-right" size={18}/><p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'4px 0 0'}}>{selectedItems.length} peça(s)</p>
                  </div>
                  <div style={{background:'rgba(255,255,255,.05)',borderRadius:10,padding:'10px 8px'}}>
                    <p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'0 0 4px'}}>OS Doadora</p>
                    <p style={{fontSize:22,fontWeight:800,color:'#fff',margin:0,letterSpacing:'-.01em'}}>#{sourceOS}</p>
                    <p style={{fontSize:9,color:'rgba(255,255,255,.4)',margin:0}}>{sourceVehicle?.modelo||'—'}</p>
                  </div>
                </div>
              </div>
            )}

            <div style={{display:'flex',gap:10}}>
              <button onClick={()=>setStep(2)} className="btn-ghost" style={{flex:1}}>← Voltar</button>
              <button onClick={handleConfirm} disabled={!sourceOS||processing} className="btn-primary" style={{flex:2,padding:13}}>
                {processing?<Icon name="refresh-cw" size={15} className="spin"/>:<Icon name="check" size={15}/>}
                {processing?'Processando...':'Confirmar Transferência'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Request Form — MELHORIA 1 (exibe todas peças mescladas da OS) ──────────
function RequestForm({user,loggedInUser,vehiclesDB,requests}){
  const[os,setOs]=useState('');const[vehicle,setVehicle]=useState(null);const[unidade,setUnidade]=useState('Unidade 1');
  const[items,setItems]=useState([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);
  const[submitting,setSubmitting]=useState(false);const[done,setDone]=useState(false);
  const[semFoto,setSemFoto]=useState([]);const[showFoto,setShowFoto]=useState(false);
  const[showDup,setShowDup]=useState(false);const[dups,setDups]=useState([]);const[compressing,setCompressing]=useState(false);

  const onOSBlur=()=>{const t=String(os).trim();if(!t)return;const f=vehiclesDB.find(v=>String(v.os).trim()===t);if(f)setVehicle(f);else{setVehicle(null);alert('OS não cadastrada.');}};

  const compressImage=async(file)=>{
    return new Promise(resolve=>{
      const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');const ctx=c.getContext('2d');let w=img.width,h=img.height;const mx=1024;if(w>h&&w>mx){h*=mx/w;w=mx;}else if(h>mx){w*=mx/h;h=mx;}c.width=w;c.height=h;ctx.drawImage(img,0,0,w,h);resolve(c.toDataURL('image/jpeg',.7));};img.src=e.target.result;};r.readAsDataURL(file);
    });
  };
  const handleImageUpload=async(itemId,file)=>{
    setCompressing(true);
    try{const c=await compressImage(file);setItems(p=>p.map(i=>i.id===itemId?{...i,photo:c}:i));setSemFoto(p=>p.filter(id=>id!==itemId));}
    catch{alert('Erro ao processar imagem.');}
    setCompressing(false);
  };
  const salvar=async()=>{
    setSubmitting(true);
    try{await col('requests').add({os,responsavel:loggedInUser.user,vehicleData:vehicle,unidade,items,timestamp:Date.now(),status:'Pendente',userId:user?.uid||'anon'});setDone(true);setShowDup(false);}
    catch{alert('Erro ao salvar pedido.');}
    setSubmitting(false);
  };
  const submit=async e=>{
    e.preventDefault();
    if(!os.trim())return alert('OS obrigatória.');
    if(!vehicle)return alert('OS não cadastrada no sistema.');
    if(items.some(i=>!i.description.trim()))return alert('Todos os itens precisam de descrição.');
    const sf=items.filter(i=>!i.photo).map(i=>i.id);
    if(sf.length){setSemFoto(sf);setShowFoto(true);return;}
    const ex=requests.filter(r=>String(r.os).trim()===String(os).trim());
    if(ex.length){setDups(ex);setShowDup(true);return;}
    await salvar();
  };

  // MELHORIA 1: peças já cadastradas na mesma OS (mescladas)
  const existingItemsForOS=useMemo(()=>{
    if(!os.trim())return[];
    const matching=requests.filter(r=>String(r.os).trim()===os.trim());
    const all=[];const seen=new Set();
    matching.forEach(r=>(r.items||[]).forEach(it=>{const k=it.id||it.description;if(!seen.has(k)){seen.add(k);all.push(it);}}));
    return all;
  },[requests,os]);

  if(done)return(
    <div style={{maxWidth:420,margin:'0 auto',background:'#fff',borderRadius:20,border:'1.5px solid var(--border)',padding:40,textAlign:'center'}} className="fade-up">
      <div style={{width:64,height:64,background:'#EDFAF3',borderRadius:18,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}><Icon name="check-circle" size={32}/></div>
      <h2 style={{fontSize:24,fontWeight:800,margin:'0 0 8px',letterSpacing:'-.02em'}}>Pedido Enviado!</h2>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:24}}>OS #{os} — {unidade}</p>
      <button onClick={()=>{setDone(false);setOs('');setVehicle(null);setUnidade('Unidade 1');setItems([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);}} className="btn-primary" style={{width:'100%',padding:14}}>Nova Solicitação</button>
    </div>
  );

  return(
    <div className="fade-up" style={{paddingBottom:16}}>
      {/* Modal Foto */}
      {showFoto&&(
        <div style={{position:'fixed',inset:0,zIndex:600,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',maxWidth:360,width:'100%',boxShadow:'0 32px 64px rgba(0,0,0,.3)'}}>
            <div style={{background:'var(--red)',padding:'24px 20px',textAlign:'center',color:'#fff'}}>
              <div style={{width:52,height:52,background:'rgba(255,255,255,.2)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Icon name="camera" size={26}/></div>
              <h3 style={{margin:0,fontSize:17,fontWeight:800}}>Foto Obrigatória</h3>
            </div>
            <div style={{padding:20}}>
              <p style={{fontSize:12,color:'var(--muted)',textAlign:'center',marginBottom:16}}>{semFoto.length} item(s) sem foto.</p>
              <button onClick={()=>setShowFoto(false)} className="btn-primary" style={{width:'100%'}}>Entendido</button>
            </div>
          </div>
        </div>
      )}
      {/* Modal Duplicata */}
      {showDup&&(
        <div style={{position:'fixed',inset:0,zIndex:600,background:'rgba(0,0,0,.85)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',maxWidth:560,width:'100%',boxShadow:'0 32px 64px rgba(0,0,0,.3)'}}>
            <div style={{background:'var(--ink)',padding:'20px 24px',display:'flex',alignItems:'center',gap:14,color:'#fff',borderBottom:'4px solid var(--red)'}}>
              <div style={{width:44,height:44,background:'var(--red)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="alert-triangle" size={20}/></div>
              <div>
                <h3 style={{margin:0,fontSize:16,fontWeight:800}}>OS já possui pedido!</h3>
                <p style={{margin:0,fontSize:9,color:'rgba(255,255,255,.4)',textTransform:'uppercase',letterSpacing:'.08em',marginTop:2}}>OS #{os} — Será inclusão adicional</p>
              </div>
            </div>
            {/* MELHORIA 1: mostra peças já cadastradas de TODAS as solicitações mescladas */}
            <div style={{padding:16,maxHeight:'40vh',overflowY:'auto'}}>
              <p style={{fontSize:10,fontWeight:800,textTransform:'uppercase',color:'var(--muted)',marginBottom:10,letterSpacing:'.08em'}}>Peças já cadastradas nesta OS:</p>
              <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
                {existingItemsForOS.map((it,j)=>(
                  <div key={j} style={{display:'flex',alignItems:'center',gap:6,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:8,padding:'6px 10px'}}>
                    {it.photo&&<img src={it.photo} style={{width:28,height:28,borderRadius:6,objectFit:'cover'}}/>}
                    <div>
                      <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',margin:0}}>{it.description}</p>
                      <StatusBadge status={it.status||'Pendente'} orig={it.statusOriginal}/>
                    </div>
                  </div>
                ))}
              </div>
            </div>
            <div style={{padding:16,background:'var(--smoke)',borderTop:'1px solid var(--border)',display:'flex',gap:10}}>
              <button onClick={()=>{setShowDup(false);setDups([]);}} className="btn-ghost" style={{flex:1}}>Cancelar</button>
              <button onClick={salvar} disabled={submitting} className="btn-primary" style={{flex:1}}>
                {submitting?<Icon name="refresh-cw" size={14} className="spin"/>:<Icon name="check" size={14}/>} Incluir mesmo assim
              </button>
            </div>
          </div>
        </div>
      )}

      <div style={{marginBottom:20}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Operacional VRZ</p>
        <h2 style={{fontSize:32,fontWeight:800,margin:0,letterSpacing:'-.02em'}}>Nova Requisição</h2>
      </div>

      <form onSubmit={submit} style={{display:'flex',flexDirection:'column',gap:16}}>
        <div className="card">
          <div style={{padding:20,display:'flex',flexDirection:'column',gap:16}}>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Número da OS</label>
              <input type="text" inputMode="numeric" value={os} onChange={e=>setOs(sanitize(e.target.value))} onBlur={onOSBlur} placeholder="Nº da OS" className="input" style={{fontSize:22,fontWeight:800,letterSpacing:'.05em'}} required/>
            </div>
            <div>
              <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.12em',color:'var(--muted)',display:'block',marginBottom:6}}>Unidade</label>
              <select value={unidade} onChange={e=>setUnidade(e.target.value)} className="input" style={{fontWeight:700,appearance:'auto'}}>
                {UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}
              </select>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:10,background:'var(--smoke)',border:'1px solid var(--border)',borderRadius:10,padding:'10px 14px'}}>
              <div style={{width:36,height:36,borderRadius:9,background:'var(--red-light)',border:'1px solid #FFBDBD',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Icon name="user" size={15}/></div>
              <div style={{flex:1,minWidth:0}}>
                <p style={{fontSize:8,fontWeight:700,textTransform:'uppercase',color:'var(--muted)',margin:0}}>Solicitante</p>
                <p style={{fontSize:13,fontWeight:700,textTransform:'uppercase',margin:0}}>{loggedInUser.user}</p>
              </div>
              <RoleBadge role={loggedInUser.role}/>
            </div>
          </div>
          {/* Painel do veículo */}
          <div style={{borderTop:'2px solid var(--border)',background:'var(--ink)',padding:20,minHeight:100,display:'flex',alignItems:'center'}}>
            {vehicle?(
              <div style={{width:'100%'}}>
                <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.12em',color:'rgba(255,255,255,.3)',margin:'0 0 4px'}}>Veículo encontrado</p>
                <p style={{fontSize:22,fontWeight:800,textTransform:'uppercase',color:'#fff',margin:'0 0 12px'}}>{vehicle.modelo}</p>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
                  {[['Etapa',vehicle.etapa],['Cor',vehicle.cor],['Local',vehicle.localizacao]].map(([l,v])=>(
                    <div key={l}><p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'0 0 2px'}}>{l}</p><p style={{fontSize:11,color:'rgba(255,255,255,.85)',fontWeight:600,margin:0,textTransform:'uppercase'}}>{v||'—'}</p></div>
                  ))}
                </div>
                <div style={{background:'rgba(255,255,255,.06)',borderRadius:8,padding:'8px 12px',textAlign:'center',border:'1px solid rgba(255,255,255,.08)'}}>
                  <p style={{fontSize:7,color:'rgba(255,255,255,.3)',fontWeight:700,textTransform:'uppercase',margin:'0 0 2px'}}>Chassi</p>
                  <p className="mono" style={{fontSize:13,fontWeight:700,color:'rgba(255,255,255,.9)',margin:0,letterSpacing:'.08em',userSelect:'all'}}>{vehicle.chassi}</p>
                </div>
                {/* MELHORIA 1: mostra peças já cadastradas na OS */}
                {existingItemsForOS.length>0&&(
                  <div style={{marginTop:12,paddingTop:12,borderTop:'1px solid rgba(255,255,255,.1)'}}>
                    <p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',color:'rgba(255,255,255,.3)',marginBottom:6}}>Peças já cadastradas nesta OS:</p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                      {existingItemsForOS.map((it,i)=>(
                        <span key={i} style={{fontSize:8,fontWeight:700,textTransform:'uppercase',padding:'2px 8px',borderRadius:6,background:'rgba(255,255,255,.08)',color:'rgba(255,255,255,.6)',border:'1px solid rgba(255,255,255,.12)'}}>
                          {it.quantity}× {it.description} · <span style={{opacity:.6}}>{it.status}</span>
                        </span>
                      ))}
                    </div>
                  </div>
                )}
              </div>
            ):(
              <div style={{width:'100%',textAlign:'center',padding:'12px 0'}}>
                <Icon name="car" size={28} style={{margin:'0 auto 8px',display:'block',color:'rgba(255,255,255,.15)'}}/>
                <p style={{fontSize:9,color:'rgba(255,255,255,.25)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',margin:0}}>Digite a OS para carregar o veículo</p>
              </div>
            )}
          </div>
        </div>

        {/* Itens */}
        <div>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
            <h3 style={{margin:0,fontSize:13,fontWeight:800,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}><Icon name="package" size={16}/> Peças</h3>
            <button type="button" onClick={()=>setItems([...items,{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}])} className="btn-primary" style={{padding:'8px 16px',fontSize:10}}>+ Item</button>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {items.map((it,idx)=>(
              <div key={it.id} className="card" style={{border:semFoto.includes(it.id)?'1.5px solid var(--red)':'1.5px solid var(--border)'}}>
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 16px',borderBottom:'1px solid var(--border)',background:'var(--smoke)'}}>
                  <span style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)'}}>Item {idx+1}</span>
                  <button type="button" onClick={()=>{if(items.length>1){setItems(items.filter(i=>i.id!==it.id));setSemFoto(p=>p.filter(id=>id!==it.id));}else{setItems([{id:Date.now(),description:'',quantity:1,photo:null,status:'Pendente'}]);setSemFoto([]);}}} style={{background:'var(--red)',color:'#fff',border:'none',borderRadius:7,padding:'5px 10px',fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>✕ Remover</button>
                </div>
                <div style={{padding:16,display:'flex',flexDirection:'column',gap:12}}>
                  <div>
                    <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Descrição da Peça</label>
                    <input type="text" value={it.description} onChange={e=>setItems(p=>p.map(i=>i.id===it.id?{...i,description:sanitize(e.target.value)}:i))} placeholder="NOME DA PEÇA" className="input" style={{fontWeight:700,textTransform:'uppercase'}} required autoCapitalize="characters"/>
                  </div>
                  <div style={{display:'flex',gap:12,alignItems:'flex-end'}}>
                    <div style={{width:100,flexShrink:0}}>
                      <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',display:'block',marginBottom:6}}>Qtd</label>
                      <input type="number" min="1" inputMode="numeric" value={it.quantity} onChange={e=>setItems(p=>p.map(i=>i.id===it.id?{...i,quantity:e.target.value}:i))} className="input" style={{fontSize:18,fontWeight:800,textAlign:'center'}}/>
                    </div>
                    <div style={{flex:1}}>
                      <label style={{fontSize:8,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--red)',display:'block',marginBottom:6}}>📷 Foto (Obrigatória)</label>
                      {it.photo?(
                        <div style={{position:'relative',borderRadius:10,overflow:'hidden',border:'1.5px solid #AAE6C5',height:80}}>
                          <img src={it.photo} style={{height:'100%',width:'100%',objectFit:'cover'}} alt="Peça"/>
                          <button type="button" onClick={()=>setItems(p=>p.map(i=>i.id===it.id?{...i,photo:null}:i))} style={{position:'absolute',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',border:'none',cursor:'pointer',color:'#fff',fontSize:10,fontWeight:700,opacity:0,transition:'opacity .2s'}} onMouseEnter={e=>e.currentTarget.style.opacity=1} onMouseLeave={e=>e.currentTarget.style.opacity=0}>✕ Trocar</button>
                          <div style={{position:'absolute',top:6,right:6,background:'#059669',color:'#fff',fontSize:7,fontWeight:800,padding:'2px 7px',borderRadius:999}}>✓ OK</div>
                        </div>
                      ):(
                        <label style={{height:80,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:6,border:`1.5px dashed ${semFoto.includes(it.id)?'var(--red)':'var(--border)'}`,borderRadius:10,cursor:'pointer',background:semFoto.includes(it.id)?'var(--red-light)':'var(--smoke)'}}>
                          <Icon name="camera" size={24}/>
                          <span style={{fontSize:9,fontWeight:700,textTransform:'uppercase',color:semFoto.includes(it.id)?'var(--red)':'var(--muted)'}}>{compressing?'Comprimindo...':'Toque para fotografar'}</span>
                          <input type="file" accept="image/*" capture="environment" onChange={e=>{if(e.target.files[0])handleImageUpload(it.id,e.target.files[0]);}} style={{display:'none'}} disabled={compressing}/>
                        </label>
                      )}
                    </div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
        <button disabled={submitting||!vehicle||compressing} className="btn-primary" style={{width:'100%',padding:16,fontSize:12}}>
          {submitting?<Icon name="refresh-cw" size={18} className="spin"/>:<><Icon name="send" size={16}/> Enviar Pedido</>}
        </button>
      </form>
    </div>
  );
}

// ── Status View ───────────────────────────────────────────────────────────
function StatusView({requests,isAdmin}){
  const[search,setSearch]=useState('');
  const[unidadeFilter,setUnidadeFilter]=useState('todas');
  const[statusTab,setStatusTab]=useState('geral');
  const[toDelete,setToDelete]=useState(null);

  // Mescla pedidos da mesma OS antes de exibir
  const merged=useMemo(()=>mergeByOS(requests.filter(r=>!r.importado)),[requests]);

  const filtered=useMemo(()=>merged.filter(r=>{
    const t=search.toLowerCase();
    const mb=String(r.os||'').toLowerCase().includes(t)||String(r.responsavel||'').toLowerCase().includes(t)||String(r.vehicleData?.modelo||'').toLowerCase().includes(t)||String(r.vehicleData?.chassi||'').toLowerCase().includes(t);
    const mu=unidadeFilter==='todas'||r.unidade===unidadeFilter;
    // Filtro por aba de status
    let ms=true;
    if(statusTab==='pendente') ms=r.items?.some(it=>it.status==='Pendente');
    else if(statusTab==='cotacao') ms=r.items?.some(it=>it.status==='Em Cotação'||it.status==='Comprado');
    else if(statusTab==='concluido') ms=r.items?.every(it=>it.status==='Concluído'||it.status==='Doado');
    else if(statusTab==='doado') ms=r.items?.some(it=>it.status==='Doado'||it.receivedFrom||it.donatedTo);
    return mb&&mu&&ms;
  }),[merged,search,unidadeFilter,statusTab]);

  // Contadores para as abas
  const counts=useMemo(()=>({
    geral:merged.length,
    pendente:merged.filter(r=>r.items?.some(it=>it.status==='Pendente')).length,
    cotacao:merged.filter(r=>r.items?.some(it=>it.status==='Em Cotação'||it.status==='Comprado')).length,
    concluido:merged.filter(r=>r.items?.every(it=>it.status==='Concluído'||it.status==='Doado')).length,
    doado:merged.filter(r=>r.items?.some(it=>it.status==='Doado'||it.receivedFrom||it.donatedTo)).length,
  }),[merged]);

  const exportCSV=()=>{
    const rows=[['Data','OS','Unidade','Chassi','Veiculo','Peca','Qtd','Status','Valor','Loja','Prazo','Entrega'].join(';')];
    filtered.forEach(r=>(r.items||[]).forEach(it=>rows.push([r.timestamp?new Date(r.timestamp).toLocaleDateString():'',r.os,r.unidade||'Unidade 1',r.vehicleData?.chassi||'-',r.vehicleData?.modelo||'-',it.description||'-',it.quantity||1,it.statusOriginal||it.status||'Pendente',it.price||0,it.supplier||'-',it.deliveryDate||'-',it.actualDeliveryDate||'-'].join(';'))));
    const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`Relatorio_VRZ_${new Date().toLocaleDateString('pt-BR').replace(/\//g,'-')}.csv`;a.click();
  };

  const exportPDF=async req=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF();
    doc.setFontSize(16);doc.text('Solicitacao de Pecas - VRZ',10,15);doc.setFontSize(9);
    doc.text('OS: #'+req.os,10,24);doc.text('Unidade: '+(req.unidade||'Unidade 1'),10,30);
    doc.text('Data: '+new Date(req.timestamp).toLocaleString(),10,36);
    doc.text('Veiculo: '+(req.vehicleData?.modelo||''),10,42);doc.text('Chassi: '+(req.vehicleData?.chassi||''),10,48);
    doc.text('Solicitante: '+req.responsavel,10,54);
    let y=64;doc.setFontSize(11);doc.text('ITENS:',10,y);y+=8;
    (req.items||[]).forEach((it,i)=>{
      if(y>250){doc.addPage();y=15;}
      doc.setFontSize(9);
      const st=it.status==='Doado'?`[DOADO → OS ${it.donatedTo||'?'}]`:`[${it.status||'Pendente'}]`;
      doc.text(`${i+1}. Qtd:${it.quantity} - ${it.description} ${st}`,14,y);y+=7;
      if(it.photo){try{doc.addImage(it.photo,'JPEG',14,y,45,28);y+=32;}catch{}}
    });
    doc.save('OS_'+req.os+'_VRZ.pdf');
  };

  return(
    <div className="fade-up" style={{paddingBottom:16}}>
      {toDelete&&(
        <div style={{position:'fixed',inset:0,zIndex:500,background:'rgba(0,0,0,.8)',display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
          <div style={{background:'#fff',borderRadius:20,overflow:'hidden',maxWidth:360,width:'100%',boxShadow:'0 32px 64px rgba(0,0,0,.3)'}}>
            <div style={{background:'var(--red)',padding:'24px 20px',textAlign:'center',color:'#fff'}}>
              <div style={{width:48,height:48,background:'rgba(255,255,255,.2)',borderRadius:14,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 12px'}}><Icon name="trash-2" size={22}/></div>
              <h3 style={{margin:0,fontSize:16,fontWeight:800}}>Excluir Registro</h3>
            </div>
            <div style={{padding:20}}>
              <p style={{fontSize:11,color:'var(--muted)',textAlign:'center',marginBottom:16}}>Confirmar exclusão permanente?</p>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                <button onClick={()=>setToDelete(null)} className="btn-ghost">Cancelar</button>
                <button onClick={async()=>{try{await col('requests').doc(toDelete).delete();setToDelete(null);}catch{alert('Erro.');}}} className="btn-primary">Confirmar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      <div style={{marginBottom:16}}>
        <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.15em',color:'var(--red)',marginBottom:4}}>Registros do Portal</p>
        <h2 style={{fontSize:32,fontWeight:800,margin:'0 0 12px',letterSpacing:'-.02em'}}>Histórico de OS</h2>
        {/* Abas de status */}
        <div style={{display:'flex',gap:3,background:'var(--smoke)',padding:4,borderRadius:12,border:'1px solid var(--border)',overflowX:'auto',marginBottom:12}}>
          {[
            {key:'geral',label:`Todos (${counts.geral})`,color:'var(--ink)'},
            {key:'pendente',label:`Pendentes (${counts.pendente})`,color:'#C45E00'},
            {key:'cotacao',label:`Em Cotação (${counts.cotacao})`,color:'#1A4EC2'},
            {key:'concluido',label:`Concluídos (${counts.concluido})`,color:'#0A6B34'},
            {key:'doado',label:`Doações (${counts.doado})`,color:'#A81515'},
          ].map(t=>(
            <button key={t.key} onClick={()=>setStatusTab(t.key)} style={{padding:'7px 14px',borderRadius:9,fontSize:9,fontWeight:800,textTransform:'uppercase',whiteSpace:'nowrap',border:'none',cursor:'pointer',letterSpacing:'.06em',transition:'all .15s',fontFamily:'Plus Jakarta Sans,sans-serif',background:statusTab===t.key?'#fff':'transparent',color:statusTab===t.key?t.color:'var(--muted)',boxShadow:statusTab===t.key?'0 2px 8px rgba(0,0,0,.08)':'none'}}>
              {t.label}
            </button>
          ))}
        </div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8,alignItems:'center'}}>
          <select value={unidadeFilter} onChange={e=>setUnidadeFilter(e.target.value)} className="input" style={{width:'auto',padding:'8px 14px',fontSize:10,fontWeight:700,appearance:'auto'}}>
            <option value="todas">Todas as Unidades</option>
            {UNIDADES.map(u=><option key={u} value={u}>{u}</option>)}
          </select>
          {isAdmin&&(
            <button onClick={exportCSV} style={{display:'flex',alignItems:'center',gap:6,padding:'8px 14px',background:'#059669',color:'#fff',border:'none',borderRadius:8,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>
              <Icon name="file-text" size={13}/> Excel
            </button>
          )}
          <div style={{position:'relative',flex:1,minWidth:200}}>
            <input type="text" placeholder="Buscar OS / Chassi / Nome..." value={search} onChange={e=>setSearch(e.target.value)} className="input" style={{paddingLeft:36,fontSize:11}}/>
            <div style={{position:'absolute',left:11,top:'50%',transform:'translateY(-50%)',color:'var(--muted)'}}><Icon name="search" size={14}/></div>
          </div>
        </div>
      </div>

      <div className="scroll-y" style={{maxHeight:'72vh',display:'flex',flexDirection:'column',gap:12}}>
        {filtered.length===0?(
          <div style={{padding:'64px 20px',textAlign:'center',background:'#fff',borderRadius:16,border:'1.5px dashed var(--border)'}}>
            <Icon name="inbox" size={32} style={{margin:'0 auto 10px',display:'block',color:'var(--muted)'}}/>
            <p style={{fontSize:9,fontWeight:800,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',margin:0}}>Nenhum resultado encontrado</p>
          </div>
        ):filtered.map(r=>(
          <div key={r.os} className="card" style={{borderLeft:'3px solid var(--red)'}}>
            <div style={{padding:'14px 16px'}}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:15,fontWeight:800}}>OS #{r.os}</span>
                  <span className="pill">{r.unidade||'Unidade 1'}</span>
                  {r._merged&&<span style={{fontSize:7,fontWeight:800,padding:'2px 7px',borderRadius:999,background:'#EAF0FF',color:'#1A4EC2',border:'1px solid #C0D0F5'}}>Mesclado</span>}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>exportPDF(r)} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',background:'#2563EB',color:'#fff',border:'none',borderRadius:7,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>
                    <Icon name="file-down" size={12}/> PDF
                  </button>
                  {isAdmin&&<button onClick={()=>setToDelete(r.id)} style={{display:'flex',alignItems:'center',gap:5,padding:'6px 12px',background:'var(--red)',color:'#fff',border:'none',borderRadius:7,fontSize:9,fontWeight:800,textTransform:'uppercase',cursor:'pointer'}}>
                    <Icon name="trash-2" size={12}/> Excluir
                  </button>}
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(100px,1fr))',gap:'6px 16px',marginBottom:12}}>
                {[['Solicitante',r.responsavel||'—'],['Veículo',r.vehicleData?.modelo||'—'],['Chassi',r.vehicleData?.chassi||'—'],['Data',r.timestamp?new Date(r.timestamp).toLocaleDateString():'—']].map(([l,v])=>(
                  <div key={l}><p style={{fontSize:7,fontWeight:700,textTransform:'uppercase',letterSpacing:'.1em',color:'var(--muted)',margin:'0 0 2px'}}>{l}</p><p style={{fontSize:10,fontWeight:600,color:'var(--ink)',margin:0}}>{v}</p></div>
                ))}
              </div>
              <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
                {(r.items||[]).map((it,i)=>(
                  <div key={i} style={{flexShrink:0,display:'flex',alignItems:'center',gap:8,background:'var(--smoke)',padding:'8px 10px',borderRadius:10,border:'1px solid var(--border)',minWidth:150,maxWidth:220}}>
                    {it.photo&&<img src={it.photo} style={{width:32,height:32,borderRadius:7,objectFit:'cover',border:'1px solid var(--border)',flexShrink:0}} alt="Peça"/>}
                    <div style={{minWidth:0,flex:1}}>
                      <p style={{fontSize:9,fontWeight:700,textTransform:'uppercase',margin:'0 0 4px',lineHeight:1.2,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{it.description||'(sem descrição)'}</p>
                      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:4,flexWrap:'wrap'}}>
                        <span style={{fontSize:8,color:'var(--red)',fontWeight:700}}>QTD:{it.quantity}</span>
                        <StatusBadge status={it.status||'Pendente'} orig={it.statusOriginal}/>
                      </div>
                        {it.receivedFrom&&(
                        <div style={{display:'flex',alignItems:'center',gap:4,marginTop:3,padding:'2px 6px',background:'#EDFAF3',borderRadius:5,border:'1px solid #AAE6C5'}}>
                          <Icon name="arrow-left" size={9}/>
                          <span style={{fontSize:7,color:'#0A6B34',fontWeight:800}}>Recebida da OS #{it.receivedFrom}</span>
                        </div>
                      )}
                      {it.donatedTo&&!it.receivedFrom&&(
                        <div style={{display:'flex',alignItems:'center',gap:4,marginTop:3,padding:'2px 6px',background:'#FFF0F0',borderRadius:5,border:'1px solid #FFBDBD'}}>
                          <Icon name="arrow-right" size={9}/>
                          <span style={{fontSize:7,color:'var(--red)',fontWeight:800}}>Doada para OS #{it.donatedTo}</span>
                        </div>
                      )}
                      {it.price>0&&<p style={{fontSize:8,color:'#059669',fontWeight:800,margin:'2px 0 0'}}>{fmtBRL(it.price)}</p>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── User Management ───────────────────────────────────────────────────────
