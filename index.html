<style>

* {
  box-sizing: border-box;
}

body {
  font-family: 'Inter', sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #eef2f6 100%);
  margin: 0;
  overflow: hidden;
}

/* Glassmorphism Effects */
.glass {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.glass-dark {
  background: rgba(0, 0, 0, 0.8);
  backdrop-filter: blur(10px);
  border: 1px solid rgba(255, 255, 255, 0.1);
}

/* Modern Animations */
@keyframes fadeInUp {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

@keyframes slideInLeft {
  from {
    opacity: 0;
    transform: translateX(-30px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes slideInRight {
  from {
    opacity: 0;
    transform: translateX(30px);
  }
  to {
    opacity: 1;
    transform: translateX(0);
  }
}

@keyframes pulse {
  0%, 100% {
    opacity: 1;
  }
  50% {
    opacity: 0.5;
  }
}

@keyframes shimmer {
  0% {
    background-position: -1000px 0;
  }
  100% {
    background-position: 1000px 0;
  }
}

.fade-in-up {
  animation: fadeInUp 0.4s ease-out forwards;
}

.slide-in-left {
  animation: slideInLeft 0.3s ease-out forwards;
}

.slide-in-right {
  animation: slideInRight 0.3s ease-out forwards;
}

/* Custom Scrollbar */
::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track {
  background: #f1f1f1;
  border-radius: 10px;
}

::-webkit-scrollbar-thumb {
  background: #ef4444;
  border-radius: 10px;
}

::-webkit-scrollbar-thumb:hover {
  background: #dc2626;
}

/* Card Hover Effects */
.hover-card {
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.hover-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 20px 25px -12px rgba(0, 0, 0, 0.15);
}

/* Gradient Text */
.gradient-text {
  background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

/* Loading Skeleton */
.skeleton {
  background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
}

/* Status Badges */
.status-badge {
  position: relative;
  overflow: hidden;
}

.status-badge::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition: left 0.5s;
}

.status-badge:hover::before {
  left: 100%;
}

/* Floating Action Button */
.fab {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 56px;
  height: 56px;
  border-radius: 28px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s;
  z-index: 80;
}

.fab:hover {
  transform: scale(1.1);
  box-shadow: 0 6px 20px rgba(239, 68, 68, 0.5);
}

@media (min-width: 768px) {
  .fab {
    display: none;
  }
}

/* Input Focus Effects */
.input-focus-effect {
  transition: all 0.2s;
}

.input-focus-effect:focus {
  transform: scale(1.02);
  box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
}

/* Neumorphism Elements */
.neumorph {
  background: #eef2f6;
  box-shadow: 9px 9px 16px #d1d9e6, -9px -9px 16px #ffffff;
}

.neumorph-inset {
  background: #eef2f6;
  box-shadow: inset 5px 5px 10px #d1d9e6, inset -5px -5px 10px #ffffff;
}

/* Modern Tab Styles */
.modern-tab {
  position: relative;
  transition: all 0.3s;
}

.modern-tab.active {
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
}

.modern-tab.active::before {
  content: '';
  position: absolute;
  bottom: -2px;
  left: 50%;
  transform: translateX(-50%);
  width: 30px;
  height: 3px;
  background: white;
  border-radius: 3px;
}

/* Progress Ring Animation */
@keyframes dash {
  to {
    stroke-dashoffset: 0;
  }
}

.progress-ring__circle {
  transition: stroke-dashoffset 0.35s;
  transform: rotate(-90deg);
  transform-origin: 50% 50%;
}

/* Notification Dot */
.notification-dot {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 8px;
  height: 8px;
  background: #ef4444;
  border-radius: 50%;
  border: 2px solid white;
  animation: pulse 1.5s infinite;
}

/* Responsive Improvements */
@media (max-width: 768px) {
  .mobile-bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    display: flex;
    padding: 8px 12px 20px;
    gap: 4px;
    z-index: 90;
  }
  
  .mobile-nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 8px 4px;
    border-radius: 12px;
    transition: all 0.2s;
  }
  
  .mobile-nav-item.active {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
  }
}

const useFirestore = (collectionName) => {
  const [data, setData] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  
  useEffect(() => {
    setLoading(true);
    const unsubscribe = col(collectionName).onSnapshot(
      snapshot => {
        setData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        setLoading(false);
      },
      err => {
        console.error(`Erro ao carregar ${collectionName}:`, err);
        setError(err);
        setLoading(false);
      }
    );
    return unsubscribe;
  }, [collectionName]);
  
  return { data, loading, error };
};

  const encoder = new TextEncoder();
  const data = encoder.encode(password);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
};

function Icon({ name, size = 18, className = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    if (ref.current && window.lucide) {
      const d = window.lucide.icons[name];
      if (d) {
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        const [, at, ch] = d;
        Object.entries({ ...at, width: size, height: size, class: `lucide-${name} ${className}`, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', 'stroke-width': 2, 'stroke-linecap': 'round', 'stroke-linejoin': 'round' }).forEach(([k, v]) => svg.setAttribute(k, v));
        ch.forEach(([t, a]) => { const el = document.createElementNS('http://www.w3.org/2000/svg', t); Object.entries(a).forEach(([k, v]) => el.setAttribute(k, v)); svg.appendChild(el); });
        ref.current.innerHTML = '';
        ref.current.appendChild(svg);
      }
    }
  }, [name, size, className]);
  return <span ref={ref} className="inline-flex shrink-0 items-center justify-center" role="img" aria-label={name} />;
}

const NetworkStatus = () => {
  const [online, setOnline] = useState(navigator.onLine);
  useEffect(() => {
    const handleChange = () => setOnline(navigator.onLine);
    window.addEventListener('online', handleChange);
    window.addEventListener('offline', handleChange);
    return () => {
      window.removeEventListener('online', handleChange);
      window.removeEventListener('offline', handleChange);
    };
  }, []);
  if (online) return null;
  return (
    <div className="fixed top-0 left-0 right-0 bg-gradient-to-r from-yellow-500 to-orange-500 text-white text-center py-2 text-xs font-bold z-[1000] shadow-lg" role="alert">

// DASHBOARD VIEW (Melhorado)

function DashboardView({ requests }) {
  const stats = useMemo(() => {
    if (!requests?.length) return null;
    // Cálculos estatísticos...
    const total = requests.length;
    const totalItens = requests.reduce((a, r) => a + (r.items?.length || 0), 0);
    const concluidos = requests.reduce((a, r) => a + (r.items?.filter(i => i.status === 'Concluído').length || 0), 0);
    const pendentes = requests.reduce((a, r) => a + (r.items?.filter(i => i.status === 'Pendente').length || 0), 0);
    const cotacao = requests.reduce((a, r) => a + (r.items?.filter(i => i.status === 'Em Cotação').length || 0), 0);
    const doados = requests.reduce((a, r) => a + (r.items?.filter(i => i.status === 'Doado').length || 0), 0);
    const porUnidade = {};
    requests.forEach(r => { const u = r.unidade || 'Unidade 1'; porUnidade[u] = (porUnidade[u] || 0) + 1; });
    const porDia = [0, 0, 0, 0, 0, 0, 0];
    requests.forEach(r => porDia[new Date(r.timestamp).getDay()]++);
    const diasSemana = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
    return { total, totalItens, concluidos, pendentes, cotacao, doados, porUnidade, porDia, diasSemana, taxaConclusao: totalItens ? Math.round(concluidos / totalItens * 100) : 0 };
  }, [requests]);

  if (!stats) {

        <p className="text-sm font-bold uppercase text-gray-400 tracking-wider">Nenhum dado disponível</p>

    );

  const kpiCards = [
    { label: 'Pedidos', value: stats.total, icon: 'clipboard-list', color: 'from-red-500 to-red-600', bg: 'bg-gradient-to-br from-red-500 to-red-600' },
    { label: 'Peças', value: stats.totalItens, icon: 'package', color: 'from-blue-500 to-blue-600', bg: 'bg-gradient-to-br from-blue-500 to-blue-600' },
    { label: 'Concluídas', value: stats.concluidos, icon: 'check-circle', color: 'from-emerald-500 to-emerald-600', bg: 'bg-gradient-to-br from-emerald-500 to-emerald-600' },

  ];

        <div>
          <h1 className="text-4xl font-black tracking-tighter bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">Analytics VRZ</h1>
          <p className="text-xs font-medium text-gray-500 mt-1">Inteligência Operacional em Tempo Real</p>
        </div>
        <div className="flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-emerald-500 to-emerald-600 rounded-xl shadow-lg">
          <div className="w-2 h-2 bg-white rounded-full animate-pulse"></div>
          <span className="text-[10px] font-bold uppercase text-white tracking-wider">Live</span>
        </div>
      </div>

      {/* KPI Cards Grid */}

        {kpiCards.map((kpi, idx) => (

      {/* Charts Grid */}

        </div>

        {/* Status Distribution */}

          <div className="flex items-center justify-between mb-6">
            <p className="text-xs font-bold uppercase text-gray-500 tracking-wider">Status das Peças</p>

                    <div className="text-center -mt-5 text-xs font-bold text-red-600">{stats.porDia[idx]}</div>

                <span className="text-[10px] font-bold text-gray-500">{dia}</span>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

  const [submitting, setSubmitting] = useState(false);
  const [done, setDone] = useState(false);
  const [showFoto, setShowFoto] = useState(false);
  const [semFoto, setSemFoto] = useState([]);
  const [showDup, setShowDup] = useState(false);
  const [dups, setDups] = useState([]);
  const [compressing, setCompressing] = useState(false);

  const onOSBlur = () => {
    const t = String(os).trim();
    if (!t) return;
    const f = vehiclesDB.find(v => String(v.os).trim() === t);
    if (f) setVehicle(f);
    else { setVehicle(null); alert('OS não cadastrada no sistema.'); }
  };

  const compressImage = async (file) => {
    return new Promise((resolve) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          let width = img.width;
          let height = img.height;
          const maxSize = 1024;
          if (width > height && width > maxSize) {
            height *= maxSize / width;
            width = maxSize;
          } else if (height > maxSize) {
            width *= maxSize / height;
            height = maxSize;
          }
          canvas.width = width;
          canvas.height = height;
          ctx.drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL('image/jpeg', 0.7));
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    });
  };

  const handleImageUpload = async (itemId, file) => {
    setCompressing(true);
    try {
      const compressed = await compressImage(file);
      setItems(p => p.map(i => i.id === itemId ? { ...i, photo: compressed } : i));
      setSemFoto(p => p.filter(id => id !== itemId));
    } catch (error) {
      console.error('Erro ao comprimir imagem:', error);
      alert('Erro ao processar imagem.');
    }
    setCompressing(false);
  };

  const salvar = async () => {
    setSubmitting(true);
    try {
      await col('requests').add({
        os, responsavel: loggedInUser.user, localizacaoSolicitacao: '-',
        vehicleData: vehicle, unidade, items, timestamp: Date.now(),
        status: 'Pendente', userId: user.uid || 'anon'
      });
      setDone(true);
      setShowDup(false);
    } catch (error) {
      console.error('Erro ao salvar:', error);
      alert('Erro ao salvar pedido.');
    }
    setSubmitting(false);
  };

  const submit = async e => {
    e.preventDefault();
    if (!os.trim()) return alert('OS obrigatória.');
    if (!vehicle) return alert('OS não cadastrada.');
    if (items.some(i => !i.description.trim())) return alert('Todos os itens precisam de descrição.');
    const sf = items.filter(i => !i.photo).map(i => i.id);
    if (sf.length) { setSemFoto(sf); setShowFoto(true); return; }
    const ex = requests.filter(r => String(r.os).trim() === String(os).trim());
    if (ex.length) { setDups(ex); setShowDup(true); return; }
    await salvar();
  };

  if (done) {
    return (
      <div className="flex flex-col items-center justify-center py-16 fade-in-up bg-white rounded-3xl shadow-xl p-8 max-w-md mx-auto text-center">
        <div className="w-20 h-20 bg-gradient-to-br from-emerald-500 to-emerald-600 rounded-full flex items-center justify-center mb-6 shadow-lg">
          <Icon name="check" size={40} className="text-white" />
        </div>
        <h2 className="text-2xl font-black text-gray-800 uppercase">Pedido Protocolado!</h2>
        <p className="text-sm text-gray-500 mt-2">OS #{os} - {unidade}</p>
        <button onClick={() => { setDone(false); setOs(''); setVehicle(null); setUnidade('Unidade 1'); setItems([{ id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }]); }} className="mt-8 w-full py-4 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-sm shadow-lg hover:shadow-xl transition-all">
          Nova Solicitação
        </button>
      </div>
    );
  }

  return (
    <div className="space-y-6 fade-in-up">
      {/* Modal de Foto Obrigatória */}
      {showFoto && (
        <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl animate-scale-in">
            <div className="bg-gradient-to-r from-red-500 to-red-600 p-6 text-center text-white">
              <div className="w-16 h-16 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3">
                <Icon name="camera" size={28} />
              </div>
              <h3 className="text-lg font-black uppercase">Foto Obrigatória!</h3>
            </div>
            <div className="p-6">
              <p className="text-xs font-bold text-gray-600 text-center">{semFoto.length} item(s) sem foto.</p>
              <button onClick={() => setShowFoto(false)} className="mt-4 w-full py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-[10px] shadow-md">Entendido</button>
            </div>
          </div>
        </div>
      )}

      {/* Modal de OS Duplicada */}
      {showDup && (
        <div className="fixed inset-0 z-[600] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-2xl rounded-2xl overflow-hidden shadow-2xl">
            <div className="bg-gradient-to-r from-gray-900 to-gray-800 p-5 text-white">
              <div className="flex items-center gap-4">
                <div className="w-12 h-12 bg-red-600 rounded-xl flex items-center justify-center">
                  <Icon name="alert-triangle" size={22} />
                </div>
                <div>
                  <h3 className="text-base font-black uppercase">OS já possui pedido!</h3>
                  <p className="text-gray-400 text-[9px] font-bold uppercase mt-1">OS #{os} — Contará como inclusão adicional</p>
                </div>
              </div>
            </div>
            <div className="p-5 max-h-[40vh] overflow-y-auto space-y-3">
              {dups.map((req, i) => (
                <div key={i} className="bg-gray-50 rounded-xl p-3 border border-gray-100">
                  <p className="text-[9px] font-bold uppercase text-gray-500 mb-2">{new Date(req.timestamp).toLocaleDateString()} — {req.responsavel} ({req.unidade || 'Unidade 1'})</p>
                  <div className="flex flex-wrap gap-2">
                    {(req.items || []).map((it, j) => (
                      <div key={j} className="flex items-center gap-2 bg-white border border-gray-200 rounded-lg px-2 py-1 shadow-sm">
                        {it.photo && <img src={it.photo} className="w-8 h-8 rounded object-cover" />}
                        <div>
                          <p className="text-[8px] font-bold uppercase">{it.description}</p>
                          <StatusBadge status={it.status || 'Pendente'} orig={it.statusOriginal} />
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              ))}
            </div>
            <div className="p-5 bg-gray-50 border-t flex gap-3">
              <button onClick={() => { setShowDup(false); setDups([]); }} className="flex-1 py-3 bg-gray-200 text-gray-600 rounded-xl font-bold uppercase text-[9px] hover:bg-gray-300 transition">Cancelar</button>
              <button onClick={salvar} disabled={submitting} className="flex-1 py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-[9px] flex items-center justify-center gap-2 shadow-md hover:shadow-lg transition">
                {submitting ? <Icon name="refresh-cw" size={14} className="animate-spin" /> : <Icon name="check" size={14} />}
                Incluir mesmo assim
              </button>
            </div>
          </div>
        </div>
      )}

      {/* Formulário Principal */}
      <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
        <div className="bg-gradient-to-r from-gray-900 to-gray-800 px-6 py-4">
          <h2 className="text-xl font-black text-white uppercase tracking-tight">Nova Requisição</h2>
          <p className="text-[10px] font-medium text-gray-400 mt-1">Preencha os dados da solicitação</p>
        </div>

        <form onSubmit={submit} className="p-6 space-y-6">
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-2">Número da OS</label>
              <input type="text" inputMode="numeric" value={os} onChange={e => setOs(sanitizeInput(e.target.value))} onBlur={onOSBlur} placeholder="Digite o nº da OS" className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-red-500 focus:bg-white outline-none font-bold text-lg transition-all" required />
            </div>
            <div>
              <label className="text-[10px] font-bold text-gray-500 uppercase tracking-wider block mb-2">Unidade</label>
              <select value={unidade} onChange={e => setUnidade(e.target.value)} className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl font-bold text-sm focus:border-red-500 outline-none transition-all">
                {UNIDADES.map(u => <option key={u} value={u}>{u}</option>)}
              </select>
            </div>
          </div>

          {/* Vehicle Card */}
          <div className="bg-gradient-to-r from-gray-900 to-gray-800 rounded-xl p-5 text-white">
            {vehicle ? (
              <div className="space-y-3">
                <div className="flex items-start justify-between">
                  <div>
                    <p className="text-gray-400 text-[8px] font-bold uppercase mb-1">Modelo</p>
                    <p className="text-white text-xl font-black uppercase">{vehicle.modelo}</p>
                  </div>
                  <div className="text-right">
                    <p className="text-gray-400 text-[8px] font-bold uppercase mb-1">Fabricante</p>
                    <p className="text-white text-sm font-bold uppercase">{vehicle.fabricante || 'N/A'}</p>
                  </div>
                </div>
                <div className="grid grid-cols-3 gap-3 pt-2 border-t border-white/10">
                  <div><p className="text-gray-400 text-[7px] font-bold uppercase">Etapa</p><p className="text-red-400 text-xs font-black uppercase">{vehicle.etapa}</p></div>
                  <div><p className="text-gray-400 text-[7px] font-bold uppercase">Cor</p><p className="text-white text-xs font-bold uppercase">{vehicle.cor}</p></div>
                  <div><p className="text-gray-400 text-[7px] font-bold uppercase">Local</p><p className="text-white text-xs font-bold uppercase">{vehicle.localizacao}</p></div>
                </div>
                <div className="bg-white/5 rounded-lg px-3 py-2">
                  <p className="text-gray-400 text-[7px] font-bold uppercase mb-1">Chassi</p>
                  <p className="text-white font-mono text-sm font-black tracking-wider select-all">{vehicle.chassi}</p>
                </div>
              </div>
            ) : (
              <div className="text-center py-6">
                <Icon name="car" size={32} className="text-gray-600 mx-auto mb-3" />
                <p className="text-gray-500 text-[9px] font-bold uppercase tracking-wider">Digite a OS para carregar o veículo</p>
              </div>
            )}
          </div>

          {/* Items Section */}
          <div className="space-y-4">
            <div className="flex justify-between items-center">
              <div className="flex items-center gap-2">
                <Icon name="package" size={18} className="text-red-500" />
                <h3 className="font-black text-gray-800 uppercase text-sm">Peças Solicitadas</h3>
              </div>
              <button type="button" onClick={() => setItems([...items, { id: Date.now(), description: '', quantity: 1, photo: null, status: 'Pendente' }])} className="bg-gradient-to-r from-red-500 to-red-600 text-white px-4 py-2 rounded-xl text-xs font-bold uppercase hover:shadow-lg transition-all flex items-center gap-2">
                <Icon name="plus" size={14} /> Adicionar Item
              </button>
            </div>

            {items.map((it, idx) => (
              <div key={it.id} className="bg-gray-50 rounded-xl p-4 border border-gray-200 hover:shadow-md transition-all">
                <div className="flex justify-between items-center mb-3">
                  <span className="text-xs font-bold text-gray-500 uppercase">Item {idx + 1}</span>
                  {items.length > 1 && (
                    <button type="button" onClick={() => setItems(items.filter(i => i.id !== it.id))} className="text-red-500 hover:text-red-600 text-xs font-bold uppercase flex items-center gap-1">
                      <Icon name="trash-2" size={12} /> Remover
                    </button>
                  )}
                </div>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="md:col-span-2">
                    <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Descrição da Peça</label>
                    <input type="text" value={it.description} onChange={e => setItems(p => p.map(i => i.id === it.id ? { ...i, description: sanitizeInput(e.target.value) } : i))} placeholder="NOME DA PEÇA" className="w-full px-3 py-2 bg-white border-2 border-gray-200 rounded-lg font-bold text-sm uppercase focus:border-red-500 outline-none transition-all" required />
                  </div>
                  <div>
                    <label className="text-[9px] font-bold text-gray-500 uppercase block mb-1">Quantidade</label>
                    <input type="number" min="1" inputMode="numeric" value={it.quantity} onChange={e => setItems(p => p.map(i => i.id === it.id ? { ...i, quantity: e.target.value } : i))} className="w-full px-3 py-2 bg-white border-2 border-gray-200 rounded-lg font-bold text-center focus:border-red-500 outline-none transition-all" />
                  </div>
                </div>
                <div className="mt-3">
                  <label className="text-[9px] font-bold text-red-500 uppercase block mb-1">📷 Foto (Obrigatória)</label>
                  {it.photo ? (
                    <div className="relative rounded-lg overflow-hidden border-2 border-emerald-400 h-24 w-24 group">
                      <img src={it.photo} className="h-full w-full object-cover" alt="Foto da peça" />
                      <button type="button" onClick={() => setItems(p => p.map(i => i.id === it.id ? { ...i, photo: null } : i))} className="absolute inset-0 bg-black/50 flex items-center justify-center opacity-0 group-hover:opacity-100 transition text-white text-xs font-bold">Trocar</button>
                    </div>
                  ) : (
                    <label className={`h-24 w-24 flex flex-col items-center justify-center gap-1 border-2 border-dashed rounded-lg cursor-pointer transition-all ${semFoto.includes(it.id) ? 'border-red-500 bg-red-50' : 'border-gray-300 bg-gray-100 hover:border-red-400'}`}>
                      <Icon name="camera" size={24} className={semFoto.includes(it.id) ? 'text-red-500' : 'text-gray-400'} />
                      <span className={`text-[8px] font-bold uppercase ${semFoto.includes(it.id) ? 'text-red-500' : 'text-gray-400'}`}>{compressing ? 'Comprimindo...' : 'Fotografar'}</span>
                      <input type="file" accept="image/*" capture="environment" onChange={e => { if (e.target.files[0]) handleImageUpload(it.id, e.target.files[0]); }} className="hidden" disabled={compressing} />
                    </label>
                  )}
                </div>
              </div>
            ))}
          </div>

          <button disabled={submitting || !vehicle || compressing} className={`w-full py-4 rounded-xl font-bold text-base uppercase flex items-center justify-center gap-3 shadow-lg transition-all ${submitting || !vehicle || compressing ? 'bg-gray-200 text-gray-400 cursor-not-allowed' : 'bg-gradient-to-r from-red-500 to-red-600 text-white hover:shadow-xl transform hover:scale-[1.02]'}`}>
            {submitting ? <Icon name="refresh-cw" size={20} className="animate-spin" /> : <><Icon name="send" size={18} />Enviar Pedido</>}
          </button>
        </form>
      </div>
    </div>
  );
}

// ============================================
// STATUS VIEW (Melhorado)
// ============================================
function StatusView({ requests, isAdmin }) {
  const [search, setSearch] = useState('');
  const [origem, setOrigem] = useState('todos');
  const [unidadeFilter, setUnidadeFilter] = useState('todas');
  const [toDelete, setToDelete] = useState(null);

  const filtered = useMemo(() => requests.filter(r => {
    const t = search.toLowerCase();
    const match = String(r.os || '').toLowerCase().includes(t) || String(r.responsavel || '').toLowerCase().includes(t) || String(r.vehicleData?.modelo || '').toLowerCase().includes(t);
    const mo = origem === 'todos' || (origem === 'importado' ? r.importado : !r.importado);
    const mu = unidadeFilter === 'todas' || r.unidade === unidadeFilter;
    return match && mo && mu;
  }), [requests, search, origem, unidadeFilter]);

  const exportCSV = () => {
    const rows = [['Data', 'OS', 'Unidade', 'Chassi', 'Veiculo', 'Peca', 'Qtd', 'Status', 'Valor', 'Loja', 'Prazo', 'Entrega'].join(';')];
    requests.forEach(r => (r.items || []).forEach(it => rows.push([r.timestamp ? new Date(r.timestamp).toLocaleDateString() : '', r.os, r.unidade || 'Unidade 1', r.vehicleData?.chassi || '-', r.vehicleData?.modelo || '-', it.description || '-', it.quantity || 1, it.statusOriginal || it.status || 'Pendente', it.price || 0, it.supplier || '-', it.deliveryDate || '-', it.actualDeliveryDate || '-'].join(';'))));
    const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `Relatorio_VRZ_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click();
  };

  const exportControle = () => {
    const byOS = {};
    requests.forEach(r => {
      const k = String(r.os || '').trim();
      if (!k) return;
      if (!byOS[k]) byOS[k] = { os: k, unidade: r.unidade || 'Unidade 1', modelo: r.vehicleData?.modelo || '-', chassi: r.vehicleData?.chassi || '-', fabricante: r.vehicleData?.fabricante || '-', itens: [], ts: r.timestamp || 0 };
      (r.items || []).forEach(it => byOS[k].itens.push({ desc: it.description || '-', qty: it.quantity || 1, status: it.status || 'Pendente', orig: it.statusOriginal || '' }));
      if ((r.timestamp || 0) > byOS[k].ts) byOS[k].ts = r.timestamp;
    });
    const header = ['OS', 'Unidade', 'Modelo', 'Fabricante', 'Chassi', 'Peças Solicitadas', 'Status Geral', 'Última Atualização'].join(';');
    const rows = [header];
    Object.values(byOS).sort((a, b) => parseInt(a.os) - parseInt(b.os)).forEach(r => {
      const pecas = r.itens.map(it => `${it.qty}x ${it.desc}`).join(' | ');
      let sg = 'Concluído';
      if (r.itens.some(it => it.status === 'Pendente')) sg = 'Pendente';
      else if (r.itens.some(it => it.status === 'Em Cotação')) sg = 'Em Cotação';
      else if (r.itens.some(it => it.status === 'Doado')) sg = 'Doado';
      const dt = r.ts ? new Date(r.ts).toLocaleDateString('pt-BR') : '';
      rows.push([r.os, r.unidade, r.modelo, r.fabricante, r.chassi, `"${pecas}"`, sg, dt].join(';'));
    });
    const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VRZ_Controle_PROCV_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click();
  };

  const exportPDF = async req => {
    const { jsPDF } = window.jspdf; const doc = new jsPDF();
    doc.setFontSize(16); doc.text('Solicitação de Peças - VRZ', 10, 15); doc.setFontSize(9);
    doc.text('OS: #' + req.os, 10, 24); doc.text('Unidade: ' + (req.unidade || 'Unidade 1'), 10, 30);
    doc.text('Data: ' + new Date(req.timestamp).toLocaleString(), 10, 36);
    doc.text('Veículo: ' + (req.vehicleData?.modelo || ''), 10, 42); doc.text('Chassi: ' + (req.vehicleData?.chassi || ''), 10, 48);
    doc.text('Solicitante: ' + req.responsavel, 10, 54);
    let y = 64; doc.setFontSize(11); doc.text('ITENS:', 10, y); y += 8;
    (req.items || []).forEach((it, i) => {
      if (y > 250) { doc.addPage(); y = 15; }
      doc.setFontSize(9);
      const statusText = it.status === 'Doado' ? `[DOADO para OS ${it.donatedTo || '?'}]` : `[${it.status || 'Pendente'}]`;
      doc.text(`${i + 1}. Qtd:${it.quantity} - ${it.description} ${statusText}`, 14, y); y += 7;
      if (it.photo) { try { doc.addImage(it.photo, 'JPEG', 14, y, 45, 28); y += 32; } catch { } }
    });
    doc.save('OS_' + req.os + '_VRZ.pdf');
  };

  return (
    <div className="space-y-6 fade-in-up">
      {/* Modal de Exclusão */}
      {toDelete && (
        <div className="fixed inset-0 z-[500] bg-black/80 backdrop-blur-md flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl">
            <div className="bg-gradient-to-r from-red-500 to-red-600 p-6 text-center text-white">
              <div className="w-14 h-14 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-3">
                <Icon name="trash-2" size={24} />
              </div>
              <h3 className="text-lg font-black uppercase">Excluir Registro</h3>
            </div>
            <div className="p-6 space-y-4">
              <p className="text-xs font-bold text-gray-500 text-center">Confirmar exclusão permanente?</p>
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setToDelete(null)} className="py-3 bg-gray-100 text-gray-600 rounded-xl font-bold uppercase text-[10px] hover:bg-gray-200 transition">Cancelar</button>
                <button onClick={async () => { try { await col('requests').doc(toDelete).delete(); setToDelete(null); } catch (error) { alert('Erro ao excluir.'); } }} className="py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-[10px] shadow-md">Confirmar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Header */}
      <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <div>
          <h1 className="text-3xl font-black tracking-tighter bg-gradient-to-r from-gray-900 to-gray-600 bg-clip-text text-transparent">Histórico de OS</h1>
          <p className="text-xs font-medium text-gray-500 mt-1">Gestão e Exportação Detalhada</p>
        </div>
        <div className="flex flex-wrap gap-3">
          <div className="flex bg-white rounded-xl shadow-md overflow-hidden">
            {[['todos', 'Todos'], ['portal', 'Portal'], ['importado', 'Planilha']].map(([v, l]) => (
              <button key={v} onClick={() => setOrigem(v)} className={`px-4 py-2 text-[10px] font-bold uppercase tracking-wider transition-all ${origem === v ? 'bg-gradient-to-r from-red-500 to-red-600 text-white' : 'text-gray-500 hover:text-gray-700'}`}>{l}</button>
            ))}
          </div>
          <select value={unidadeFilter} onChange={e => setUnidadeFilter(e.target.value)} className="px-4 py-2 bg-white border border-gray-200 rounded-xl text-[10px] font-bold uppercase outline-none focus:border-red-500 shadow-md">
            <option value="todas">Todas Unidades</option>
            {UNIDADES.map(u => <option key={u} value={u}>{u}</option>)}
          </select>
          {isAdmin && (
            <>
              <button onClick={exportCSV} className="bg-gradient-to-r from-emerald-500 to-emerald-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 shadow-md hover:shadow-lg transition">
                <Icon name="file-spreadsheet" size={12} /> Excel
              </button>
              <button onClick={exportControle} className="bg-gradient-to-r from-gray-900 to-gray-800 text-white px-4 py-2 rounded-xl text-[10px] font-bold uppercase flex items-center gap-2 shadow-md hover:shadow-lg transition">

            <Icon name="search" size={14} className="absolute left-3 top-2.5 text-gray-400" />
          </div>
        </div>
      </div>

      {/* Results Grid */}
      <div className="grid grid-cols-1 gap-4 max-h-[70vh] overflow-y-auto pr-2">
        {filtered.length === 0 ? (
          <div className="py-20 text-center bg-white rounded-2xl shadow-lg">
            <Icon name="inbox" size={48} className="text-gray-200 mx-auto mb-3" />
            <p className="text-xs font-bold uppercase text-gray-300">Nenhum resultado encontrado</p>

                  <div className="flex items-center gap-3">

                    {r.importado && <span className="px-2 py-1 bg-amber-100 text-amber-700 rounded text-[8px] font-bold uppercase">Planilha</span>}
                  </div>
                  <div className="flex gap-2">
                    <button onClick={() => exportPDF(r)} className="px-3 py-1.5 bg-gradient-to-r from-blue-500 to-blue-600 text-white rounded-lg text-[9px] font-bold uppercase flex items-center gap-1 shadow-md hover:shadow-lg transition">
                      <Icon name="file-text" size={12} /> PDF
                    </button>
                    {isAdmin && (
                      <button onClick={() => setToDelete(r.id)} className="px-3 py-1.5 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-lg text-[9px] font-bold uppercase flex items-center gap-1 shadow-md hover:shadow-lg transition">
                        <Icon name="trash-2" size={12} /> Excluir

                <div className="grid grid-cols-2 md:grid-cols-5 gap-3 text-[9px] font-bold text-gray-500 mb-4 pb-3 border-b border-gray-100">

                  <div><span className="block mb-1">Veículo</span><span className="text-gray-800">{r.vehicleData?.modelo || '—'}</span></div>
                  <div><span className="block mb-1">Chassi</span><span className="text-gray-800 font-mono text-[8px]">{r.vehicleData?.chassi || '—'}</span></div>
                  <div><span className="block mb-1">Data</span><span className="text-gray-800">{r.timestamp ? new Date(r.timestamp).toLocaleDateString() : '—'}</span></div>
                  <div><span className="block mb-1">Unidade</span><span className="text-gray-800">{r.unidade || 'Unidade 1'}</span></div>
                </div>
                <div className="flex gap-2 overflow-x-auto pb-2">
                  {(r.items || []).map((it, i) => (
                    <div key={i} className="flex-shrink-0 flex items-center gap-2 bg-gray-50 p-2 rounded-lg border border-gray-200 min-w-[180px] hover:shadow-md transition">
                      {it.photo && <img src={it.photo} className="w-10 h-10 rounded-md object-cover border" alt="Peça" />}
                      {!it.photo && r.importado && <div className="w-10 h-10 rounded-md bg-amber-50 border border-amber-200 flex items-center justify-center"><Icon name="archive" size={14} className="text-amber-400" /></div>}
                      <div className="min-w-0 flex-1">
                        <p className="text-[9px] font-bold uppercase truncate">{it.description || '(sem descrição)'}</p>
                        <div className="flex items-center justify-between mt-1">
                          <span className="text-[8px] text-red-600 font-bold">QTD:{it.quantity}</span>
                          <StatusBadge status={it.status || 'Pendente'} orig={it.statusOriginal} />
                        </div>
                        {it.status === 'Doado' && it.donatedTo && <p className="text-[7px] text-purple-600 font-bold mt-1">→ OS {it.donatedTo}</p>}
                        {it.price > 0 && <p className="text-[7px] text-emerald-600 font-bold mt-1">{fmtBRL(it.price)}</p>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// DONOR SYSTEM (Melhorado)
// ============================================
function DonorSystem({ requests, vehicles, onDonate }) {
  const [selectedSourceOS, setSelectedSourceOS] = useState('');
  const [selectedTargetOS, setSelectedTargetOS] = useState('');
  const [selectedItems, setSelectedItems] = useState([]);
  const [step, setStep] = useState(1);

  const sourceRequest = requests.find(r => String(r.os) === selectedSourceOS);
  const targetRequest = requests.find(r => String(r.os) === selectedTargetOS);
  const availableSourceItems = useMemo(() => sourceRequest?.items?.filter(it => it.status === 'Concluído' || it.status === 'Pendente') || [], [sourceRequest]);

  const handleDonate = async () => {
    if (!sourceRequest || !targetRequest || selectedItems.length === 0) {
      alert('Selecione OS de origem, destino e pelo menos uma peça');
      return;
    }
    const confirm = window.confirm(`Confirmar doação de ${selectedItems.length} peça(s) da OS ${selectedSourceOS} para OS ${selectedTargetOS}?`);
    if (!confirm) return;
    try {
      const batch = db.batch();
      const sourceItems = [...sourceRequest.items];
      selectedItems.forEach(itemId => {
        const idx = sourceItems.findIndex(it => it.id === itemId);
        if (idx !== -1) sourceItems[idx] = { ...sourceItems[idx], status: 'Doado', statusOriginal: 'Doado', donatedTo: selectedTargetOS, donatedAt: Date.now() };
      });
      batch.update(col('requests').doc(sourceRequest.id), { items: sourceItems });
      const itemsToAdd = selectedItems.map(itemId => {
        const originalItem = sourceRequest.items.find(it => it.id === itemId);
        return { ...originalItem, id: Date.now() + Math.random(), status: 'Pendente', statusOriginal: undefined, donatedFrom: selectedSourceOS, photo: originalItem.photo, price: undefined, supplier: undefined, deliveryDate: undefined, actualDeliveryDate: undefined };
      });
      const targetItems = [...(targetRequest.items || []), ...itemsToAdd];
      batch.update(col('requests').doc(targetRequest.id), { items: targetItems });
      await col('donations').add({ sourceOS: selectedSourceOS, targetOS: selectedTargetOS, items: selectedItems, donatedBy: 'Sistema', timestamp: Date.now() });
      await batch.commit();
      alert('Doação realizada com sucesso!');
      onDonate?.();
      setSelectedSourceOS('');
      setSelectedTargetOS('');
      setSelectedItems([]);
      setStep(1);
    } catch (error) {
      console.error('Erro na doação:', error);
      alert('Erro ao processar doação.');
    }
  };

  const toggleItemSelection = (itemId) => setSelectedItems(prev => prev.includes(itemId) ? prev.filter(id => id !== itemId) : [...prev, itemId]);

  return (
    <div className="bg-white rounded-2xl shadow-xl overflow-hidden fade-in-up">
      <div className="bg-gradient-to-r from-purple-600 to-purple-700 p-6 text-white">
        <div className="flex items-center gap-3">
          <div className="p-3 bg-white/20 rounded-xl"><Icon name="git-merge" size={24} /></div>
          <div>
            <h3 className="text-2xl font-black uppercase">Sistema de Doação de Peças</h3>
            <p className="text-[10px] font-medium opacity-80 mt-1">Transfira peças entre veículos para agilizar reparos</p>
          </div>
        </div>
      </div>

      <div className="p-6">
        <div className="flex items-center justify-center mb-8">
          {[1, 2, 3].map((s, i) => (
            <React.Fragment key={s}>
              <div className={`w-10 h-10 rounded-full flex items-center justify-center font-bold text-sm ${step >= s ? 'bg-gradient-to-r from-purple-500 to-purple-600 text-white shadow-md' : 'bg-gray-200 text-gray-400'}`}>{s}</div>
              {i < 2 && <div className={`w-16 h-1 ${step > s ? 'bg-purple-500' : 'bg-gray-200'}`} />}
            </React.Fragment>
          ))}
        </div>

        {step === 1 && (
          <div className="space-y-4">
            <p className="text-sm font-bold uppercase text-gray-600">Passo 1: Selecione a OS doadora</p>
            <select value={selectedSourceOS} onChange={e => setSelectedSourceOS(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl font-bold text-lg focus:border-purple-500 outline-none transition-all">
              <option value="">Selecione a OS doadora...</option>
              {requests.filter(r => r.items?.some(it => it.status === 'Concluído' || it.status === 'Pendente')).map(r => (
                <option key={r.id} value={r.os}>OS #{r.os} - {r.vehicleData?.modelo} ({r.items?.length || 0} peças)</option>
              ))}
            </select>
            <button onClick={() => setStep(2)} disabled={!selectedSourceOS} className={`w-full py-4 rounded-xl font-bold uppercase transition-all ${selectedSourceOS ? 'bg-gradient-to-r from-purple-500 to-purple-600 text-white shadow-md hover:shadow-lg' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>Próximo →</button>
          </div>
        )}

        {step === 2 && (
          <div className="space-y-4">
            <p className="text-sm font-bold uppercase text-gray-600">Passo 2: Selecione as peças para doar</p>
            {availableSourceItems.length === 0 ? (
              <p className="text-center text-gray-400 py-8">Nenhuma peça disponível para doação</p>
            ) : (
              <div className="max-h-96 overflow-y-auto space-y-2">
                {availableSourceItems.map((item, idx) => (
                  <label key={item.id || idx} className="flex items-center gap-3 p-3 border border-gray-200 rounded-xl cursor-pointer hover:bg-purple-50 transition">
                    <input type="checkbox" checked={selectedItems.includes(item.id)} onChange={() => toggleItemSelection(item.id)} className="w-5 h-5 accent-purple-600" />
                    <div className="flex-1">
                      <p className="font-bold uppercase text-sm">{item.description}</p>
                      <div className="flex gap-2 mt-1"><span className="text-xs">Qtd: {item.quantity}</span><StatusBadge status={item.status} /></div>
                    </div>
                    {item.photo && <img src={item.photo} className="w-12 h-12 rounded object-cover" />}
                  </label>
                ))}
              </div>
            )}
            <div className="flex gap-3">
              <button onClick={() => setStep(1)} className="flex-1 py-4 bg-gray-200 rounded-xl font-bold uppercase hover:bg-gray-300 transition">← Voltar</button>
              <button onClick={() => setStep(3)} disabled={selectedItems.length === 0} className={`flex-1 py-4 rounded-xl font-bold uppercase transition-all ${selectedItems.length > 0 ? 'bg-gradient-to-r from-purple-500 to-purple-600 text-white shadow-md' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>Próximo →</button>
            </div>
          </div>
        )}

        {step === 3 && (
          <div className="space-y-4">
            <p className="text-sm font-bold uppercase text-gray-600">Passo 3: Selecione a OS receptora</p>
            <select value={selectedTargetOS} onChange={e => setSelectedTargetOS(e.target.value)} className="w-full p-4 bg-gray-50 border-2 border-gray-200 rounded-xl font-bold text-lg focus:border-purple-500 outline-none transition-all">
              <option value="">Selecione a OS receptora...</option>
              {requests.filter(r => String(r.os) !== selectedSourceOS).map(r => (
                <option key={r.id} value={r.os}>OS #{r.os} - {r.vehicleData?.modelo}</option>
              ))}
            </select>
            <div className="bg-purple-50 p-4 rounded-xl border border-purple-200">
              <p className="font-bold uppercase text-purple-800 mb-2">Resumo da Doação</p>
              <p className="text-sm">OS Doadora: <strong>#{selectedSourceOS}</strong></p>
              <p className="text-sm">OS Receptora: <strong>#{selectedTargetOS || '(não selecionada)'}</strong></p>
              <p className="text-sm mt-2">{selectedItems.length} peça(s) selecionada(s)</p>
            </div>
            <div className="flex gap-3">
              <button onClick={() => setStep(2)} className="flex-1 py-4 bg-gray-200 rounded-xl font-bold uppercase hover:bg-gray-300 transition">← Voltar</button>
              <button onClick={handleDonate} disabled={!selectedTargetOS} className={`flex-1 py-4 rounded-xl font-bold uppercase transition-all ${selectedTargetOS ? 'bg-gradient-to-r from-purple-500 to-purple-600 text-white shadow-md hover:shadow-lg' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>Confirmar Doação 🎁</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ============================================
// STORAGE VIEW (Melhorado)
// ============================================
function StorageView({ requests }) {
  const LIM = 1000;
  const [sel, setSel] = useState({});
  const [exportando, setExportando] = useState(false);
  const [excluindo, setExcluindo] = useState(false);
  const [confirmar, setConfirmar] = useState(false);
  const [prog, setProg] = useState({ atual: 0, total: 0, msg: '' });

  const concluidos = useMemo(() => requests.filter(r => r.items?.length > 0 && r.items.every(it => it.status === 'Concluído')).sort((a, b) => a.timestamp - b.timestamp), [requests]);
  const total = requests.length;
  const totalConc = concluidos.length;
  const ativos = total - totalConc;
  const pctPed = Math.min(total / LIM * 100, 100);
  const bytesU = estimarBytes(requests);
  const bytesLim = 1073741824;
  const pctSt = Math.min(bytesU / bytesLim * 100, 100);
  const corB = pctPed >= 85 ? '#ef4444' : pctPed >= 60 ? '#f97316' : '#22c55e';
  const todosSel = concluidos.length > 0 && concluidos.every(r => sel[r.id]);
  const qtdSel = Object.values(sel).filter(Boolean).length;
  const idsSel = Object.entries(sel).filter(([, v]) => v).map(([id]) => id);
  const pedSel = concluidos.filter(r => idsSel.includes(r.id));

  const toggleTodos = () => todosSel ? setSel({}) : setSel(Object.fromEntries(concluidos.map(r => [r.id, true])));

  const exportCSV = () => {
    if (!pedSel.length) return;
    const rows = [['Data', 'OS', 'Unidade', 'Modelo', 'Fabricante', 'Chassi', 'Solicitante', 'Peça', 'Qtd', 'Status', 'Fornecedor', 'Valor', 'Entrega Real'].join(';')];
    pedSel.forEach(r => (r.items || []).forEach(it => rows.push([r.timestamp ? new Date(r.timestamp).toLocaleDateString('pt-BR') : '', r.os, r.unidade || 'Unidade 1', r.vehicleData?.modelo || '', r.vehicleData?.fabricante || '', r.vehicleData?.chassi || '', r.responsavel || '', it.description || '', it.quantity || 1, it.statusOriginal || it.status || '', it.supplier || '', it.price ? Number(it.price).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : '', it.actualDeliveryDate || ''].join(';'))));
    const blob = new Blob(['\uFEFF' + rows.join('\n')], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `VRZ_Concluidos_${new Date().toLocaleDateString('pt-BR').replace(/\//g, '-')}.csv`; a.click();
  };

  const exportPDF = async () => {
    if (!pedSel.length) return;
    setExportando(true);
    try {
      const { jsPDF } = window.jspdf; const doc = new jsPDF();
      const hoje = new Date().toLocaleDateString('pt-BR');
      doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 38, 'F');
      doc.setTextColor(255, 255, 255); doc.setFontSize(16); doc.setFont('helvetica', 'bold');
      doc.text('VRZ COMPRAS — ARQUIVO DE CONCLUÍDOS', 10, 16);
      doc.setFontSize(8); doc.setFont('helvetica', 'normal');
      doc.text(`Gerado: ${hoje}  |  Pedidos: ${pedSel.length}`, 10, 28);
      doc.setTextColor(0, 0, 0);
      let y = 50;
      pedSel.forEach((req) => {
        if (y > 250) { doc.addPage(); y = 15; }
        doc.setFillColor(240, 240, 240); doc.rect(8, y - 4, 194, 13, 'F');
        doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
        doc.text(`OS #${req.os} (${req.unidade || 'Unidade 1'}) — ${req.vehicleData?.modelo || ''}`, 12, y + 3);
        doc.setFont('helvetica', 'normal'); doc.setFontSize(7);
        doc.text(`Solicitante: ${req.responsavel || '—'}  |  ${req.timestamp ? new Date(req.timestamp).toLocaleDateString('pt-BR') : ''}  |  Chassi: ${req.vehicleData?.chassi || '—'}`, 12, y + 9);
        y += 16;
        (req.items || []).forEach((it, ii) => {
          if (y > 265) { doc.addPage(); y = 15; }
          doc.setFont('helvetica', 'bold'); doc.setFontSize(8); doc.setTextColor(0, 0, 0);
          doc.text(`${ii + 1}. ${it.description || ''}`, 14, y);
          doc.setFont('helvetica', 'normal'); doc.setFontSize(7); doc.setTextColor(80, 80, 80);
          const det = `Qtd:${it.quantity || 1}  Fornecedor:${it.supplier || '—'}  Valor:${it.price ? 'R$' + Number(it.price).toLocaleString('pt-BR', { minimumFractionDigits: 2 }) : '—'}  Entrega:${it.actualDeliveryDate || '—'}`;
          const ls = doc.splitTextToSize(det, 180);
          doc.text(ls, 16, y + 5);
          doc.setTextColor(0, 0, 0);
          y += 5 + ls.length * 4 + 2;
        });
        y += 4; doc.setDrawColor(220, 220, 220); doc.line(8, y - 2, 202, y - 2);
      });
      doc.addPage(); doc.setFillColor(0, 0, 0); doc.rect(0, 0, 210, 18, 'F');
      doc.setTextColor(255, 255, 255); doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
      doc.text('RESUMO FINANCEIRO', 10, 12);
      doc.setTextColor(0, 0, 0); y = 30;
      const vTotal = pedSel.reduce((a, r) => a + (r.items || []).reduce((b, it) => b + parseFloat(it.price || 0), 0), 0);
      doc.setFontSize(9); doc.setFont('helvetica', 'normal');
      doc.text(`OS arquivadas: ${pedSel.length}`, 12, y); y += 8;
      doc.text(`Total de itens: ${pedSel.reduce((a, r) => a + (r.items?.length || 0), 0)}`, 12, y); y += 10;
      doc.setFont('helvetica', 'bold'); doc.setFontSize(12);
      doc.text(`Valor total: R$ ${vTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`, 12, y);
      doc.save(`VRZ_Concluidos_${hoje.replace(/\//g, '-')}.pdf`);
    } catch (e) { alert('Erro PDF: ' + e.message); }
    setExportando(false);
  };

  const executarExclusao = async () => {
    setConfirmar(false); setExcluindo(true);
    const tot = idsSel.length; setProg({ atual: 0, total: tot, msg: 'Iniciando...' });
    let ok = 0;
    for (const id of idsSel) {
      try { await col('requests').doc(id).delete(); ok++; setProg({ atual: ok, total: tot, msg: `Excluindo ${ok} de ${tot}...` }); } catch (e) { console.error(e); }
      if (ok % 5 === 0) await new Promise(r => setTimeout(r, 100));
    }
    setProg({ atual: tot, total: tot, msg: 'Concluído!' }); setSel({});
    await new Promise(r => setTimeout(r, 1200)); setExcluindo(false); setProg({ atual: 0, total: 0, msg: '' });
  };

  return (
    <div className="space-y-6 fade-in-up pb-10">
      {confirmar && (
        <div className="fixed inset-0 z-[600] bg-black/90 flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-md rounded-2xl overflow-hidden shadow-2xl">
            <div className="bg-gradient-to-r from-red-500 to-red-600 p-6 text-white text-center">
              <div className="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center mx-auto mb-3"><Icon name="trash-2" size={28} /></div>
              <h3 className="text-xl font-black uppercase">Confirmar Exclusão</h3>
              <p className="text-[10px] font-bold opacity-80 mt-1 uppercase">Ação irreversível</p>
            </div>
            <div className="p-6 space-y-4">
              <div className="bg-red-50 border border-red-100 rounded-xl p-4 text-center">
                <p className="text-3xl font-black text-red-600">{qtdSel}</p>
                <p className="text-[9px] font-bold uppercase text-red-500">pedidos serão excluídos</p>
              </div>
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => setConfirmar(false)} className="py-3 bg-gray-100 text-gray-600 rounded-xl font-bold uppercase text-[10px]">Cancelar</button>
                <button onClick={executarExclusao} className="py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-[10px] shadow-md">Excluir</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {excluindo && (
        <div className="fixed inset-0 z-[600] bg-black/95 flex items-center justify-center p-4">
          <div className="bg-white w-full max-w-sm rounded-2xl shadow-2xl p-8 text-center space-y-4">
            <div className="w-14 h-14 bg-red-50 rounded-2xl flex items-center justify-center mx-auto"><Icon name="loader" size={28} className="text-red-600 animate-spin" /></div>
            <h3 className="font-bold uppercase text-lg">Excluindo...</h3>
            <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden"><div className="h-full bg-gradient-to-r from-red-500 to-red-600 rounded-full transition-all duration-300" style={{ width: prog.total > 0 ? `${prog.atual / prog.total * 100}%` : '0%' }} /></div>
            <p className="text-[10px] font-bold uppercase text-gray-400">{prog.msg}</p>
          </div>
        </div>
      )}

      <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div className="bg-gradient-to-br from-gray-900 to-gray-800 rounded-2xl p-6 text-white shadow-xl">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-10 h-10 bg-violet-600 rounded-xl flex items-center justify-center"><Icon name="database" size={18} /></div>
            <div><p className="text-[8px] font-bold uppercase text-gray-400 tracking-wider">Pedidos no Firebase</p><p className="text-[7px] text-gray-500 font-medium">Plano Spark — limite ~{LIM.toLocaleString()}</p></div>
          </div>
          <div className="flex items-end justify-between mb-2"><span className="text-5xl font-black">{total.toLocaleString()}</span><span className="text-[10px] font-bold text-gray-500 uppercase">de ~{LIM.toLocaleString()}</span></div>
          <div className="w-full bg-gray-700 rounded-full h-3 overflow-hidden mb-2"><div className="h-full rounded-full transition-all duration-700" style={{ width: `${pctPed}%`, backgroundColor: corB }} /></div>
          <div className="flex justify-between"><span className="text-[8px] font-bold uppercase" style={{ color: corB }}>{pctPed >= 85 ? '⚠ Próximo do limite!' : pctPed >= 60 ? 'Uso moderado' : 'Uso saudável'}</span><span className="text-[9px] font-bold text-gray-400">{pctPed.toFixed(1)}%</span></div>
          <div className="mt-4 grid grid-cols-3 gap-2 border-t border-white/10 pt-4">
            <div className="text-center bg-white/5 rounded-xl p-2"><p className="text-2xl font-black text-blue-400">{ativos}</p><p className="text-[7px] font-bold uppercase text-gray-500 mt-0.5">Ativos</p></div>
            <div className="text-center bg-white/5 rounded-xl p-2"><p className="text-2xl font-black text-emerald-400">{totalConc}</p><p className="text-[7px] font-bold uppercase text-gray-500 mt-0.5">Concluídos</p></div>
            <div className="text-center bg-white/5 rounded-xl p-2"><p className="text-2xl font-black text-violet-400">{Math.max(LIM - total, 0)}</p><p className="text-[7px] font-bold uppercase text-gray-500 mt-0.5">Restam</p></div>
          </div>
        </div>

        <div className="bg-white rounded-2xl p-6 shadow-xl border border-gray-100">
          <div className="flex items-center gap-3 mb-4">
            <div className="w-10 h-10 bg-gray-900 rounded-xl flex items-center justify-center"><Icon name="hard-drive" size={18} className="text-white" /></div>
            <div><p className="text-[8px] font-bold uppercase text-gray-400 tracking-wider">Storage Estimado</p><p className="text-[7px] text-gray-300 font-medium">Com foto ~800KB/pedido · Sem foto ~30KB</p></div>
          </div>
          <div className="flex items-end justify-between mb-2"><span className="text-4xl font-black text-gray-800">{fmtBytes(bytesU)}</span><span className="text-[10px] font-bold text-gray-400">de 1 GB</span></div>
          <div className="w-full bg-gray-100 rounded-full h-3 overflow-hidden mb-2"><div className="h-full rounded-full transition-all duration-700" style={{ width: `${pctSt}%`, backgroundColor: pctSt >= 85 ? '#ef4444' : pctSt >= 60 ? '#f97316' : '#8b5cf6' }} /></div>
          <p className="text-[8px] text-gray-400 font-medium">{pctSt.toFixed(1)}% do armazenamento usado</p>
          <div className="mt-4 bg-amber-50 border border-amber-100 rounded-xl p-3"><p className="text-[8px] font-bold uppercase text-amber-700 mb-1">💡 Dica</p><p className="text-[8px] text-amber-600 font-medium">Arquive e exclua concluídos regularmente para manter o sistema rápido e dentro do plano gratuito.</p></div>
        </div>
      </div>

      <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div className="p-5 border-b border-gray-100 flex flex-wrap items-center justify-between gap-3">
          <div><p className="text-sm font-black text-gray-800 uppercase">Arquivar Pedidos Concluídos</p><p className="text-[8px] text-gray-400 font-medium uppercase mt-0.5">Exporte os dados e exclua para liberar capacidade</p></div>
          <div className="flex gap-2 flex-wrap">
            <button onClick={exportCSV} disabled={!qtdSel} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-[9px] font-bold uppercase transition-all ${qtdSel ? 'bg-gradient-to-r from-emerald-500 to-emerald-600 text-white shadow-md hover:shadow-lg' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}><Icon name="file-spreadsheet" size={13} /> Excel ({qtdSel})</button>
            <button onClick={exportPDF} disabled={!qtdSel || exportando} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-[9px] font-bold uppercase transition-all ${qtdSel ? 'bg-gradient-to-r from-blue-500 to-blue-600 text-white shadow-md hover:shadow-lg' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}>{exportando ? <Icon name="loader" size={13} className="animate-spin" /> : <Icon name="file-text" size={13} />} PDF ({qtdSel})</button>
            <button onClick={() => qtdSel && setConfirmar(true)} disabled={!qtdSel || excluindo} className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-[9px] font-bold uppercase transition-all ${qtdSel ? 'bg-gradient-to-r from-red-500 to-red-600 text-white shadow-md hover:shadow-lg' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}`}><Icon name="trash-2" size={13} /> Excluir ({qtdSel})</button>
          </div>
        </div>

        {concluidos.length === 0 ? (
          <div className="py-16 text-center"><Icon name="check-circle" size={40} className="text-gray-200 mx-auto mb-3" /><p className="text-[9px] font-bold uppercase text-gray-300">Nenhum pedido totalmente concluído</p></div>
        ) : (
          <div className="overflow-x-auto">
            <table className="w-full text-left">
              <thead className="bg-gray-50 border-b">
                <tr><th className="p-3 w-10"><input type="checkbox" checked={todosSel} onChange={toggleTodos} className="w-4 h-4 accent-red-500 cursor-pointer" /></th>
                {['OS', 'Unidade', 'Veículo / Chassi', 'Solicitante', 'Data', 'Itens', 'Valor Total', 'Origem'].map(h => <th key={h} className="p-3 text-[8px] font-bold uppercase text-gray-400">{h}</th>)}</tr>
              </thead>
              <tbody className="divide-y divide-gray-50">
                {concluidos.map(r => {
                  const vT = (r.items || []).reduce((a, it) => a + parseFloat(it.price || 0), 0);
                  return (<tr key={r.id} onClick={() => setSel(p => ({ ...p, [r.id]: !p[r.id] }))} className={`cursor-pointer transition-colors ${sel[r.id] ? 'bg-red-50' : 'hover:bg-gray-50'}`}>
                    <td className="p-3" onClick={e => e.stopPropagation()}><input type="checkbox" checked={!!sel[r.id]} onChange={() => setSel(p => ({ ...p, [r.id]: !p[r.id] }))} className="w-4 h-4 accent-red-500 cursor-pointer" /></td>
                    <td className="p-3 font-bold text-black text-xs">#{r.os}</td>
                    <td className="p-3"><span className="px-2 py-0.5 bg-purple-100 text-purple-700 rounded text-[8px] font-bold">{r.unidade || 'Unidade 1'}</span></td>
                    <td className="p-3"><p className="text-[9px] font-bold text-gray-800">{r.vehicleData?.modelo || '—'}</p><p className="text-[7px] font-mono text-gray-400">{r.vehicleData?.chassi || ''}</p></td>
                    <td className="p-3 text-[9px] font-bold text-gray-600">{r.responsavel || '—'}</td>
                    <td className="p-3 text-[9px] font-medium text-gray-500">{r.timestamp ? new Date(r.timestamp).toLocaleDateString('pt-BR') : '—'}</td>
                    <td className="p-3 text-center"><span className="bg-gray-900 text-white text-[8px] font-bold px-2 py-0.5 rounded-full">{r.items?.length || 0}</span></td>
                    <td className="p-3 text-[9px] font-bold text-emerald-600">{vT > 0 ? fmtBRL(vT) : '—'}</td>
                    <td className="p-3">{r.importado ? <span className="text-[7px] font-bold uppercase text-amber-600 bg-amber-50 px-2 py-0.5 rounded">Planilha</span> : <span className="text-[7px] font-bold uppercase text-gray-400 bg-gray-100 px-2 py-0.5 rounded">Portal</span>}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        )}
        {concluidos.length > 0 && (
          <div className="p-4 bg-gray-900 flex flex-wrap items-center justify-between gap-3">
            <div className="flex items-center gap-4"><p className="text-[8px] font-bold uppercase text-gray-400">{qtdSel} de {concluidos.length} selecionados</p>{qtdSel > 0 && <p className="text-[8px] font-bold text-emerald-400">Libera ~{fmtBytes(estimarBytes(pedSel))}</p>}</div>
            <div className="flex gap-2"><button onClick={() => setSel({})} className="text-[8px] font-bold uppercase text-gray-400 hover:text-white px-3 py-1.5 rounded-lg transition">Limpar</button><button onClick={toggleTodos} className="text-[8px] font-bold uppercase text-gray-400 hover:text-white px-3 py-1.5 bg-white/5 rounded-lg transition">{todosSel ? 'Desmarcar todos' : 'Selecionar todos'}</button></div>
          </div>
        )}
      </div>
    </div>
  );
}

// USER MANAGEMENT (Melhorado)
// ============================================
function UserManagement({ users, onAdd, onDelete, onToggle, onRole }) {
  const [nu, setNu] = useState('');
  const [np, setNp] = useState('');
  const [nr, setNr] = useState('solicitante');
  const [showP, setShowP] = useState(false);

  return (
    <div className="space-y-6 fade-in-up">
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {[
          { role: 'admin', title: 'Administrador', color: 'from-red-500 to-red-600', bg: 'bg-red-50', items: ['✓ Nova Requisição', '✓ Histórico', '✓ Doações', '✓ Excluir', '✓ Gestão', '✓ Usuários'] },
          { role: 'solicitante', title: 'Solicitante', color: 'from-blue-500 to-blue-600', bg: 'bg-blue-50', items: ['✓ Nova Requisição', '✓ Histórico', '✗ Doações', '✗ Excluir', '✗ Gestão', '✗ Usuários'] },
          { role: 'leitor', title: 'Leitor', color: 'from-gray-500 to-gray-600', bg: 'bg-gray-50', items: ['✗ Nova Requisição', '✓ Histórico', '✗ Doações', '✗ Excluir', '✗ Gestão', '✗ Usuários'] }
        ].map(({ role, title, color, bg, items }) => (
          <div key={role} className={`${bg} rounded-xl p-4 shadow-md`}>
            <div className="flex items-center justify-between mb-3"><h3 className={`text-sm font-black bg-gradient-to-r ${color} bg-clip-text text-transparent`}>{title}</h3><RoleBadge role={role} /></div>
            <ul className="text-[9px] font-medium space-y-1">
              {items.map((p, i) => <li key={i} className={p.startsWith('✗') ? 'text-gray-400 line-through' : 'text-gray-700'}>{p}</li>)}
            </ul>
          </div>
        ))}
      </div>

      <div className="bg-white rounded-2xl p-6 shadow-xl border border-gray-100">
        <h3 className="text-sm font-black uppercase tracking-wide text-red-600 mb-4">Cadastrar Novo Acesso</h3>
        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
          <div className="md:col-span-2"><label className="text-[8px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Usuário</label><input type="text" value={nu} onChange={e => setNu(e.target.value)} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl font-bold text-sm outline-none focus:border-red-500 transition" placeholder="Nome.Sobrenome" /></div>
          <div><label className="text-[8px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Senha</label><div className="relative"><input type={showP ? "text" : "password"} value={np} onChange={e => setNp(e.target.value)} className="w-full pl-4 pr-10 py-2.5 bg-gray-50 border border-gray-200 rounded-xl font-bold text-sm outline-none focus:border-red-500 transition" placeholder="Senha" /><button type="button" onClick={() => setShowP(!showP)} className="absolute right-3 top-2.5 text-gray-400 hover:text-red-500 text-xs">{showP ? '👁' : '👁‍🗨'}</button></div></div>
          <div><label className="text-[8px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Categoria</label><select value={nr} onChange={e => setNr(e.target.value)} className="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl font-bold text-sm outline-none focus:border-red-500 transition"><option value="solicitante">Solicitante</option><option value="leitor">Leitor</option><option value="admin">Admin</option></select></div>
        </div>
        <button onClick={() => { if (!nu || !np) return alert('Preencha todos os campos.'); onAdd(nu, np, nr); setNu(''); setNp(''); setNr('solicitante'); }} className="mt-4 w-full py-3 bg-gradient-to-r from-red-500 to-red-600 text-white rounded-xl font-bold uppercase text-[10px] tracking-wider shadow-md hover:shadow-lg transition">+ CRIAR CONTA</button>
      </div>

      <div className="bg-white rounded-2xl shadow-xl overflow-hidden">
        <table className="w-full text-left">
          <thead className="bg-gray-50 border-b"><tr><th className="p-4 text-[9px] font-bold uppercase text-gray-400">Usuário</th><th className="p-4 text-[9px] font-bold uppercase text-gray-400">Categoria</th><th className="p-4 text-[9px] font-bold uppercase text-gray-400">Status</th><th className="p-4 text-[9px] font-bold uppercase text-gray-400 text-right">Ação</th></tr></thead>
          <tbody className="divide-y divide-gray-50">
            {users.map((u, i) => (
              <tr key={i} className="hover:bg-gray-50 transition">
                <td className="p-4 text-xs font-bold text-gray-800 uppercase">{u.user}</td>
                <td className="p-4"><select value={u.role || 'solicitante'} onChange={e => onRole(u, e.target.value)} className={`text-[7px] font-bold uppercase px-2 py-1 rounded-full cursor-pointer outline-none ${RC[u.role || 'solicitante']} shadow-sm`}><option value="admin">Admin</option><option value="solicitante">Solicitante</option><option value="leitor">Leitor</option></select></td>
                <td className="p-4"><button onClick={() => onToggle(u)} className={`text-[7px] font-bold uppercase px-2 py-1 rounded-full border transition-all ${u.active !== false ? 'bg-emerald-100 text-emerald-600 border-emerald-200 hover:bg-red-100 hover:text-red-600' : 'bg-red-100 text-red-600 border-red-200 hover:bg-emerald-100 hover:text-emerald-600'}`}>{u.active !== false ? 'Ativo' : 'Desativado'}</button></td>
                <td className="p-4 text-right"><button onClick={() => onDelete(u.id || u.user)} className="text-white bg-gradient-to-r from-red-500 to-red-600 hover:shadow-md px-3 py-1.5 rounded-lg text-[9px] font-bold uppercase flex items-center gap-1.5 ml-auto transition"><Icon name="trash-2" size={12} />EXCLUIR</button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ============================================
// LOGIN VIEW (Melhorado)
// ============================================
function LoginView({ onLogin, usersList }) {
  const [u, setU] = useState('');
  const [p, setP] = useState('');
  const [showP, setShowP] = useState(false);
  const [err, setErr] = useState('');

  const submit = e => {
    e.preventDefault();
    const found = usersList.find(x => x.user.toLowerCase() === u.trim().toLowerCase() && x.pass === p.trim());
    if (found) { if (found.active === false) setErr('Conta desativada. Contate o Admin.'); else onLogin(found); }
    else setErr('Usuário ou senha incorretos.');
  };

  return (
    <div className="h-screen w-full flex items-center justify-center bg-gradient-to-br from-gray-900 to-gray-800 p-4 fade-in-up">
      <div className="bg-white w-full max-w-md rounded-2xl shadow-2xl overflow-hidden">
        <div className="bg-gradient-to-r from-red-500 to-red-600 p-8 text-center text-white">
          <div className="p-3 bg-white/20 rounded-2xl w-fit mx-auto mb-4"><Icon name="shopping-cart" size={32} /></div>
          <h1 className="text-4xl font-black uppercase tracking-tight">VRZ COMPRAS</h1>
          <p className="text-[9px] font-medium opacity-80 mt-
